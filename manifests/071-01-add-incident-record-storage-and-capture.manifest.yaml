outcome:
  status: completed
  summary: "Implemented deterministic incident record storage and the maid incident capture/update/list CLI; code review findings are fixed and strict MAID handoff now passes with preserved valid red evidence."
  rationale: "The implementation, focused tests, full pytest suite, manifest validation, repository validation, and maid test all pass. Read-only implementation reviews found and then verified fixes for duplicate deterministic capture overwrites, malformed stored gate lists, non-atomic duplicate writes, strict incident_version loading, UTC created timestamp validation, and malformed YAML error wrapping. After the preserve-red-evidence workflow fix landed, the plan lock was recovered with narrow temporary behavioral failures, the implementation was restored, and strict verify passed with plan_lock, worktree_scope, changed_scope, and tests all green."
  lessons:
  - lesson_type: evidence-storage
    summary: "Deterministic evidence filenames must fail loudly on duplicate capture rather than overwrite, because incident records are durable review evidence."
    tags:
    - incidents
    - anti-gaming
    - storage
    paths:
    - maid_runner/core/incidents.py
    - tests/core/test_incidents.py
  - lesson_type: loader-safety
    summary: "Stored YAML incident records need explicit list-of-string validation for sequence fields; blindly iterating loaded scalars can turn malformed data into plausible-looking records."
    tags:
    - incidents
    - yaml
    - validation
    paths:
    - maid_runner/core/incidents.py
    - tests/core/test_incidents.py
  - lesson_type: loader-safety
    summary: "Stored YAML incident records need exact scalar type validation for version fields; coercing incident_version can let strings or booleans pass as valid evidence metadata."
    tags:
    - incidents
    - yaml
    - validation
    paths:
    - maid_runner/core/incidents.py
    - tests/core/test_incidents.py
  - lesson_type: evidence-storage
    summary: "Incident evidence timestamps need explicit UTC validation on both capture and load; otherwise malformed or offset timestamps can make durable record metadata ambiguous."
    tags:
    - incidents
    - timestamps
    - validation
    paths:
    - maid_runner/core/incidents.py
    - tests/core/test_incidents.py
  - lesson_type: loader-safety
    summary: "Malformed YAML parse failures should be wrapped with the incident file path so corrupt evidence records are actionable during list or update operations."
    tags:
    - incidents
    - yaml
    - diagnostics
    paths:
    - maid_runner/core/incidents.py
    - tests/core/test_incidents.py
  - lesson_type: workflow
    summary: "Post-implementation plan-lock revisions can invalidate captured red evidence by recapturing against a green tree; after recovering valid red evidence, metadata-only Outcome revisions should use `maid plan revise --preserve-red-evidence`."
    tags:
    - plan-lock
    - red-evidence
    - maid-workflow
    paths:
    - .maid/plan-locks/071-01-add-incident-record-storage-and-capture.lock.json
    - /home/atomrem/.maid/bug-report/20260614-234916-maid-plan-revise-red-evidence.md
  review_notes:
  - source: implementation-review-subagent
    severity: blocking
    summary: "Initial review found duplicate deterministic capture could overwrite incident evidence and malformed scalar gates were accepted; both issues were fixed with focused regression tests."
  - source: implementation-review-subagent
    severity: resolved
    summary: "Follow-up review found no remaining code issues; the remaining E705 workflow blocker was cleared after the preserve-red-evidence fix landed and the plan lock was recovered."
  - source: implementation-review-subagent
    severity: resolved
    summary: "Final review found duplicate incident writes were not atomic under concurrent same-filename capture and that Outcome validation counts were stale. Fixed by using exclusive file creation for new incident records, adding concurrent duplicate coverage, recapturing red evidence, and refreshing validation evidence."
  - source: implementation-review-subagent
    severity: resolved
    summary: "Final re-review found incident_version loading coerced strings and booleans into accepted integers. Fixed by adding exact integer validation, malformed-version regression coverage, and recapturing valid red evidence."
  - source: implementation-review-subagent
    severity: resolved
    summary: "Latest review found created timestamps were only string-checked, allowing malformed or non-UTC evidence metadata. Fixed by validating UTC timestamps on capture and load, adding timestamp regression coverage, and recapturing valid red evidence."
  - source: implementation-review-subagent
    severity: resolved
    summary: "Latest re-review found malformed YAML parse errors escaped without a path-named MAID error. Fixed by wrapping yaml.YAMLError in ValueError with the incident path, adding malformed YAML coverage, and recapturing valid red evidence."
