schema: "2"
goal: "Extract Python behavioral import reference recording"
type: refactor
created: "2026-05-21"
metadata:
  tags:
    - safe-refactor
    - python
    - behavioral-collector
  priority: high
description: |
  Extract the Python behavioral collector's import-reference recording mechanics
  into the behavioral reference recorder helper.

  This continues Priority 5 from the professional refactor backlog: extract
  behavioral reference collector helpers after import/scope state objects. The
  recorder owns the repeated append/dedup mechanics for references generated by
  `from ... import ...` and plain `import ...` statements. The behavioral
  collector keeps import-entry parsing, local scope binding, AST traversal, and
  module identity policy unchanged.
temptations:
  - risk: "Do not move import-entry parsing or relative import resolution in this slice."
    instead: "Keep `_import_entries` and `_import_from_entries` in `python.py`."
  - risk: "Do not change import reference context, alias_of, or import_source semantics."
    instead: "Delegate to the existing recorder `add_reference` with the same arguments."
  - risk: "Do not change local import-scope binding behavior."
    instead: "Only move reference recording after the existing binding logic has run."
files:
  edit:
    - path: maid_runner/validators/_python_behavioral_references.py
      artifacts:
        - kind: class
          name: _BehavioralReferenceRecorder
          source_scenario: "The Python behavioral collector records import references produced from parsed import entries."
          actions:
            - type: api_call
              subject:
                export: _BehavioralReferenceRecorder
          expected:
            behavior: "The recorder emits import references with the same import_source, alias_of, reference_context, and duplicate behavior."
    - path: maid_runner/validators/python.py
      artifacts:
        - kind: class
          name: _BehavioralCollector
          source_scenario: "Python behavioral artifact collection visits import statements."
          actions:
            - type: api_call
              subject:
                export: PythonValidator
          expected:
            behavior: "Behavioral artifacts for import statements are unchanged."
    - path: tests/validators/test_python_behavioral_references.py
      artifacts:
        - kind: test_function
          name: test_behavioral_reference_recorder_records_import_references
          source_scenario: "The recorder sees parsed from-import and plain-import entries."
          actions:
            - type: api_call
              subject:
                export: _BehavioralReferenceRecorder
          expected:
            behavior: "The recorder emits import references with the expected bound name, source, alias, and context."
        - kind: test_function
          name: test_python_behavioral_import_reference_recording_is_unchanged
          source_scenario: "A Python test imports the same bound name through from-import and plain import forms."
          actions:
            - type: api_call
              subject:
                export: PythonValidator
          expected:
            behavior: "The behavioral collector still records import references with the same source and alias identity."
  read:
    - tests/validators/test_python.py
    - tests/validators/test_python_identity.py
    - manifests/038-28-extract-python-behavioral-keyword-reference-recording.manifest.yaml
    - manifests/consolidate-validation-and-validator-contracts.manifest.yaml
validate:
  - uv run python -m pytest -q tests/validators/test_python_behavioral_references.py tests/validators/test_python.py tests/validators/test_python_identity.py
