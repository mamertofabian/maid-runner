        - run
        - python
        - -m
        - pytest
        - -q
        - tests/cli/test_skills_install.py
      status: passed
      summary: "10 behavioral tests passed."
    - command:
        - uv
        - run
        - maid
        - validate
      status: passed
      summary: "Whole-codebase MAID validation passed: 275 passed, 0 failed, 86 superseded."
    - command:
        - uv
        - run
        - python
        - -m
        - pytest
        - -q
      status: passed
      summary: "Full test suite passed: 2857 passed, 5 skipped."
