    - maid_runner/daemon/server.py
    - tests/daemon/test_tcp_transport.py
  - lesson_type: cleanup
    summary: "TCP mode should treat the Unix socket path as a runtime-directory anchor only; shutdown must not delete that path unless Unix mode actually owns a socket file there."
