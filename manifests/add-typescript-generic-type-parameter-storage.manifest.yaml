schema: "2"
goal: >
  Store and validate generic type parameters on MAID artifacts.
type: feature
created: "2026-05-07"
description: |
  Continue the TypeScript artifact-extraction slices by adding first-class
  storage for generic type parameters. The TypeScript validator already
  preserves generic type arguments in class bases, but declaration-site generic
  parameters such as `T extends Item = Item` are not represented in
  `FoundArtifact`, snapshots, manifests, or implementation validation.

  This slice intentionally evolves the public artifact model with a
  `type_parameters` tuple on `ArtifactSpec` and `FoundArtifact`, plus a
  manifest schema field of the same name. TypeScript extraction should preserve
  source-faithful parameter text for classes, interfaces, functions, methods,
  and type aliases. Implementation validation should compare declared generic
  parameters when a manifest specifies them.
temptations:
  - risk: "Do not store declaration-site generic parameters in `bases`, `returns`, or `type`."
    instead: "Add and use the explicit `type_parameters` artifact field across model, schema, parsing, serialization, snapshots, validation, and TypeScript extraction."
  - risk: "Do not infer, normalize, or split generic constraints into a new semantic model."
    instead: "Preserve each `type_parameter` node as source-faithful text such as `T extends Item = Item`."
  - risk: "Do not make generic parameters part of artifact identity."
    instead: "Keep merge keys unchanged and compare `type_parameters` only after the artifact is matched by kind/name/of."
  - risk: "Do not broaden this into decorator metadata or source range work."
    instead: "Limit the slice to generic parameter storage and comparison."
files:
  edit:
    - path: maid_runner/core/types.py
      artifacts:
        - kind: attribute
          name: type_parameters
          of: ArtifactSpec
          type: tuple[str, ...]
    - path: maid_runner/validators/base.py
      artifacts:
        - kind: attribute
          name: type_parameters
          of: FoundArtifact
          type: tuple[str, ...]
        - kind: method
          name: generate_snapshot
          of: BaseValidator
          args:
            - name: source
              type: str
            - name: file_path
              type: Union[str, Path]
          returns: list[dict]
    - path: maid_runner/core/manifest.py
      artifacts:
        - kind: function
          name: load_manifest
          args:
            - name: path
              type: Union[str, Path]
          returns: Manifest
        - kind: function
          name: save_manifest
          args:
            - name: manifest
              type: Manifest
            - name: path
              type: Union[str, Path]
          returns: None
    - path: maid_runner/schemas/manifest.v2.schema.json
      artifacts:
        - kind: attribute
          name: type_parameters
          of: ArtifactSpec schema
          type: array[string]
    - path: maid_runner/core/snapshot.py
      artifacts:
        - kind: function
          name: generate_snapshot
          args:
            - name: file_path
              type: Union[str, Path]
            - name: project_root
              type: Union[str, Path]
            - name: include_private
              type: bool
            - name: registry
              type: ValidatorRegistry | None
          returns: Manifest
    - path: maid_runner/core/validate.py
      artifacts:
        - kind: method
          name: validate
          of: ValidationEngine
          args:
            - name: manifest
              type: Union[Manifest, str, Path]
            - name: mode
              type: ValidationMode
            - name: use_chain
              type: bool
            - name: chain
              type: Optional[ManifestChain]
            - name: manifest_dir
              type: Union[str, Path]
            - name: check_stubs
              type: bool
            - name: check_assertions
              type: bool
            - name: include_chain_diagnostics
              type: bool
          returns: ValidationResult
    - path: maid_runner/validators/typescript.py
      artifacts:
        - kind: method
          name: collect_implementation_artifacts
          of: TypeScriptValidator
          args:
            - name: source
              type: str
            - name: file_path
              type: Union[str, Path]
          returns: CollectionResult
    - path: tests/core/test_manifest.py
      artifacts:
        - kind: test_function
          name: test_load_save_artifact_type_parameters_round_trip
        - kind: test_function
          name: test_schema_accepts_artifact_type_parameters
    - path: tests/validators/test_base.py
      artifacts:
        - kind: test_function
          name: test_artifact_to_dict_includes_type_parameters
    - path: tests/core/test_snapshot.py
      artifacts:
        - kind: test_function
          name: test_typescript_snapshot_preserves_generic_type_parameters
    - path: tests/core/test_validate.py
      artifacts:
        - kind: test_function
          name: test_typescript_generic_type_parameters_are_validated
    - path: tests/validators/test_typescript_artifact_edge_cases.py
      artifacts:
        - kind: test_function
          name: test_generic_class_interface_function_and_type_parameters_are_collected
        - kind: test_function
          name: test_typed_const_generic_function_parameters_are_collected_from_annotation
        - kind: test_function
          name: test_typed_class_field_generic_method_parameters_are_collected_from_annotation
        - kind: test_function
          name: test_parenthesized_typed_const_generic_function_parameters_are_collected
    - path: docs/spikes/spike-parser-library-replacement-options.md
      artifacts:
        - kind: attribute
          name: type_parameters
          of: parser library replacement spike
          type: section
  read:
    - tests/validators/test_typescript.py
    - maid_runner/core/type_compare.py
validate:
  - uv run python -m pytest -q tests/core/test_manifest.py tests/validators/test_base.py tests/core/test_snapshot.py tests/core/test_validate.py tests/validators/test_typescript_artifact_edge_cases.py
