    - maid_runner/validators/_typescript_behavioral.py
  - lesson_type: testing
    summary: "Regression tests for scanner false positives should include both the confirmed positive case and nearby negative boundaries: nested setup before expect(), assertion-free nested setup, focused/skipped direct callees, and non-test member helper calls."
    tags:
    - behavioral-testing
    - e210
    - vitest
    paths:
    - tests/core/validation/test_assertion_checking.py
  review_notes:
