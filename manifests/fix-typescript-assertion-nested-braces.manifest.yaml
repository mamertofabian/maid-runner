schema: '2'
goal: Fix TypeScript assertion checking so nested setup blocks before expect() do not trigger false E210 warnings
type: fix
created: '2026-06-24T07:36:11Z'
metadata:
  tags:
  - validation
  - assertions
  - typescript
  - bug-fix
  priority: high
description: |
  A reported MAID verification bug showed Vitest/Svelte tests with real
  `expect(...)` assertions being reported as E210 when the test callback
  contains nested object-literal setup before the assertion, such as
  `render(Component, { props: { ... } })`.

  Evolve the assertion-checking contract for JavaScript/TypeScript test blocks
  so `check_test_assertions` inspects the complete callback body rather than
  stopping at the first nested closing brace. Keep the existing warning policy:
  assertion-free JS/TS tests still emit E210, and Python behavior is unchanged.

  This is a chain-merge evolution of the existing assertion-helper contracts:
  it adds a regression behavior for the same public function signature and does
  not remove, rename, or change the signature of any existing artifact.
temptations:
- risk: Do not silence E210 for a whole TypeScript file just because some later test contains expect().
  instead: Determine assertion presence independently for each discovered test callback body.
- risk: Do not broaden this into a full JavaScript or TypeScript static analyzer.
  instead: Use a narrow balanced-delimiter extraction for test callback bodies and preserve the current expect/assert substring policy.
- risk: Do not weaken existing no-assertion warnings to avoid the false positive.
  instead: Keep an assertion-free nested-setup TypeScript test in the regression suite and require it to still emit E210.
files:
  edit:
  - path: maid_runner/core/_test_assertions.py
    artifacts:
    - kind: function
      name: check_test_assertions
      args:
      - name: source
        type: str
      - name: test_path
        type: str
      returns: list[ValidationError]
      source_scenario: A TypeScript/Vitest test callback contains nested object-literal setup before direct expect() assertions.
      actions:
      - type: api_call
        subject:
          export: check_test_assertions
      expected:
        behavior: The helper scans each complete JS/TS test callback body, does not emit E210 when expect() appears after nested setup braces, and still emits E210 for assertion-free callbacks.
  - path: tests/core/validation/test_assertion_checking.py
    artifacts:
    - kind: test_function
      name: test_check_test_assertions_allows_typescript_expect_after_nested_setup
      source_scenario: A TypeScript test file has one Vitest block with nested setup before expect() and another nested setup block without assertions.
      actions:
      - type: api_call
        subject:
          export: check_test_assertions
      expected:
        behavior: The checker reports only the assertion-free test block and does not report E210 for the block whose expect() appears after nested object-literal setup.
  read:
  - maid_runner/core/result.py
  - manifests/038-12-extract-test-assertions-helper.manifest.yaml
  - manifests/040-02-retire-duplicated-assertion-helper-legacy-cases.manifest.yaml
  - manifests/041-01-cache-assertion-checks-and-test-discovery.manifest.yaml
validate:
- uv run python -m pytest -q tests/core/validation/test_assertion_checking.py
outcome:
