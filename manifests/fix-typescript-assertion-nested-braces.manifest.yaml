    summary: "Initial implementation missed direct `fit` and `xit` callees recognized by the TypeScript behavioral collector; fixed by scanning those direct callees and adding regression coverage."
  - source: Newton
    severity: P2
    summary: "Follow-up review found member calls such as `helper.fit(...)` were matched as tests; fixed with a direct-callee guard and negative coverage."
  - source: Gauss
    severity: info
    summary: "Final independent read-only review found no actionable findings and returned ready; residual risk is the intentionally narrow string-based scanner boundary for unsupported syntaxes such as `test.each` and `it.skip`."
