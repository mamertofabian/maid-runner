  completed_at: "2026-06-24T08:18:41Z"
  summary: "Fixed JS/TS E210 assertion scanning so TypeScript/Vitest callbacks with nested object-literal setup before expect() are scanned through their complete callback body instead of stopping at the first nested closing brace."
  rationale: "The reported Manatal false positives came from regex body extraction that inspected only setup before the first nested `}`. A narrow balanced-brace extractor preserves the existing substring-based assertion policy while avoiding broad TypeScript control-flow analysis."
  lessons:
  - lesson_type: implementation
    summary: "When replacing regex body capture with balanced scanning, keep the test-call boundary aligned with the language collector: include direct `it`, `test`, `fit`, and `xit` callees, and reject member helper calls such as `helper.fit(...)`."
    tags:
    - assertions
    - typescript
    - parser-boundary
    paths:
