      name: parse_request
      args:
      - name: line
        type: str
      returns: Request
      source_scenario: Requests arrive with absent, valid, unsupported, and non-integer protocol_version fields.
      actions:
      - type: api_call
        subject:
          function: parse_request
      expected:
        behavior: Absent protocol_version parses as 1; supported integers parse onto Request.protocol_version; unsupported versions raise UnsupportedProtocolVersionError; non-integer values raise ProtocolError; verify is an allowed method.
  - path: maid_runner/daemon/server.py
    artifacts:
    - kind: class
      name: Server
      description: 'Dispatch maps UnsupportedProtocolVersionError to an ok: false response with code UNSUPPORTED_PROTOCOL_VERSION.'
  - path: maid_runner/daemon/handlers.py
    artifacts:
    - kind: function
      name: handle_verify
      args:
      - name: params
        type: dict
      returns: dict
      source_scenario: A client sends a verify request to the daemon for the repo-bound project root.
      actions:
      - type: api_call
        subject:
          function: handle_verify
      expected:
        behavior: Runs the validation, coherence, and file-tracking verify stages inside the daemon project root, reports the excluded tests stage as skipped, mirrors direct verify fail-fast, warning-strict, and allow-empty behavior for the included stages, matches direct verify JSON content (duration fields excluded), ignores client-supplied project_root, and rejects escaping paths with a request-layer error.
  - path: docs/maid-serve.md
    artifacts:
    - kind: attribute
      name: _daemon_verify_protocol_documentation
      of: documentation
      type: markdown section
      description: Documents protocol_version negotiation, the verify method, UNSUPPORTED_PROTOCOL_VERSION, and verify's daemon-supported stage subset.
