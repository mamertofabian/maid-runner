schema: "2"
goal: "Reduce TypeScript MAID validation and test runtime from minutes to seconds"
type: fix
created: "2026-05-09"
description: |
  Avoid invoking the TypeScript compiler bridge for import and re-export cases
  MAID can resolve locally, and batch compatible Vitest validation commands in
  `maid test`.

  Rationale: validating the atomic-carpool project currently takes 213 seconds.
  A no-compiler profile of the same validation takes under one second and shows
  237 compiler bridge requests, mostly relative imports, external package
  imports, and re-export checks against modules that can be rejected or resolved
  locally. `maid test` has the same process-multiplication issue for projects
  whose manifests use one `npx vitest run ...` command per contract.
temptations:
  - risk: "Do not remove compiler-backed resolution entirely to gain speed."
    instead: "Keep the compiler fallback for workspace package exports and other cases the local resolver cannot prove."
  - risk: "Do not make third-party packages look like project source modules."
    instead: "Return installed external package specifiers unchanged without launching the compiler bridge."
  - risk: "Do not batch Vitest commands with different runners or option sets."
    instead: "Batch only commands that normalize to the same Vitest prefix and options, preserving target order."
  - risk: "Do not rely on a wall-clock assertion that can flake in CI."
    instead: "Assert the compiler bridge is not invoked for locally decidable paths and that Vitest commands collapse to one process."
files:
  edit:
    - path: maid_runner/core/ts_module_paths.py
      artifacts:
        - kind: function
          name: resolve_ts_import
          args:
            - name: specifier
              type: str
            - name: importer_module
              type: str
            - name: project_root
              type: Path
          returns: str
        - kind: function
          name: resolve_ts_reexport
          args:
            - name: module
              type: str
            - name: name
              type: str
            - name: project_root
              type: Path
          returns: Optional[tuple[str, str]]
    - path: maid_runner/core/test_runner.py
      artifacts:
        - kind: function
          name: run_tests
          args:
            - name: manifest_dir
              type: Union[str, Path]
              default: "'manifests/'"
          returns: BatchTestResult
    - path: tests/core/test_ts_module_paths.py
      artifacts:
        - kind: test_function
          name: test_relative_import_uses_path_resolver_without_compiler
        - kind: test_function
          name: test_paths_alias_resolves_without_compiler
        - kind: test_function
          name: test_installed_external_package_import_skips_compiler
        - kind: test_function
          name: test_external_package_reexport_skips_compiler
        - kind: test_function
          name: test_recursive_barrel_reexport_resolves_without_compiler
    - path: tests/core/test_test_runner.py
      artifacts:
        - kind: test_function
          name: test_default_batches_compatible_vitest_commands
  read:
    - maid_runner/core/ts_compiler_resolver.py
    - maid_runner/core/ts_compiler_resolver.cjs
    - maid_runner/validators/typescript.py
    - manifests/add-typescript-compiler-backed-identity-resolution.manifest.yaml
    - manifests/fix-typescript-compiler-resolution-cache.manifest.yaml
    - manifests/batch-compatible-maid-test-command-groups.manifest.yaml
    - manifests/restore-maid-test-auto-batch.manifest.yaml
validate:
  - uv run python -m pytest -q tests/core/test_ts_module_paths.py tests/core/test_test_runner.py
