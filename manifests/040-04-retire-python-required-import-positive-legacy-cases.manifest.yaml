schema: "2"
goal: "Retire duplicated Python required-import positive legacy tests from tests/core/test_validate.py"
type: refactor
created: "2026-05-24"
metadata:
  tags:
    - safe-refactor
    - validation
    - test-retirement
    - priority-6
  priority: medium
description: |
  Continue Priority 6 by retiring a narrow batch of duplicated Python
  required-import positive legacy cases from tests/core/test_validate.py.

  The focused required-import suite already carries representative E320
  behavior. This slice adds the remaining Python positive variants before
  deleting their legacy duplicates: no imports field, symbol-name matching,
  path-style imports without the .py extension, and dotted import matching.
temptations:
  - risk: "Do not remove TypeScript, CommonJS, compiler-backed, or active legacy required-import smoke tests in this Python-only slice."
    instead: "Retire only the four Python positive legacy tests named by this manifest and keep test_ts_relative_import_resolves_to_manifest_path present."
  - risk: "Do not alter E320 required-import semantics while retiring tests."
    instead: "Only move characterization coverage into tests/core/validation/test_required_imports.py and leave ValidationEngine behavior untouched."
  - risk: "Do not remove active test_function artifacts from tests/core/test_validate.py."
    instead: "Retire only names absent from the active merged chain and keep active smoke tests present."
files:
  edit:
    - path: tests/core/validation/test_required_imports.py
      artifacts:
        - kind: test_function
          name: test_missing_imports_field_skips_required_import_check
          source_scenario: "A manifest-created Python file declares no imports field."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "Implementation validation reports no ErrorCode.MISSING_REQUIRED_IMPORT errors."
        - kind: test_function
          name: test_python_required_import_can_match_imported_symbol_name
          source_scenario: "A manifest requires an imported Python symbol name instead of the full module path."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "Implementation validation accepts the imported symbol and reports no ErrorCode.MISSING_REQUIRED_IMPORT errors."
        - kind: test_function
          name: test_python_path_style_without_extension_matches_dotted_import
          source_scenario: "A manifest requires a path-style Python import without .py and the source uses a dotted import."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "Implementation validation accepts the dotted import and reports no ErrorCode.MISSING_REQUIRED_IMPORT errors."
        - kind: test_function
          name: test_python_dotted_required_import_matches_dotted_import
          source_scenario: "A manifest requires a dotted Python module path and the source imports that module."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "Implementation validation accepts the dotted import and reports no ErrorCode.MISSING_REQUIRED_IMPORT errors."
    - path: tests/core/test_validate.py
      artifacts:
        - kind: test_function
          name: test_ts_relative_import_resolves_to_manifest_path
          source_scenario: "A TypeScript source imports a manifest-required module through a relative path."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "The already-active legacy required-import smoke test remains present and executable."
  read:
    - manifests/038-02-add-lean-required-import-characterization.manifest.yaml
    - manifests/040-03-retire-required-import-missing-legacy-cases.manifest.yaml
validate:
  - uv run python -m pytest -q tests/core/validation/test_required_imports.py tests/core/test_validate.py
