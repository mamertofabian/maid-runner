# draft-kind: implementation
schema: "2"
goal: "Make maid verify adoptable for the repository while preserving strict behavioral failures"
type: fix
created: "2026-05-20"
metadata:
  status: draft
  maid_task_base: main
  tags:
    - verify
    - warning-policy
    - anti-gaming
  priority: high
description: |
  `maid verify` should be the repository done gate, but the current default
  fails before later stages because historical implementation warnings such as
  E307 no-validator diagnostics for docs/config files and E310 false positives
  on abstract base methods are treated as blocking.

  Preserve strict failure for behavioral warning regressions such as missing
  assertions while keeping historical or non-actionable implementation warnings
  visible and advisory. This makes the full-repository gate adoptable without
  hiding the warnings from text or JSON output.
temptations:
  - risk: "Do not make all verify warnings advisory."
    instead: "Keep behavioral warnings such as missing assertions blocking for new manifests."
  - risk: "Do not hide implementation warnings."
    instead: "Keep E307 and remaining warnings visible in verify output while making no-validator diagnostics advisory."
  - risk: "Do not weaken real stub detection."
    instead: "Only suppress E310 for @abstractmethod placeholders, which are API contracts rather than incomplete implementations."
files:
  edit:
    - path: maid_runner/cli/commands/verify.py
      artifacts:
        - kind: function
          name: _has_blocking_validation_warnings
          args:
            - name: result
            - name: project_root
              type: Path
            - name: fail_on_warnings
              type: bool
          returns: bool
          description: "Treat advisory warning codes as visible but non-blocking while preserving strict failure for blocking warnings."
        - kind: function
          name: _validation_warnings_are_blocking
          args:
            - name: validation
            - name: project_root
              type: Path
          returns: bool
          description: "Determine whether a validation result contains warnings that should fail a verify stage."
        - kind: function
          name: _warnings_are_blocking
          args:
            - name: warnings
            - name: manifest_path
              type: str
            - name: project_root
              type: Path
          returns: bool
          description: "Filter advisory warning codes before applying manifest warning-fatal policy."
    - path: maid_runner/validators/_python_implementation.py
      artifacts:
        - kind: function
          name: _is_stub_body
          args:
            - name: node
          returns: bool
          description: "Detect placeholder bodies while treating abstract methods as declared contracts rather than implementation stubs."
        - kind: function
          name: _has_abstractmethod_decorator
          args:
            - name: node
          returns: bool
          description: "Recognize @abstractmethod and abc.abstractmethod decorators on Python functions."
    - path: tests/core/test_validate.py
      artifacts:
        - kind: test_function
          name: test_abstract_method_not_detected_as_stub_warning
          source_scenario: "A class has an @abstractmethod whose body is pass."
          actions:
            - type: api_call
              subject:
                export: validate
          expected:
            behavior: "Implementation validation with check_stubs=True does not emit ErrorCode.STUB_FUNCTION_DETECTED for the abstract method."
        - kind: test_function
          name: test_custom_abstractmethod_attribute_detected_as_stub_warning
          source_scenario: "A class has a pass body decorated with a custom fake.abstractmethod attribute."
          actions:
            - type: api_call
              subject:
                export: validate
          expected:
            behavior: "Implementation validation with check_stubs=True still emits ErrorCode.STUB_FUNCTION_DETECTED because only @abstractmethod and @abc.abstractmethod are treated as ABC contracts."
    - path: tests/cli/test_verify_cmd.py
      artifacts:
        - kind: test_function
          name: test_verify_validator_unavailable_warning_is_advisory_by_default
          source_scenario: "A new manifest has an E307 no-validator warning for README.md."
          actions:
            - type: api_call
              subject:
                export: _warnings_are_blocking
          expected:
            behavior: "The E307 warning is classified as advisory even for a new manifest so verify can keep it visible without failing the gate."
  read:
    - manifests/032-03-make-verify-strict-by-default.manifest.yaml
    - manifests/037-01-add-task-baseline-changed-scope-gate.manifest.yaml
validate:
  - uv run python -m pytest -q tests/core/test_validate.py tests/cli/test_verify_cmd.py
