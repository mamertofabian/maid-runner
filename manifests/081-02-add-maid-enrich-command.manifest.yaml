  priority: medium
description: |
  Command child of the 081 hybrid epic. Adds the deterministic runner-side
  building blocks the `maid-outcome-enrich` skill (081-04) orchestrates. This
  command NEVER calls an AI service, opens an LLM network socket, or reads
  provider API keys — that responsibility is entirely the skill's, preserving
  the AI-free runner boundary in `docs/manifest-outcome-records.md`.

  New file `maid_runner/cli/commands/enrich.py` exposes `cmd_enrich(args)`
  dispatching three subcommands:

  - `maid enrich prompt`: read the Outcome index (with the standard staleness
    guard), call `build_enrichment_request` (081-01), and emit the bounded
    system/user prompt and validation universe to stdout or `--output`. This is
    the corpus the skill sends to its model.
  - `maid enrich validate`: read the index and a candidate digest file, run
    `validate_enrichment_digest` plus `digest_is_stale`, and exit non-zero with
    a clear message on any fabrication or staleness. This is how the runner
    rejects bad model output.
  - `maid enrich render`: read a digest file, validate it against the index, and
    render advisory markdown via `render_digest_markdown` (081-01), written
    atomically to `--md-output`.

  Pinned decisions (do not redesign):

  1. No model access in the runner: no provider/base-url/model/timeout/api-key
     flags, no httpx/urllib-to-an-LLM, no os.environ provider keys. The command
     is pure read/transform/validate/write over local files.
  2. Configurable paths: `--index` (default `.maid/outcomes.json`), `--digest`
     (default `.maid/outcomes-digest.json`), `--md-output` (default
     `.maid/outcomes-digest.md`), `--output` for the prompt corpus. Do not
     hardcode beyond these defaults.
  3. Staleness: reuse the index staleness guard and require `--allow-stale-index`
     to operate on a stale index, mirroring `insights`/`recall`.
  4. Atomic render: serialize/render fully, then write to a temp file and rename,
     so a render failure never leaves a truncated markdown file behind.
  5. Error/JSON output mirrors the existing `learn.py`/`insights.py` `_error`
     pattern. Registration in `_main.py` edits `build_parser` and `main` to add
     the `enrich` subparser and dispatch, following the precedent of
     `manifests/047-04-add-maid-recall-outcome-search.manifest.yaml` and
     `manifests/047-05-add-maid-insights-outcome-aggregation.manifest.yaml`,
     which both declared `_main.py` under `files.edit`.
  6. Command docs stay in lockstep with parser registration. The existing
     command-docs test asserts every registered top-level `maid` command appears
     in `README.md` or `docs/ROADMAP.md`, so this child also documents
     `maid enrich` as the deterministic prompt/validate/render counterpart to
     the agent skill.

  Generated artifacts `.maid/outcomes-digest.json` and `.maid/outcomes-digest.md`
  are added to `.gitignore` alongside the existing `.maid/outcomes.json`.

  Tests are deterministic and offline: candidate digests are constructed in
  tests; no network or model is involved.
temptations:
- risk: Do not add provider/model/base-url/timeout/api-key flags or any LLM call to maid enrich.
  instead: Keep the command read/transform/validate/write only; the model call lives in the 081-04 skill. Pin with a test that enrich validate rejects a fabricated digest without any network.
- risk: Do not write a truncated or single-sided artifact when rendering fails.
  instead: Render fully, write to a temp path, then atomically rename; pin with an atomic-render test.
- risk: Do not operate silently on a stale Outcome index.
  instead: Reuse the staleness guard and require --allow-stale-index; pin with a stale-rejection test.
- risk: Do not leave _main.py under files.read for a new subcommand or register maid enrich without updating command docs.
  instead: Declare _main.py under files.edit, contract build_parser/main, add concise README/ROADMAP coverage for `maid enrich`, and run the existing command-docs test.
- risk: Do not duplicate digest validation logic in the CLI.
  instead: Delegate to validate_enrichment_digest and digest_is_stale from 081-01; the CLI only wires arguments and reports results.
files:
  create:
  - path: maid_runner/cli/commands/enrich.py
    artifacts:
    - kind: function
      name: cmd_enrich
      args:
      - name: args
        type: argparse.Namespace
      returns: int
      description: Dispatch the enrich prompt/validate/render subcommands deterministically over local files; never call a model. Return non-zero on validation failure, staleness without opt-in, or missing inputs.
  - path: tests/cli/test_enrich_cmd.py
    artifacts:
    - kind: test_function
      name: test_enrich_prompt_emits_bounded_corpus_from_index
      args: []
      returns: None
      description: maid enrich prompt emits the system/user prompt and validation universe derived from the index.
    - kind: test_function
      name: test_enrich_validate_accepts_grounded_digest
      args: []
      returns: None
      description: maid enrich validate returns 0 for a digest whose references all co-occur in the index and whose fingerprint matches.
    - kind: test_function
      name: test_enrich_validate_rejects_fabricated_digest
      args: []
      returns: None
      description: maid enrich validate returns non-zero for a digest citing a non-co-occurring (manifest, lesson_type) pair, with no network involved.
    - kind: test_function
      name: test_enrich_validate_rejects_stale_digest_without_allow_flag
      args: []
      returns: None
      description: maid enrich validate returns non-zero for a stale digest unless --allow-stale-index is supplied.
    - kind: test_function
      name: test_enrich_render_writes_markdown_atomically
      args: []
      returns: None
      description: maid enrich render writes the advisory markdown for a validated digest and leaves no partial file when rendering is interrupted.
  edit:
  - path: maid_runner/cli/commands/_main.py
    artifacts:
    - kind: function
      name: build_parser
      args: []
      returns: argparse.ArgumentParser
      description: Expose the enrich subcommand group (prompt/validate/render) with index/digest/md-output/output path options and the stale-index opt-in.
    - kind: function
      name: main
      args:
      - name: argv
        type: list[str] | None
        default: None
      returns: int
      description: Dispatch the enrich command to cmd_enrich alongside the existing commands.
  - path: .gitignore
    artifacts:
    - kind: attribute
      name: _ignore_outcome_digest_artifacts
      of: gitignore
      type: ignore-pattern
      description: Ignore the generated advisory enrichment artifacts .maid/outcomes-digest.json and .maid/outcomes-digest.md.
  - path: README.md
    artifacts:
    - kind: attribute
      name: _readme_enrich_command_documentation
      of: documentation
      type: doc-section
      description: Concise user-facing command reference for `maid enrich` as the deterministic prompt/validate/render support command for Outcome enrichment.
  - path: docs/ROADMAP.md
    artifacts:
    - kind: attribute
      name: _roadmap_enrich_command_documentation
      of: documentation
      type: doc-section
      description: Roadmap/command surface note for `maid enrich` so parser command documentation remains complete.
