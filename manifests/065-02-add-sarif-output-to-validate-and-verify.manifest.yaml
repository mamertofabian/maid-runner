schema: '2'
goal: Add a --sarif <path> flag to maid validate and maid verify emitting deterministic SARIF 2.1.0 reports
type: feature
created: '2026-06-17T08:20:17Z'
metadata:
  epic: 065-00-ci-native-sarif-reporting
  tags:
  - ci-cd
  - sarif
  - reporting
  - diagnostics
  priority: medium
description: |
  Add `--sarif <path>` to `maid validate` and `maid verify`, serializing
  batch validation and verify results to SARIF 2.1.0: tool metadata, rules
  from the diagnostics registry shipped by 070-01 and exported by 065-01,
  results with physical locations (file, and line where available), severity
  mapping, and suggestion text carried in result messages. SARIF is a derived
  view over the existing result model; the `--json` contract remains the
  canonical machine output.

  Pinned decisions from epic 065-00. Do not redesign these:

  1. Flag: `--sarif <path>` on both `maid validate` and `maid verify`. The
     report is written on both pass and fail so CI uploads are
     unconditional. When the report path is writable, writing the report
     never changes validation or verification gate exit codes, including
     under `--strict` or advisory modes. If the SARIF path cannot be
     written, fail loudly as a report-output error instead of silently
     dropping the requested report.
  2. Severity mapping: error diagnostics map to SARIF level `error`,
     warnings to `warning`, advisory/info diagnostics to `note`. The
     mapping is derived from MAID's internal `Severity` values: error ->
     `error`, warning -> `warning`, and info/advisory -> `note`. The
     registry's `DiagnosticRule.default_severity` remains an internal MAID
     severity (`error`, `warning`, `info`); do not mutate registry data into
     SARIF-specific levels.
  3. Rule identity: the SARIF ruleId is the E-code (e.g. "E300"); rule
     metadata (short/full descriptions, help_uri) comes from
     `maid_runner/core/diagnostics_registry.py` via `get_rule`/`all_rules`.
     Every SARIF result must be traceable to the equivalent JSON
     diagnostic (same code, message, location).
  4. Determinism: identical validation results produce byte-identical
     SARIF. Results are sorted by file path, then line, then code.
     Run-level timestamp fields are omitted entirely.
  5. SARIF version target is 2.1.0. Tests validate emitted documents
     against the official SARIF 2.1.0 JSON schema vendored under the test
     tree; the schema is never fetched at test time.

  Implementation shape:

  - New module `maid_runner/core/sarif.py`:
    `sarif_level_for_severity` maps the internal Severity enum to SARIF
    levels per the pinned mapping; `build_sarif_report` converts a
    ValidationResult, BatchValidationResult, or VerificationResult into a
    SARIF 2.1.0 dict (one run, tool driver "maid-runner" with the package
    version, rules from all_rules() or the subset referenced by results,
    results with physicalLocation from each diagnostic's file/line where
    available, suggestion text appended to the result message). For
    VerificationResult, flatten validation-stage diagnostics plus
    ValidationError-compatible stage errors; include coherence issues by
    mapping them to the existing E4xx coherence ErrorCode family as the
    failure-packet path already does, and include file-tracking diagnostics
    with file locations rather than dropping non-validation stages.
    `write_sarif_report` serializes the dict to the output path with
    stable key order and a trailing newline so output is byte-stable.
  - `cmd_validate` and `cmd_verify` accept the parsed `--sarif` path and
    write the report after computing results, on both pass and fail,
    without touching the validation/verify return code when the write
    succeeds; if the write fails, print a visible error and return a CLI
    output failure instead of pretending the report exists. `build_parser`
    registers the flag on both subparsers.
  - Diagnostics without a location are still emitted as results (no
    physicalLocation region) and sort before located results in a
    deterministic way (treat missing path/line as lowest).

  Edge cases and test expectations:

  - Emitted documents validate against the vendored official SARIF 2.1.0
    JSON schema (tests/fixtures/sarif/sarif-schema-2.1.0.json), for empty
    results, single-result, and multi-file batch cases.
  - Determinism: serializing the same validation results twice produces
    byte-identical files; result ordering is file path, then line, then
    code.
  - No run-level timestamp fields appear anywhere in the document.
  - Severity mapping: an error-severity diagnostic yields level "error", a
    warning yields "warning", an advisory/info diagnostic yields "note".
  - Exit codes: with a writable report path, `maid validate --sarif
    out.sarif` and `maid verify --sarif out.sarif` return exactly the same
    exit code as the same invocation without the flag, on both passing and
    failing inputs, and the report file exists in both cases.
  - Every SARIF result's ruleId, message, and location are traceable to
    the corresponding JSON diagnostic on the same run.
  - An unwritable --sarif path fails loudly rather than silently dropping
    the report.

  Planning note: this draft pins `--sarif <path>` per the epic's
  "Decisions already made" section. Planning note: the vendored schema file
  tests/fixtures/sarif/sarif-schema-2.1.0.json is a test asset added
  alongside the behavioral tests (drafts do not create test assets), so it
  is referenced under files.read rather than files.create. Planning note:
  the epic anticipates splitting the serializer from the CLI wiring if
  this child grows past one implementation-sized draft; this draft keeps
  them together and should be split before promotion if review finds it
  too large.

  Out of scope: changing diagnostics registry metadata or repair recipes
  (070-01/065-01), GitHub Actions template wiring and upload (065-03), CI
  platform consumption documentation (065-04), and any change to what the
  validator reports or to the canonical --json output.
temptations:
- risk: Do not let successful report generation change validation semantics or gate exit codes.
  instead: Treat SARIF as a write-only derived view; assert in tests that pass/fail behavior is identical with and without the --sarif flag when the report path is writable, and assert unwritable paths fail visibly.
- risk: Do not emit nondeterministic SARIF that breaks diff-based tests and alert dedup.
  instead: Omit run-level timestamps, sort results by file path then line then code, and test byte-identical output for identical validation results.
- risk: Do not hand-roll SARIF structure from blog examples.
  instead: Validate emitted reports against the official SARIF 2.1.0 JSON schema vendored under tests/fixtures, never fetched at test time.
- risk: Do not fork the diagnostic model for SARIF emission.
  instead: Derive ruleIds and metadata from the shipped diagnostics registry and map internal Severity values to SARIF levels in one serializer helper.
files:
  create:
  - path: maid_runner/core/sarif.py
    artifacts:
    - kind: function
      name: sarif_level_for_severity
      args:
      - name: severity
        type: Severity
      returns: str
      source_scenario: Diagnostics with error, warning, and info severities are mapped to SARIF levels.
      actions:
      - type: api_call
        subject:
          function: sarif_level_for_severity
      expected:
        behavior: Maps error to error, warning to warning, and advisory/info to note, matching the registry-documented mapping.
    - kind: function
      name: build_sarif_report
      args:
      - name: result
        type: Union[ValidationResult, BatchValidationResult, VerificationResult]
      returns: dict
      source_scenario: A completed validate or verify run is converted to a SARIF 2.1.0 document.
      actions:
      - type: api_call
        subject:
          function: build_sarif_report
      expected:
        behavior: Returns a SARIF 2.1.0 dict with tool metadata, rules sourced from the diagnostics registry, ruleId equal to the E-code, physical locations where available, suggestion text in result messages, results sorted by file path then line then code, and no run-level timestamps.
    - kind: function
      name: write_sarif_report
      args:
      - name: report
        type: dict
      - name: output_path
        type: Union[str, Path]
      returns: None
      source_scenario: The same report dict is written twice.
      actions:
      - type: api_call
        subject:
          function: write_sarif_report
      expected:
        behavior: Writes byte-identical, schema-valid SARIF JSON with stable key order for identical input, and fails loudly for unwritable paths.
  edit:
  - path: maid_runner/cli/commands/validate.py
    artifacts:
    - kind: function
      name: cmd_validate
      args:
      - name: args
        type: argparse.Namespace
      returns: int
      source_scenario: maid validate runs with --sarif out.sarif on passing and failing manifests.
      actions:
      - type: api_call
        subject:
          function: cmd_validate
      expected:
        behavior: Writes the SARIF report to the requested path on both pass and fail and returns exactly the same exit code as the run without the flag.
  - path: maid_runner/cli/commands/verify.py
    artifacts:
    - kind: function
      name: cmd_verify
      args:
      - name: args
        type: argparse.Namespace
      returns: int
      source_scenario: maid verify runs with --sarif out.sarif on passing and failing projects.
      actions:
      - type: api_call
        subject:
          function: cmd_verify
      expected:
        behavior: Writes the SARIF report on both pass and fail, derives results from the same diagnostics as the JSON output, and never alters exit codes including under --strict or advisory modes.
  - path: maid_runner/cli/commands/_main.py
    artifacts:
    - kind: function
      name: build_parser
      args: []
      returns: argparse.ArgumentParser
      source_scenario: Users pass --sarif to maid validate and maid verify.
      actions:
      - type: api_call
        subject:
          function: build_parser
      expected:
        behavior: Both the validate and verify subparsers accept --sarif <path> with no default report written when the flag is absent.
  read:
  - maid_runner/core/result.py
  - maid_runner/core/diagnostics_registry.py
  - maid_runner/cli/commands/_format.py
  - tests/fixtures/sarif/sarif-schema-2.1.0.json
  - tests/core/test_sarif.py
  - tests/cli/test_sarif_flag.py
validate:
- uv run python -m pytest -q tests/core/test_sarif.py tests/cli/test_sarif_flag.py
- uv run maid validate manifests/065-02-add-sarif-output-to-validate-and-verify.manifest.yaml --mode behavioral --quiet
- uv run maid validate manifests/065-02-add-sarif-output-to-validate-and-verify.manifest.yaml --mode schema --quiet
outcome:
  status: completed
  completed_at: "2026-06-17T08:55:00Z"
  summary: "Added deterministic SARIF 2.1.0 output for maid validate and maid verify through a new serializer, --sarif parser flags, and CLI write paths that preserve normal exit codes when report writing succeeds."
  rationale: "CI systems can now upload validation and verify diagnostics as SARIF while MAID's existing JSON/result model remains canonical. Rule metadata is sourced from the diagnostics registry, SARIF levels are derived from internal Severity values, and output omits volatile run timestamps."
  lessons:
    - lesson_type: workflow
      summary: "Initial implementation review caught an invalid plan-lock state after behavioral tests were corrected post-lock. The blocker was resolved by adding new failing behavioral coverage for the missing report-object and coherence-only paths, revising the plan lock with valid red evidence, then preserving that evidence after formatting-only test changes."
      tags:
        - plan-lock
        - red-evidence
        - review-loop
      paths:
        - .maid/plan-locks/065-02-add-sarif-output-to-validate-and-verify.lock.json
        - tests/core/test_sarif.py
        - tests/cli/test_sarif_flag.py
    - lesson_type: implementation
      summary: "Verify SARIF must include diagnostics from nested report objects stored in VerificationStageResult._errors, not only direct ValidationError entries, because JSON verify output expands artifact coverage and knockout reports."
      tags:
        - sarif
        - verify
        - diagnostics
      paths:
        - maid_runner/core/sarif.py
        - maid_runner/cli/commands/_format.py
    - lesson_type: implementation
      summary: "Parser-level support for --sarif is not enough; alternate command paths such as validate --coherence-only need explicit report writes so requested report files are never silently omitted."
      tags:
        - cli
        - sarif
        - coherence
      paths:
        - maid_runner/cli/commands/validate.py
  review_notes:
    - source: implementation-review-subagent
      severity: blocker
      summary: "Initial review returned needs changes due invalid red evidence, missing verify report-object diagnostics, and missing validate --coherence-only SARIF output."
    - source: implementation-review-subagent
      severity: info
      summary: "Final re-review found no actionable findings and returned ready. Residual risk is limited to thinner direct coverage for validate --run-tests and validate --artifact-coverage SARIF contents."
