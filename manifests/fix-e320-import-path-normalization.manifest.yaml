schema: "2"
goal: "Fix E320 import validation to normalize paths before comparison"
type: fix
created: "2026-04-04"
description: |
  E320 import matching uses exact string comparison, causing false mismatches:
  1. TS/JS relative imports like ../../src/models/Budget.ts never match
     manifest declarations like src/models/Budget.
  2. Python path-style required_imports like src/models/user.py never match
     dotted imports like src.models.user collected by the AST parser.
  Fix by normalizing import paths: posixpath resolution for TS/JS,
  path-to-dotted conversion for Python, extension stripping for both.

files:
  edit:
    - path: maid_runner/core/validate.py
      artifacts:
        - kind: function
          name: _check_required_imports
    - path: tests/e2e/test_archspec_pipeline.py
      artifacts:
        - kind: method
          name: test_full_pipeline
          of: TestArchSpecPipeline
  read:
    - tests/core/test_validate.py

validate:
  - pytest tests/core/test_validate.py::TestImportVerification -v
  - pytest tests/e2e/test_archspec_pipeline.py::TestArchSpecPipeline::test_full_pipeline -v
