schema: '2'
goal: Keep maid test fast by excluding E2E and acceptance-layer commands
type: fix
created: '2026-06-25T12:56:13Z'
supersedes:
- gate-archspec-e2e-strict-mode
- 045-02-extract-test-runner-stream-orchestration
description: |
  `maid test` is the fast behavioral contract gate. Acceptance and browser E2E
  checks are a layer above that gate and must not execute from `maid test`,
  `maid test --manifest`, `validate --run-tests`, or the shared verify tests
  stage.

  The manifest acceptance section remains valid metadata for future tooling and
  path validation, but the test runner ignores acceptance commands. Validate
  commands fail loudly when they point at known E2E/browser execution shapes so
  slow browser flows cannot contaminate the behavioral gate.

  This supersedes the old ArchSpec E2E-only strict-mode contract because that
  contract belongs to an E2E layer, not the fast MAID behavioral gate.
temptations:
- risk: Do not silently skip E2E commands from validate.
  instead: Return a validation error that tells users to move browser/E2E checks out of validate.
- risk: Do not add an opt-in acceptance flag to maid test.
  instead: Keep maid test fast-only; leave any future E2E runner to a separate command or workflow.
- risk: Do not delete acceptance schema or metadata handling.
  instead: Preserve manifest parsing and acceptance path validation while removing execution from test_runner.
- risk: Do not classify ordinary .spec.ts files, tests/acceptance files, or selector values as E2E by filename alone.
  instead: Reject explicit browser runners, e2e path components, and e2e script names after normalizing package-manager options and wrappers; leave selector-bearing commands on the existing integrity diagnostic path.
files:
  edit:
  - path: maid_runner/core/test_runner.py
    artifacts:
    - kind: function
      name: run_manifest_tests
      args:
      - name: manifest_path
        type: Union[str, Path]
      - name: fail_fast
        type: bool
        default: 'False'
      - name: project_root
        type: Union[str, Path]
        default: '''.'''
      returns: BatchTestResult
    - kind: function
      name: run_tests
      args:
      - name: manifest_dir
        type: Union[str, Path]
        default: '''manifests/'''
      - name: fail_fast
        type: bool
        default: 'False'
      - name: project_root
        type: Union[str, Path]
        default: '''.'''
      - name: batch
        type: bool | None
        default: None
      - name: jobs
        type: int
        default: '1'
      returns: BatchTestResult
  - path: maid_runner/core/_validation_test_artifacts.py
    artifacts:
    - kind: function
      name: validate_manifest_test_commands
      args:
      - name: manifest
        type: Manifest
      - name: project_root
        type: Path
      returns: list[ValidationError]
  - path: maid_runner/core/result.py
    artifacts:
    - kind: attribute
      name: E2E_VALIDATE_COMMAND_NOT_ALLOWED
      of: ErrorCode
      type: str
  - path: tests/core/test_test_runner.py
    artifacts:
    - kind: test_function
      name: test_run_manifest_tests_ignores_acceptance_commands
      source_scenario: A single manifest declares an acceptance command that would fail and a fast validate command that passes.
      actions:
      - type: api_call
        subject:
          export: run_manifest_tests
      expected:
        behavior: The acceptance command is not executed, the validate command runs, and the result has no acceptance stream entries.
    - kind: test_function
      name: test_run_tests_ignores_acceptance_commands_while_batching_implementation
      source_scenario: Multiple active manifests include acceptance commands plus compatible pytest validate commands.
      actions:
      - type: api_call
        subject:
          export: run_tests
      expected:
        behavior: Only the batched implementation command executes and no acceptance stream entries are reported.
  - path: tests/cli/test_validate_cmd.py
    artifacts:
    - kind: test_function
      name: test_validate_command_integrity_rejects_e2e_validate_commands
      source_scenario: A manifest puts explicit browser/E2E commands in validate.
      actions:
      - type: api_call
        subject:
          export: validate_manifest_test_commands
      expected:
        behavior: Validation reports ErrorCode.E2E_VALIDATE_COMMAND_NOT_ALLOWED for each E2E validate command.
    - kind: test_function
      name: test_validate_command_integrity_rejects_wrapped_e2e_without_test_files
      source_scenario: A manifest has no discoverable behavioral tests and puts package-manager-wrapped E2E or selector-bearing browser commands in validate.
      actions:
      - type: api_call
        subject:
          export: validate_manifest_test_commands
      expected:
        behavior: Validation still reports ErrorCode.E2E_VALIDATE_COMMAND_NOT_ALLOWED instead of letting coverage checks skip the command.
    - kind: test_function
      name: test_validate_command_integrity_keeps_e2e_marker_on_selector_error
      source_scenario: A validate command uses e2e as a pytest selector value rather than an E2E path or script name.
      actions:
      - type: api_call
        subject:
          export: validate_manifest_test_commands
      expected:
        behavior: Validation reports the existing selector integrity error instead of classifying the selector value as an E2E path.
    - kind: test_function
      name: test_validate_command_integrity_allows_e2e_acceptance_metadata
      source_scenario: A manifest records the same E2E commands in acceptance.tests while validate runs fast behavioral tests.
      actions:
      - type: api_call
        subject:
          export: validate_manifest_test_commands
      expected:
        behavior: No E2E validate-command error is reported because acceptance metadata is not the fast validate stream.
  - path: tests/cli/test_test_cmd.py
    artifacts:
    - kind: test_function
      name: test_json_output_excludes_acceptance_commands
      source_scenario: The maid test CLI runs a project whose manifest includes failing acceptance metadata and a passing validate command.
      actions:
      - type: api_call
        subject:
          command: maid test --json
      expected:
        behavior: JSON reports only implementation test results and contains no acceptance stream entries.
  read:
  - maid_runner/core/types.py
  - maid_runner/core/_test_runner_invocation.py
  - maid_runner/core/_test_command_targets.py
  - maid_runner/core/validate.py
  - maid_runner/cli/commands/verify.py
  - maid_runner/cli/commands/validate.py
validate:
- pytest tests/core/test_test_runner.py tests/cli/test_validate_cmd.py tests/cli/test_test_cmd.py -v
outcome:
