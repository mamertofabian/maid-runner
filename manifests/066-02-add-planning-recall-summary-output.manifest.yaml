          type: str
        - kind: attribute
          name: entries
          of: PlanPacketSection
          type: tuple[str, ...]
        - kind: attribute
          name: omitted_count
          of: PlanPacketSection
          type: int
        - kind: class
          name: PlanPacket
          description: "Deterministic compact planning summary derived from manifest-based recall matches."
        - kind: attribute
          name: manifest_path
          of: PlanPacket
          type: str
        - kind: attribute
          name: sections
          of: PlanPacket
          type: tuple[PlanPacketSection, ...]
        - kind: function
