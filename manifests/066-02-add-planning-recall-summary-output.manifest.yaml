# draft-kind: implementation
schema: "2"
goal: "Add the `--plan-packet` planning report mode to `maid recall --for-manifest`"
type: feature
created: "2026-06-10T06:02:00Z"
metadata:
  epic: 066-00-outcome-recall-planning-integration.epic
  tags:
    - outcome-records
    - recall
    - learning
    - maid-workflow
  priority: medium
description: |
  Add a planning-oriented report mode to the manifest-derived recall command
  shipped by 066-01. The mode is the flag `--plan-packet` on the SAME command:
  `maid recall --for-manifest <path> --plan-packet`. It renders a compact,
  deterministic summary block suitable for inclusion in plan-review packets.

  Pinned decisions (do not redesign):

  1. The planning report mode is the flag `--plan-packet` on the same
     `maid recall` command, not a new subcommand.
  2. Output is a deterministic compact block with FIXED section order:
     first related manifests, second outcome statuses, third recurring
     lessons touching the same paths, fourth prior validation-command
     failures.
  3. Each section shows at most 5 entries, ordered with the existing stable
     recall tie-breakers (score descending, then manifest slug, then manifest
     path; within a single manifest, index order of the underlying records).
     Truncation is reported explicitly with the omitted count (for example
     "... 3 more omitted").
  4. Stale-index behavior matches existing recall semantics: fail with the
     stale-index error unless `--allow-stale-index` is passed; never silently
     answer from stale data during planning.
  5. Recall consultation is advisory in this epic. The plan packet is
     planning evidence only; it never replaces a manifest's own behavioral
     tests, declared artifacts, validation commands, or implementation
     review, and no done-gate or promotion gate starts requiring it.
  6. No AI inference, embeddings, or generated prose. Every entry in the
     packet is traceable to an explicit Outcome index record field.

  Section content (derived from the ranked matches of the 066-01 derivation
  against the learned index):

  - Related manifests: manifest slug and path of each ranked match.
  - Outcome statuses: the Outcome status of each related manifest.
  - Recurring lessons touching the same paths: lessons from related records
    whose lesson paths overlap the query manifest's declared file paths.
  - Prior validation-command failures: validation evidence entries from
    related records whose status is not passed.

  Behavioral test expectations (from the epic): output ordering and
  truncation rules must be explicit and tested. Tests cover the fixed
  section order, the at-most-5-entries cap with explicit omitted counts,
  byte-stable output for identical inputs, empty-section rendering (a
  section with no entries states that explicitly rather than disappearing,
  keeping the block shape deterministic), and `--json` output carrying the
  same sections, entries, and omitted counts as the text block.

  Planning note: the epic does not state whether `--plan-packet` is valid
  without `--for-manifest`. Conservative reading: `--plan-packet` requires
  `--for-manifest` and combining it with hand-written filters alone is a
  usage error, because every packet section is defined relative to a query
  manifest.

  Planning note: the epic does not pin a JSON flag for the packet.
  Conservative reading: reuse the existing `--json` flag so the command
  surface gains exactly one new flag.

  Out of scope for this child: signal derivation itself (066-01, a hard
  dependency that must land first), agent skill guidance (066-03), and init
  payload sync (066-04).
temptations:
  - risk: "Do not generate prose summaries or let entry selection depend on inference."
    instead: "Build every packet section by deterministic selection from explicit Outcome index record fields, reusing the existing ranking and tie-breakers."
  - risk: "Do not silently truncate sections or reorder them between runs."
    instead: "Use the fixed section order, cap each section at 5 entries with stable tie-breakers, and report the omitted count explicitly."
  - risk: "Do not let the plan packet gate validation, done states, or promotion."
    instead: "Keep the packet advisory planning evidence; enforcement would be a separate future contract."
  - risk: "Do not silently answer planning queries from a stale Outcome index."
    instead: "Reuse the existing stale-index failure and require the explicit --allow-stale-index opt-in."
