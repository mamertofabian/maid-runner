          expected:
            behavior: "Sections appear in the fixed order (related manifests, outcome statuses, recurring lessons touching the same paths, prior validation-command failures), each capped at limit_per_section entries with stable tie-breakers and an explicit omitted count."
        - kind: function
          name: render_plan_packet
          args:
            - name: packet
              type: PlanPacket
          returns: str
          source_scenario: "The same plan packet is rendered twice."
          actions:
            - type: api_call
              subject:
                function: render_plan_packet
          expected:
            behavior: "Rendering is byte-stable for identical inputs, keeps the fixed section order, states empty sections explicitly, and reports omitted counts."
    - path: maid_runner/cli/commands/recall.py
      artifacts:
        - kind: function
          name: cmd_recall
          args:
            - name: args
              type: argparse.Namespace
          returns: int
          source_scenario: "`maid recall --for-manifest <path> --plan-packet` renders a planning summary."
          actions:
            - type: api_call
              subject:
                function: cmd_recall
          expected:
            behavior: "The command renders the deterministic plan packet in text or --json, rejects --plan-packet without --for-manifest as a usage error, and preserves stale-index failure unless --allow-stale-index is passed."
    - path: maid_runner/cli/commands/_main.py
      artifacts:
        - kind: function
          name: build_parser
          args: []
          returns: argparse.ArgumentParser
          source_scenario: "A user invokes `maid recall --for-manifest <path> --plan-packet`."
          actions:
            - type: api_call
              subject:
                function: build_parser
          expected:
            behavior: "The recall parser accepts --plan-packet alongside --for-manifest and the existing recall options."
        - kind: function
          name: main
          args:
            - name: argv
              type: list[str] | None
              default: None
          returns: int
          source_scenario: "The parsed command is `recall` with --plan-packet."
          actions:
            - type: api_call
              subject:
                function: main
          expected:
            behavior: "The CLI dispatches to `maid_runner.cli.commands.recall.cmd_recall`."
    - path: manifests/066-01-add-recall-for-manifest-query.manifest.yaml
