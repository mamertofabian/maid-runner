schema: '2'
goal: Fix Python E200 false positives for sys.path-imported scripts in hyphenated skill directories
type: fix
created: '2026-06-27T06:35:27Z'
metadata:
  tags:
  - python
  - behavioral-coverage
  - identity
  - e200
  priority: high
description: |
  Python skill/tool scripts may live under non-package directories such as
  .codex/skills/pdf-book-lesson-compiler/scripts/. MAID derives artifact module
  identity from the file path, producing a dotted string with a leading dot and
  hyphenated path segment that cannot be a Python import module. Tests correctly
  import those scripts by inserting the scripts directory on sys.path and then
  importing the file stem, but the identity matcher currently compares the
  legal runtime import source against the non-importable path-derived module
  identity and reports E200.

  Preserve identity-backed E200 enforcement while accepting this specific
  Python script layout: a behavioral reference imported from the artifact file
  stem may cover an artifact whose path-derived Python module identity is not
  importable. This belongs in identity matching so Python collection and
  file_to_module_path remain stable for already-covered layouts.
temptations:
- risk: Do not silence E200 whenever a same-named artifact appears in any test.
  instead: Require an identity-bearing behavioral reference whose import_source matches the non-importable artifact module's file stem.
- risk: Do not count import-only declarations as behavioral coverage for skill scripts.
  instead: Keep the existing reference_context checks so the test must call, access, or otherwise exercise the artifact.
- risk: Do not apply Python identifier validity rules to TypeScript or Svelte path identities.
  instead: Handle only dotted Python-style module identities inside the shared matcher without changing slash-based module identity behavior.
- risk: Do not supersede older identity manifests for an additive compatibility case.
  instead: Chain-merge this regression with existing source-root and same-name identity contracts.
files:
  edit:
  - path: maid_runner/core/identity.py
    artifacts:
    - kind: function
      name: match_artifact_to_references
      args:
      - name: artifact
        type: FoundArtifact
      - name: references
        type: Iterable[FoundArtifact]
      - name: project_root
        type: Path
      - name: reexport_resolver
        type: Optional[_ReexportResolver]
        default: None
      returns: bool
      description: Match behavioral references to declared artifacts while accepting sys.path-imported Python script stems for non-importable path-derived module identities.
  - path: tests/core/test_identity_matching.py
    artifacts:
    - kind: test_function
      name: test_non_importable_python_module_path_matches_sys_path_module_stem_import
      source_scenario: A manifest path under .codex/skills/pdf-book-lesson-compiler/scripts produces a non-importable dotted module identity while the test imports extract_exercise_candidates from a sys.path-inserted scripts directory.
      actions:
      - type: api_call
        subject:
          export: match_artifact_to_references
      expected:
        behavior: The identity matcher accepts extract_exercise_candidates.extract_candidates as coverage for the script artifact.
    - kind: test_function
      name: test_non_importable_python_module_path_rejects_name_only_fallback
      source_scenario: A test calls a local same-name extract_candidates helper without any import_source while the manifest artifact has a non-importable path-derived module identity.
      actions:
      - type: api_call
        subject:
          export: match_artifact_to_references
      expected:
        behavior: The identity matcher rejects the local name-only call so the compatibility path cannot become a broad E200 bypass.
    - kind: test_function
      name: test_non_importable_python_module_path_rejects_unrelated_import_source
      source_scenario: A test imports extract_candidates from unrelated_helpers while the manifest artifact lives in a non-importable skill script path.
      actions:
      - type: api_call
        subject:
          export: match_artifact_to_references
      expected:
        behavior: The identity matcher rejects the unrelated import source despite the same artifact name.
    - kind: test_function
      name: test_importable_python_module_path_rejects_stem_only_import_source
      source_scenario: A manifest artifact lives in importable package module pkg.scripts.extract_exercise_candidates while a test imports extract_candidates from top-level extract_exercise_candidates.
      actions:
      - type: api_call
        subject:
          export: match_artifact_to_references
      expected:
        behavior: The identity matcher rejects stem-only coverage for importable dotted modules so the compatibility path stays limited to non-importable path identities.
  - path: tests/core/validation/test_behavioral_coverage.py
    artifacts:
    - kind: test_function
      name: test_sys_path_imported_python_script_in_hyphenated_skill_dir_satisfies_e200
      source_scenario: A temporary project declares .codex/skills/pdf-book-lesson-compiler/scripts/extract_exercise_candidates.py and tests it through a sys.path-inserted import of extract_exercise_candidates.
      actions:
      - type: api_call
        subject:
          export: ValidationEngine
      expected:
        behavior: Behavioral validation succeeds without E200 because the test calls the imported script artifact through its runtime module stem.
  read:
  - maid_runner/core/module_paths.py
  - maid_runner/validators/python.py
  - maid_runner/core/_behavioral_validation.py
  - maid_runner/core/validate.py
  - maid_runner/validators/base.py
  - manifests/add-semantic-reference-index.manifest.yaml
  - manifests/fix-python-src-root-identity-e200.manifest.yaml
  - manifests/040-29-retire-python-identity-e200-legacy-cases.manifest.yaml
  - manifests/040-35-retire-identity-backed-coverage-legacy-cases.manifest.yaml
validate:
- uv run python -m pytest -q tests/core/test_identity_matching.py tests/core/validation/test_behavioral_coverage.py
outcome:
  status: completed
  completed_at: "2026-06-27T06:55:00Z"
  summary: "Fixed Python E200 false positives for sys.path-imported scripts in hyphenated skill directories by allowing identity matching between a non-importable path-derived Python module identity and its runtime file-stem import source. The fix preserves identity-backed coverage: local name-only calls, unrelated import sources, import-only references, slash-based path identities, and importable dotted Python modules do not get the stem shortcut."
  rationale: "The downstream bug came from file_to_module_path deriving a dotted identity such as .codex.skills.pdf-book-lesson-compiler.scripts.extract_exercise_candidates, while correct tests import the script as extract_exercise_candidates after adding the scripts directory to sys.path. Keeping file_to_module_path unchanged avoids disturbing existing module identity contracts; the matcher now recognizes only invalid Python dotted identities whose final segment matches the reference import_source."
  lessons:
