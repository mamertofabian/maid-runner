schema: "2"
goal: "Retire duplicated JS/TS required-import positive legacy tests from tests/core/test_validate.py"
type: refactor
created: "2026-05-24"
metadata:
  tags:
    - safe-refactor
    - validation
    - test-retirement
    - priority-6
  priority: medium
description: |
  Continue Priority 6 by retiring a narrow batch of duplicated JavaScript and
  TypeScript required-import positive legacy cases from tests/core/test_validate.py.

  The focused required-import suite already covers representative Python,
  TypeScript relative, and CommonJS relative behavior. This slice adds the
  remaining basic JS/TS positive variants before deleting their legacy
  duplicates: deep relative import, dot-slash sibling import, exact package
  import, extension stripping, bare CommonJS require, re-export-from, and
  namespace import local binding.
temptations:
  - risk: "Do not remove parser-replacement or compiler-backed legacy tests that are still declared by older manifests."
    instead: "Retire only the seven basic JS/TS positive tests named by this manifest and keep the active TypeScript relative smoke test present."
  - risk: "Do not alter E320 required-import semantics while retiring tests."
    instead: "Only move characterization coverage into tests/core/validation/test_required_imports.py and leave ValidationEngine behavior untouched."
  - risk: "Do not remove active test_function artifacts from tests/core/test_validate.py."
    instead: "Retire only names absent from the active merged chain and keep active smoke tests present."
files:
  edit:
    - path: tests/core/validation/test_required_imports.py
      artifacts:
        - kind: test_function
          name: test_typescript_deep_relative_import_satisfies_manifest_path
          source_scenario: "A TypeScript test file imports ../../src/models/Budget while the manifest requires src/models/Budget."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "Implementation validation reports no ErrorCode.MISSING_REQUIRED_IMPORT errors."
        - kind: test_function
          name: test_typescript_dot_slash_import_satisfies_sibling_manifest_path
          source_scenario: "A TypeScript source imports ./utils while the manifest requires src/pages/utils."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "Implementation validation reports no ErrorCode.MISSING_REQUIRED_IMPORT errors."
        - kind: test_function
          name: test_typescript_package_import_matches_exact_required_import
          source_scenario: "A TypeScript source imports a bare package name that exactly matches the manifest import."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "Implementation validation reports no ErrorCode.MISSING_REQUIRED_IMPORT errors."
        - kind: test_function
          name: test_typescript_relative_import_with_extension_matches_extensionless_manifest_path
          source_scenario: "A TypeScript source imports ../models/Budget.ts while the manifest requires src/models/Budget."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "Implementation validation reports no ErrorCode.MISSING_REQUIRED_IMPORT errors."
        - kind: test_function
          name: test_commonjs_package_require_matches_exact_required_import
          source_scenario: "A JavaScript source requires a bare package name that exactly matches the manifest import."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "Implementation validation reports no ErrorCode.MISSING_REQUIRED_IMPORT errors."
        - kind: test_function
          name: test_typescript_reexport_from_satisfies_manifest_path
          source_scenario: "A TypeScript source re-exports from ./utils while the manifest requires src/utils."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "Implementation validation reports no ErrorCode.MISSING_REQUIRED_IMPORT errors."
        - kind: test_function
          name: test_typescript_namespace_import_matches_local_binding_name
          source_scenario: "A TypeScript source imports * as Models and the manifest requires Models."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "Implementation validation reports no ErrorCode.MISSING_REQUIRED_IMPORT errors."
    - path: tests/core/test_validate.py
      artifacts:
        - kind: test_function
          name: test_ts_relative_import_resolves_to_manifest_path
          source_scenario: "A TypeScript source imports a manifest-required module through a relative path."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "The already-active legacy required-import smoke test remains present and executable."
  read:
    - manifests/038-02-add-lean-required-import-characterization.manifest.yaml
    - manifests/040-04-retire-python-required-import-positive-legacy-cases.manifest.yaml
    - manifests/028-01-extract-js-ts-import-scanner.manifest.yaml
validate:
  - uv run python -m pytest -q tests/core/validation/test_required_imports.py tests/core/test_validate.py
