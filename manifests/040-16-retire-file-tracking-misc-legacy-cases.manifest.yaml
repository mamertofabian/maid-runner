schema: "2"
goal: "Retire duplicated file-tracking misc legacy tests from tests/core/test_validate.py"
type: refactor
created: "2026-05-24"
metadata:
  tags:
    - safe-refactor
    - validation
    - test-retirement
    - priority-6
  priority: medium
description: |
  Continue Priority 6 by removing two unpinned file-tracking duplicates from
  tests/core/test_validate.py: gitignored source-file suppression and
  files.read registration classification.

  The active file-tracking and worktree-scope legacy tests remain in
  tests/core/test_validate.py. Focused file-scope coverage already exercises
  the two retired behaviors; this slice tightens the files.read assertion to
  preserve the legacy issue-text check before deleting the duplicates.

  Older active manifests still require ValidationEngine.run_file_tracking to
  be behaviorally referenced from the legacy validation test surface. This
  slice therefore keeps one real run_file_tracking smoke test in
  tests/core/test_validate.py while moving the detailed duplicate variants to
  the focused suite.
temptations:
  - risk: "Do not remove active file-tracking or worktree-scope test_function artifacts from tests/core/test_validate.py."
    instead: "Retire only gitignored source-file suppression and read-only registration, leaving the pinned worktree and validate_all tracking tests in place."
  - risk: "Do not weaken files.read registration coverage."
    instead: "Assert registered status, not undeclared status, and the explanatory issue mentions read context in the focused suite."
  - risk: "Do not replace the run_file_tracking legacy-surface reference with a placeholder."
    instead: "Keep one executable smoke test that calls ValidationEngine.run_file_tracking and asserts a tracked source entry."
  - risk: "Do not change file-tracking implementation semantics."
    instead: "Only move characterization coverage and leave production code untouched."
files:
  edit:
    - path: tests/core/validation/test_file_scope_gates.py
      artifacts:
        - kind: test_function
          name: test_file_tracking_ignores_gitignored_source_file
          source_scenario: "File tracking runs in a git repository with a source-like file excluded by .gitignore."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "The ignored source file is absent from file-tracking entries."
        - kind: test_function
          name: test_file_tracking_classifies_files_read_as_registered
          source_scenario: "A manifest lists a dependency under files.read."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "File tracking marks the file as REGISTERED, not UNDECLARED, and records a read-context issue."
    - path: tests/core/test_validate.py
      artifacts:
        - kind: test_function
          name: test_validate_all_file_tracking_gate_fails_on_undeclared_source
          source_scenario: "validate_all runs with check_file_tracking=True while an undeclared source file exists."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "The already-active legacy validate_all file-tracking gate test remains present and executable."
        - kind: test_function
          name: test_run_file_tracking_smoke
          source_scenario: "A manifest creates a Python source file and file tracking runs directly against the manifest chain."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "The retained legacy smoke test calls ValidationEngine.run_file_tracking and reports the created source file in tracking entries."
  read:
    - manifests/030-07-add-file-tracking-fail-gates.manifest.yaml
    - manifests/030-09-add-worktree-scope-gate.manifest.yaml
    - manifests/fix-file-tracking-noise-filter.manifest.yaml
validate:
  - uv run python -m pytest -q tests/core/validation/test_file_scope_gates.py tests/core/test_validate.py
