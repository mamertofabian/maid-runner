  create:
  - path: tests/test_insights_skill_guidance.py
    artifacts:
    - kind: test_function
      name: test_auditor_insights_cadence_is_present_and_specific
      args: []
      returns: None
      description: Behavioral coverage that Claude and Codex maid-auditor skills contain an advisory `maid insights` cadence anchor tied to release / periodic health cadences.
    - kind: test_function
      name: test_auditor_insights_guidance_uses_only_registered_options
      args: []
      returns: None
      description: Behavioral coverage that Claude and Codex auditor insights guidance uses only registered insights options and contains no unregistered flags such as --tag or --include-status.
    - kind: test_function
      name: test_auditor_insights_guidance_handles_stale_index_explicitly
      args: []
      returns: None
      description: Behavioral coverage that Claude and Codex auditor insights guidance states stale indexes fail by default and names `maid learn` plus `--allow-stale-index` as the only remedies.
    - kind: test_function
      name: test_auditor_insights_guidance_synced_to_agent_payloads
      args:
      - name: tmp_path
        type: Path
      returns: None
      description: Behavioral coverage that generated Claude and Codex package copies equal the source maid-auditor skills after an isolated sync and carry the insights cadence anchor.
    - kind: test_function
      name: test_auditor_insights_guidance_is_distributed_to_codex
      args:
      - name: tmp_path
        type: Path
      returns: None
      description: Behavioral coverage that an isolated payload sync includes maid-auditor in the Codex distributable skill list and includes its skill-local OpenAI agent metadata.
    - kind: test_function
      name: test_codex_init_installs_auditor_insights_skill
      args:
      - name: tmp_path
        type: Path
      - name: monkeypatch
        type: pytest.MonkeyPatch
      returns: None
      description: Behavioral coverage that `maid init --tool codex` installs maid-auditor with insights cadence guidance while still excluding repo-internal maid-runner skills.
  - path: .codex/skills/maid-auditor/SKILL.md
    artifacts:
    - kind: attribute
      name: _codex_auditor_insights_cadence_guidance
      of: skill
      type: markdown section
      description: Codex source maid-auditor skill with the advisory `maid insights` cadence step, using only registered insights options and never gating the audit verdict.
  - path: .codex/skills/maid-auditor/agents/openai.yaml
    artifacts:
    - kind: attribute
      name: _codex_auditor_agent_metadata
      of: skill
      type: yaml document
      description: Codex skill-local OpenAI metadata for the maid-auditor skill.
  - path: maid_runner/codex/skills/maid-auditor/SKILL.md
    artifacts:
    - kind: attribute
      name: _codex_distributed_auditor_insights_cadence_guidance
      of: skill
      type: markdown section
      description: Generated Codex package copy of the auditor insights cadence guidance.
  - path: maid_runner/codex/skills/maid-auditor/agents/openai.yaml
    artifacts:
    - kind: attribute
      name: _codex_distributed_auditor_agent_metadata
      of: skill
      type: yaml document
      description: Generated Codex package copy of the maid-auditor skill-local OpenAI metadata.
  edit:
  - path: .claude/skills/maid-auditor/SKILL.md
    artifacts:
    - kind: attribute
      name: _auditor_insights_cadence_guidance
      of: skill
      type: markdown section
      description: Advisory `maid insights` cadence step for the auditor's release / periodic health checks, using only registered insights options and never gating the audit verdict.
  - path: maid_runner/claude/skills/maid-auditor/SKILL.md
    artifacts:
    - kind: attribute
      name: _distributed_auditor_insights_cadence_guidance
      of: skill
      type: markdown section
      description: Generated Claude package copy of the auditor insights cadence guidance.
  - path: scripts/sync_claude_files.py
    artifacts:
    - kind: function
      name: sync_codex_payload
      args: []
      returns: None
      source_scenario: Maintainers sync agent payloads before building a package.
      actions:
      - type: api_call
        subject:
          function: sync_codex_payload
      expected:
        behavior: CODEX_DISTRIBUTABLE_SKILLS includes maid-auditor, and sync copies the Codex auditor skill plus skill-local OpenAI metadata into the generated package payload.
  - path: maid_runner/codex/manifest.json
    artifacts:
    - kind: attribute
      name: _codex_payload_manifest_auditor_distribution
      of: codex_payload
      type: json object
      description: Regenerated Codex payload manifest listing maid-auditor as distributable and including its skill-local agent metadata.
  - path: tests/test_agent_payload_distribution.py
    artifacts:
    - kind: test_function
      name: test_codex_payload_manifest_matches_source_skills
      args:
      - name: tmp_path
        type: Path
      returns: None
      description: Existing payload distribution coverage updated so the expected Codex distributable skills include maid-auditor.
  - path: tests/cli/test_init_codex_distributable_scope.py
    artifacts:
    - kind: test_function
      name: test_codex_init_installs_only_distributable_skills
      args:
      - name: tmp_path
        type: Path
      - name: monkeypatch
        type: pytest.MonkeyPatch
      returns: None
      description: Existing Codex init coverage updated so maid-auditor is an expected generic installed skill, while repo-internal skills remain excluded.
  - path: docs/agent-skills.md
    artifacts:
    - kind: attribute
      name: _agent_skills_codex_auditor_distribution
      of: documentation
      type: markdown section
      description: Agent skill distribution docs state that maid-auditor ships through both Claude and Codex init payloads, with Codex no longer limited to the four implementation workflow skills.
