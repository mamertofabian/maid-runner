schema: '2'
goal: Give maid insights a cross-tool distributable entry point by adding an advisory insights cadence step to maid-auditor for Claude and Codex
type: feature
created: '2026-06-26T15:11:28Z'
metadata:
  epic: 077-00-skills-exploit-outcome-learning-loop
  tags:
  - agent-skills
  - insights
  - outcome-records
  - maid-workflow
  priority: medium
description: |
  Distributable entry point for `maid insights`. Today `maid insights` is a
  working CLI command with no distributable trigger: the only skill that tells
  an agent to run it is `maid-runner-self-improvement`, which `maid init` does
  not install. maid-auditor is the natural home because it already has "Before
  Release", "After Large Refactor", and "Periodic Health Check" usage sections;
  an aggregate-insights review is a portfolio-level cadence step, not a
  per-task step.

  This child adds an advisory insights cadence subsection to the maid-auditor
  skill for both Claude and Codex. It instructs the auditor to run
  `maid insights` during periodic / release cadences to surface recurring
  Outcome lessons across modules, paths, tags, and review findings, and to fold
  notable recurring patterns into the audit's recommended-actions output as
  candidate follow-up work.

  Tool parity is a first-class requirement. Claude and Codex MAID payloads must
  not drift unless a manifest explicitly justifies a tool-specific exception
  (for example a planner-only optimization assigned to Claude). This work is
  not planner-specific, so Codex repositories initialized with MAID must receive
  the same auditor capability instead of missing the insights cadence.

  Pinned decisions (do not redesign):

  1. Quote only registered `maid insights` options. The shipped surface is
     `--index`, `--manifest-dir`, `--project-root`, `--allow-stale-index`,
     `--limit`, and `--json`. There is no `--tag` and no `--include-status` on
     insights. Guidance must not invent flags (the negative test pins this).
  2. Insights is advisory aggregate evidence only. It must never gate or modify
     the audit verdict; maid-auditor stays read-only and verdict-neutral. The
     guidance states this explicitly.
  3. Cross-tool distribution. The auditor skill must ship through both
     `maid init --tool claude` and `maid init --tool codex`. Claude already has
     `.claude/skills/maid-auditor/SKILL.md`; Codex needs a matching
     `.codex/skills/maid-auditor/SKILL.md`, skill-local OpenAI metadata, a
     generated packaged copy, and inclusion in `CODEX_DISTRIBUTABLE_SKILLS`.
  4. Stale-index handling mirrors recall guidance: insights fails on a stale
     index by default; the remedy is `maid learn`, or `--allow-stale-index` when
     a stale read is acceptable. Never work around the failure another way.

  Files touched mirror the 066-03 / 066-04 guidance pattern across both tools:
  the repo-local source `.claude/skills/maid-auditor/SKILL.md`, the new
  `.codex/skills/maid-auditor/SKILL.md` and
  `.codex/skills/maid-auditor/agents/openai.yaml`, generated package copies
  under `maid_runner/claude/` and `maid_runner/codex/`, and the sync script /
  tests that control `maid init` distributable payloads. Per the 047-06 /
  066-03 lesson, parity tests must run the sync script in an isolated workspace
  rather than depend on ignored local generated files.

  Behavioral test expectations: tests read the auditor skill and assert that
  (a) both Claude and Codex copies contain an insights cadence anchor tied to
  the release / periodic health cadences and frame insights as advisory, (b) the
  guidance uses only registered insights options and contains no unregistered
  flags, (c) stale index handling is explicit: stale reads fail by default, with
  `maid learn` as the remedy or `--allow-stale-index` only when a stale advisory
  read is acceptable, (d) generated Claude and Codex package copies equal their
  sources after an isolated sync and carry the same anchor, (e) the isolated
  sync's generated Codex manifest includes `maid-auditor` in distributable
  skills and lists its skill-local OpenAI metadata, (f) `maid init --tool codex`
  installs `maid-auditor` while still excluding repo-internal maid-runner
  skills, and (g) user-facing agent skill docs describe the current equal
  Claude/Codex auditor distribution.

  Out of scope for this child: the four cross-tool workflow skills (077-02), any
  recall ranking change (077-03), planner-specific Claude advantages, and any
  new `maid insights` CLI behavior.
temptations:
- risk: Do not write insights filter flags that do not exist (for example `maid insights --tag` or `--include-status`).
  instead: Quote only the registered insights options; assert the absence of unregistered flags in a negative test.
- risk: Do not let the cadence imply insights can block or change an audit verdict.
  instead: State that insights is advisory aggregate evidence; the auditor stays read-only and verdict-neutral.
- risk: Do not keep the insights cadence Claude-only when the capability is not planner-specific.
  instead: Create and distribute the Codex maid-auditor skill alongside Claude, and assert `maid init --tool codex` installs it.
- risk: Do not edit the source skills and leave generated package copies or distribution manifests stale.
  instead: Update the source files, regenerate via the sync script, and assert Claude/Codex parity from an isolated workspace.
