    tags:
    - maid-workflow
    - plan-lock
    - red-evidence
    paths:
    - manifests/081-01-add-outcome-enrichment-core.manifest.yaml
    - .maid/plan-locks/081-01-add-outcome-enrichment-core.lock.json
