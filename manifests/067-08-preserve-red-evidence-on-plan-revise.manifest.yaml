schema: '2'
goal: Preserve valid red evidence during metadata-only `maid plan revise` operations
type: fix
created: '2026-06-15T03:53:38Z'
metadata:
  epic: 067-00-plan-lock-and-red-phase-evidence
  tags:
  - validation-trust
  - hardening
  - plan-lock
  - tdd-evidence
  - incident-fix
  priority: high
description: |
  Fix bug report 20260614-234916-maid-plan-revise-red-evidence: after a
  manifest's behavioral tests have been implemented, `maid plan revise`
  always either recaptures red evidence from the now-green tree or drops it
  with `--no-run`. That makes a legitimate metadata-only manifest correction
  fail the handoff gate with E705 or E704 even though the original lock had
  valid red evidence.

  Add an explicit `maid plan revise --preserve-red-evidence` mode for this
  narrow workflow. The option re-baselines manifest/test hashes and appends the
  revision reason exactly like normal revise, but it copies the existing lock's
  red_evidence payload instead of running validate commands or nulling the
  evidence. This is intentionally opt-in: default revise continues to recapture
  evidence for pre-implementation plan changes.

  Safety rules:

  1. `--preserve-red-evidence` is valid only when the existing lock already
     contains valid red evidence (`red: true`, at least one command classified
     "red", and no command classified "invalid"). Existing green, invalid, or
     null evidence is rejected and the lock file is left unchanged.
  2. `--preserve-red-evidence` and `--no-run` are mutually exclusive. `--no-run`
     means "record no evidence"; preserving evidence is a different, explicit
     workflow.
  3. The option does not bypass E707. `PlanLock.save` still snapshots the
     current manifest validate commands, so preserving evidence after changing
     validate command strings will remain detectable by the existing
     RED_EVIDENCE_COMMAND_MISMATCH integrity check.
  4. This child updates docs/maid_specs.md so the metadata-only revise path is
     visible to agents and humans. Broader workflow skill-payload updates are
     out of scope unless review finds the docs alone insufficient.

  Rationale: preserving existing valid red evidence is safer than trying to
  re-run old tests after implementation or fabricating a new red state. The
  flag keeps the escape hatch loud and reviewable by requiring an explicit
  revision reason and refusing non-red evidence.
temptations:
- risk: Do not make all plan revisions preserve evidence by default.
  instead: Keep default revise as recapture; require the explicit --preserve-red-evidence flag for metadata-only post-implementation corrections.
- risk: Do not preserve green, invalid, or missing evidence just because the user supplied the flag.
  instead: Validate the existing red_evidence payload before building and saving the revised lock; leave the lock unchanged on rejection.
- risk: Do not combine preserve mode with --no-run.
  instead: Reject the mutually exclusive flags before modifying the lock.
- risk: Do not disable E707 to make preserved evidence pass after validate command changes.
  instead: Let the existing validate_commands snapshot and E707 check detect changed command strings; the preserve mode is for metadata-only corrections.
