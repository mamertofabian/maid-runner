  edit:
  - path: maid_runner/cli/commands/plan.py
    artifacts:
    - kind: function
      name: cmd_plan_revise
      args:
      - name: args
        type: argparse.Namespace
      returns: int
      description: Supports --preserve-red-evidence for metadata-only revisions by preserving existing valid red evidence, rejecting invalid evidence and the --no-run combination before saving.
  - path: maid_runner/cli/commands/_main.py
    artifacts:
    - kind: function
      name: build_parser
      args: []
      returns: argparse.ArgumentParser
      description: The maid plan revise parser exposes --preserve-red-evidence alongside --reason and --no-run.
  - path: docs/maid_specs.md
    artifacts:
    - kind: attribute
      name: _preserve_red_evidence_plan_revise_note
      of: documentation
      type: markdown paragraph
      description: Documents the metadata-only `maid plan revise --preserve-red-evidence` workflow, valid-red-evidence requirement, --no-run incompatibility, and E707 boundary.
  - path: tests/cli/test_plan_cmd_red_evidence.py
    artifacts:
    - kind: test_function
      name: test_revise_parser_exposes_preserve_red_evidence
      source_scenario: A planner needs to update a plan lock after a metadata-only manifest correction without rerunning green tests.
      actions:
      - type: api_call
        subject:
          function: build_parser
      expected:
        behavior: The plan revise parser accepts --preserve-red-evidence and sets preserve_red_evidence true.
    - kind: test_function
      name: test_revise_preserve_red_evidence_keeps_prior_valid_red_after_metadata_change
      source_scenario: A manifest was locked while tests were red, the implementation is now green, and the manifest text receives a metadata-only correction.
      actions:
      - type: api_call
        subject:
          function: cmd_plan_revise
      expected:
        behavior: Revision succeeds, increments the revision, updates hashes, and preserves the original valid red_evidence payload.
    - kind: test_function
      name: test_revise_preserve_red_evidence_rejects_no_run_combination
      source_scenario: A user supplies both --preserve-red-evidence and --no-run.
      actions:
      - type: api_call
        subject:
          function: cmd_plan_revise
      expected:
        behavior: The command exits 2 and leaves the lock file unchanged.
    - kind: test_function
      name: test_revise_preserve_red_evidence_rejects_existing_non_red_evidence
      source_scenario: The existing lock has green/not-red evidence rather than valid red evidence.
      actions:
      - type: api_call
        subject:
          function: cmd_plan_revise
      expected:
        behavior: The command exits 2 and leaves the lock file unchanged instead of preserving non-red evidence.
    - kind: test_function
      name: test_specs_describe_preserve_red_evidence_revise_option
      source_scenario: A reader checks the MAID spec for the supported metadata-only plan-revise workflow.
      actions:
      - type: api_call
        subject:
          export: Path
      expected:
        behavior: docs/maid_specs.md names --preserve-red-evidence, metadata-only revisions, and valid red evidence.
  read:
  - maid_runner/core/plan_lock.py
  - maid_runner/core/result.py
  - manifests/067-02-capture-red-phase-evidence-on-lock.manifest.yaml
  - manifests/067-06-cross-check-red-evidence-commands.manifest.yaml
