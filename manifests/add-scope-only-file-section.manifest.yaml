schema: '2'
goal: Add scope-only writable manifest files for Svelte route wiring
type: fix
created: '2026-06-19T10:09:02Z'
metadata:
  tags:
  - manifest-schema
  - worktree-scope
  - svelte
  - brownfield
  priority: high
description: |
  Add a schema-supported `files.scope` section for changed files that are
  intentionally writable for a task but do not expose a stable public artifact
  contract. This fixes Svelte route and prop-only component wiring tasks where
  strict worktree-scope correctly requires write permission, but declaring
  route-local `$state` variables, private handlers, or props as public
  artifacts is invalid and causes behavioral E200 failures.

  `files.scope` entries are writable for worktree-scope, changed-scope,
  edit-time scope checks, and file tracking. They are not implementation
  artifact contracts, are not included in `Manifest.all_file_specs`, and do
  not weaken the existing `files.edit` requirement that artifact-bearing edits
  declare at least one public artifact. Each scope-only entry must carry a
  non-empty `reason` so the manifest records why artifact validation is not the
  right contract for that changed file.
temptations:
- risk: Do not loosen `files.edit[].artifacts` to allow empty artifact lists.
  instead: Add a separate `files.scope` section with path and reason fields, leaving artifact-bearing edit contracts strict.
- risk: Do not make files.scope a second read-only context section.
  instead: Include files.scope paths in writable scope, tracked paths, path containment checks, and file mode resolution.
- risk: Do not add Svelte route-local variables or component props to the Svelte validator as public artifacts.
  instead: Use route/component behavioral tests plus files.scope for write permission when no stable public artifact exists.
- risk: Do not let scope-only files satisfy implementation artifact checks.
  instead: Keep files.scope outside Manifest.all_file_specs and merged artifact collection.
files:
  edit:
  - path: maid_runner/schemas/manifest.v2.schema.json
    artifacts:
    - kind: attribute
      name: scope
      of: files
      type: array of ScopeSpec
      description: Optional writable scope-only manifest file declarations with path and reason.
    - kind: attribute
