outcome:
  status: completed
  summary: |
    Added `files.scope` as a writable scope-only manifest section for changed
    files that should participate in scope gates without declaring public
    artifacts, covering Svelte route-wiring and prop-only component edits.
  rationale: |
    The implementation keeps artifact-bearing edit contracts strict while
    adding a separate `ScopeSpec` model, schema definition, parser/serializer
    support, path containment, manifest-chain tracking, worktree-scope and
    changed-scope behavior, and user-facing documentation. Scope-only paths are
    included in writable scope through `Manifest.all_writable_paths` but remain
    outside `Manifest.all_file_specs`, so they cannot satisfy implementation
    artifact checks.
