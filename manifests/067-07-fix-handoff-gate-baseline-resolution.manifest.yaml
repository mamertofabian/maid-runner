schema: '2'
goal: Make the documented bare handoff gate operable by resolving task baselines from
  worktree-changed manifests
type: fix
created: '2026-06-12T21:19:59Z'
metadata:
  epic: 067-00-plan-lock-and-red-phase-evidence
  tags:
  - validation-trust
  - plan-lock
  - changed-scope
  - workflow
  priority: high
description: |
  CLAUDE.md Phase 5 documents the implementation handoff gate as
  `uv run maid verify --require-plan-lock --require-red-evidence`, but
  that bare command can never pass in this repository. Reproduced root
  cause (2026-06-12, clean tree at 83457e9):

  1. With no --since/--base-ref, `resolve_changed_scope_baseline`
     collects `metadata.maid_task_base` from ALL active manifests.
     Historical immutable manifests declare conflicting values
     (037-01 declares `main`; 037-02/038-03/issue-038 declare commit
     c920aa9...), so resolution fails with
     CHANGED_SCOPE_BASELINE_INVALID.
  2. `_plan_lock_changed_paths` in maid_runner/cli/commands/verify.py
     falls back to worktree changed files only for
     CHANGED_SCOPE_BASELINE_REQUIRED. INVALID returns None, which means
     full-scope enforcement, so the gate storms E700/E704 across every
     pre-067 manifest exactly as 067-05 was supposed to prevent.

  The flaw is that `maid_task_base` is a CURRENT-task declaration but is
  read from immutable historical manifests forever: any two completed
  tasks that ever declared different bases poison bare baseline
  resolution for the rest of the repository's life.

  Decisions for the implementer. Do not redesign these:

  1. `resolve_changed_scope_baseline` considers `metadata.maid_task_base`
     only from active manifests whose own manifest file has uncommitted
     worktree changes (untracked or modified), i.e. the manifests of the
     task in flight. Committed historical declarations are ignored for
     resolution. Worktree state comes from the existing public
     `changed_files` helper against the chain's project root.
  2. Conflicting values among CONSIDERED manifests still fail
     CHANGED_SCOPE_BASELINE_INVALID. Fail-closed stays for genuine
     conflicts; only stale-history poisoning is removed.
  3. When git state cannot be read (non-git directory, git failure),
     resolution keeps today's chain-wide behavior. Degraded environments
     may only make resolution stricter, never looser.
  4. With no considered declaration and no flags, resolution raises
     CHANGED_SCOPE_BASELINE_REQUIRED as today, which `maid verify`
     already maps to the worktree changed-files fallback. Net effect on
     this repository: the bare documented command passes on a clean
     tree (empty scope, integrity errors still checked) and scopes to
     worktree changes during a task. No changes to
     `_plan_lock_changed_paths` are expected; the fix is in baseline
     resolution.
  5. Documentation: the CLAUDE.md Phase 5 gate text states that the bare
     command works on a clean tree and recommends
     `--base-ref <integration-branch>` (or `--since`) while a task is in
     flight; docs/maid_specs.md changed-scope baseline section documents
     the worktree-manifest rule for metadata baselines.

  Contract evolution note: tests/core/test_changed_scope.py currently
  pins "two active manifests declare different metadata.maid_task_base
  values fails INVALID" without distinguishing committed from worktree-
  changed manifests. That expectation narrows intentionally (037-01
  contract evolved, maid-evolver style): conflicting COMMITTED manifests
  no longer poison resolution; the conflict case keeps failing when the
  conflicting manifests are worktree-changed. tests/core/
  test_changed_scope.py is not hash-locked by any plan lock (verified
  against .maid/plan-locks/ at drafting time) and may be evolved; do NOT
  touch tests/cli/test_main.py (072-01 lock) or the 067-05-locked
  plan-lock test files.

  Promotion criteria: behavioral tests written and red, behavioral
  validation passing against this draft path. Validate commands below
  name planned test files; they exist only at promotion time.
temptations:
- risk: Do not fall back from CHANGED_SCOPE_BASELINE_INVALID to worktree scope inside
    verify.
  instead: 'Fix resolution itself: ignore committed historical maid_task_base declarations;
    a genuine conflict among worktree-changed manifests must keep failing INVALID
    and full-scope enforcement.'
- risk: Do not silently loosen resolution when git state is unavailable.
  instead: On git failure keep today's chain-wide consideration; degraded environments
    only get stricter.
- risk: Do not delete maid_task_base from historical manifests to clear the conflict.
  instead: Prior tasks' manifests are immutable; fix the resolution rule, not the
    history.
- risk: Do not edit tests/cli/test_main.py or the 067-05-locked plan-lock test files.
  instead: Evolve tests/core/test_changed_scope.py and add the new gate tests in tests/cli/test_verify_handoff_baseline_cmd.py.
files:
  edit:
  - path: maid_runner/core/worktree.py
    artifacts:
    - kind: function
      name: resolve_changed_scope_baseline
      args:
      - name: chain
        type: ManifestChain
      - name: since
        type: Optional[str]
        default: None
      - name: base_ref
        type: Optional[str]
        default: None
      returns: ChangedScopeBaseline
      description: Metadata baselines are sourced only from active manifests with
        uncommitted worktree changes; committed historical declarations are ignored,
        conflicts among considered manifests stay INVALID, and git failures keep chain-wide
        behavior.
  - path: tests/core/test_changed_scope.py
    artifacts:
    - kind: test_function
      name: test_committed_conflicting_task_bases_are_ignored
      source_scenario: Two committed historical manifests declare different maid_task_base
        values and no worktree-changed manifest declares one.
      actions:
      - type: api_call
        subject:
          function: resolve_changed_scope_baseline
      expected:
        behavior: Resolution raises CHANGED_SCOPE_BASELINE_REQUIRED instead of INVALID;
          stale history no longer poisons bare runs.
    - kind: test_function
      name: test_worktree_changed_manifest_task_base_resolves
      source_scenario: An uncommitted task manifest declares maid_task_base while
        committed manifests declare different stale values.
      actions:
      - type: api_call
        subject:
          function: resolve_changed_scope_baseline
      expected:
        behavior: The worktree-changed manifest's baseline resolves with source metadata;
          stale committed values are not considered.
    - kind: test_function
      name: test_conflicting_worktree_changed_task_bases_fail_invalid
      source_scenario: Two uncommitted manifests declare different maid_task_base
        values.
      actions:
      - type: api_call
        subject:
          function: resolve_changed_scope_baseline
      expected:
        behavior: Resolution fails CHANGED_SCOPE_BASELINE_INVALID; genuine current-task
          conflicts stay fail-closed.
  - path: CLAUDE.md
    artifacts:
    - kind: attribute
      name: _handoff_gate_baseline_workflow_note
      of: documentation
      type: markdown section
      description: Phase 5 gate text states the bare command works on a clean tree
        and recommends --base-ref/--since while a task is in flight.
  - path: docs/maid_specs.md
    artifacts:
    - kind: attribute
      name: _metadata_baseline_resolution_spec
      of: documentation
      type: markdown section
      description: Changed-scope baseline documentation specifying the worktree-manifest
        rule for metadata.maid_task_base resolution.
  create:
  - path: tests/cli/test_verify_handoff_baseline_cmd.py
    artifacts:
    - kind: test_function
      name: test_bare_handoff_gate_passes_on_clean_tree_with_stale_bases
      source_scenario: A git fixture has committed manifests with conflicting maid_task_base
        values, unlocked historical manifests, and a clean tree, reproducing the repository's
        E700/E704 storm.
      actions:
      - type: api_call
        subject:
          function: cmd_verify
      expected:
        behavior: '`maid verify --require-plan-lock --require-red-evidence` passes
          the plan_lock stage with an empty task window instead of storming requirement
          errors.'
    - kind: test_function
      name: test_bare_handoff_gate_scopes_to_worktree_during_task
      source_scenario: The same fixture with an uncommitted unlocked task manifest.
      actions:
      - type: api_call
        subject:
          function: cmd_verify
      expected:
        behavior: The bare gate fails E700 only for the uncommitted task manifest,
          not for committed historical manifests.
    - kind: test_function
      name: test_integrity_errors_still_fire_on_clean_tree
      source_scenario: A committed locked manifest's behavioral test is tampered with
        on an otherwise clean tree.
      actions:
      - type: api_call
        subject:
          function: cmd_verify
      expected:
        behavior: The bare gate still fails E701; an empty task window never disables
          integrity errors.
  read:
  - maid_runner/cli/commands/verify.py
  - maid_runner/core/plan_lock.py
  - manifests/037-01-add-task-baseline-changed-scope-gate.manifest.yaml
  - manifests/067-05-scope-plan-lock-enforcement-to-changed-manifests.manifest.yaml
validate:
- uv run python -m pytest -q tests/core/test_changed_scope.py tests/cli/test_verify_handoff_baseline_cmd.py
- uv run maid validate manifests/067-07-fix-handoff-gate-baseline-resolution.manifest.yaml
  --mode behavioral --quiet
- uv run maid validate manifests/067-07-fix-handoff-gate-baseline-resolution.manifest.yaml
  --mode schema --quiet
outcome:
  status: completed
  completed_at: "2026-06-13T06:30:00Z"
  summary: "resolve_changed_scope_baseline sources metadata.maid_task_base only from active manifests whose own manifest file has uncommitted worktree changes, so stale conflicting baselines in committed historical manifests no longer poison bare resolution. Conflicts among the considered worktree-changed manifests still fail E116, git-unreadable environments keep chain-wide consideration (stricter, never looser), and with no considered declaration resolution raises E115, which the plan-lock gate already maps to the worktree changed-files fallback. The bare handoff gate's plan_lock stage now passes on this repository instead of storming E700/E704 across pre-067 manifests."
  rationale: "maid_task_base is a current-task declaration, but resolution read it from immutable historical manifests forever: any two completed tasks that ever declared different bases (037-01 declared main; 037-02/038-03/issue-038 declared a commit) made bare baseline resolution fail INVALID, which _plan_lock_changed_paths treats as full-scope enforcement. The fix lands in resolution itself rather than in verify's fallback so a genuine conflict among in-flight manifests keeps failing closed. The changed_scope stage's E115 explicit-baseline requirement is 037-01's intended design and stays untouched; verify.py was read-only in this manifest and required no changes, exactly as the contract predicted."
  lessons:
    - lesson_type: design
      summary: "Current-task declarations must not be read from immutable history: a metadata field that means 'my task's baseline' has to be scoped to manifests of the task in flight (worktree-changed), or any two disagreeing completed tasks poison the repository forever. Scope declaration reads to the declaration's lifetime."
      tags:
        - changed-scope
        - metadata
        - manifest-lifecycle
      paths:
        - maid_runner/core/worktree.py
    - lesson_type: validation
      summary: "The draft's net-effect claim that the bare documented command passes on a clean tree was imprecise: the changed_scope stage (default on) still requires an explicit baseline and fails E115 on a clean tree by 037-01 design. The declared behavioral tests were correctly worded against the plan_lock stage, so the contract stayed implementable; docs were written to the precise behavior instead of the imprecise claim."
      tags:
        - changed-scope
        - contract-precision
        - documentation
      paths:
        - manifests/067-07-fix-handoff-gate-baseline-resolution.manifest.yaml
        - CLAUDE.md
    - lesson_type: workflow
      summary: "Running make format on new behavioral test files before maid plan lock (the 067-06 lesson) kept all locked test hashes intact through the green phase; no plan revision was needed this pass."
      tags:
