    - lesson_type: workflow
      summary: "Post-implementation `maid plan revise` re-captures evidence as not-red and breaks the E705 gate for in-scope manifests; additive manifest edits such as outcome capture are legal under the lock contract without revision, so revise must be reserved for genuine pre-implementation plan changes."
      tags:
