  rationale: "Closed the epic 067 review findings so the documented implementation handoff gate is operable: `maid verify --require-plan-lock --require-red-evidence --since HEAD` passes on this repository with the in-scope 067-05 manifest locked with valid red evidence while untouched historical manifests stay out of requirement scope. Integrity errors E701/E702/E703/E706 remain unscoped, scope-computation failures fall back to full enforcement, and enforcement stays opt-in."
  lessons:
