      summary: "Requirement-error scope must match on the manifest's own changed file path only; matching on declared production or test paths would pull historical manifests back into scope through shared files and re-create the E700 storm."
      tags:
        - plan-lock
        - enforcement-scope
        - task-window
      paths:
        - maid_runner/core/plan_lock.py
        - tests/core/test_plan_lock_scope_enforcement.py
    - lesson_type: validation
      summary: "Scoped-gate CLI tests need a committed-baseline case; with only uncommitted fixtures a worktree-only diff is indistinguishable from the baseline-derived changed set and a hollow implementation passes."
      tags:
        - changed-scope
        - behavioral-tests
        - anti-gaming
      paths:
        - tests/cli/test_verify_plan_lock_scope_cmd.py
    - lesson_type: workflow
      summary: "Plan locks have no migration path for draft promotion: validate-command paths change when a draft moves to manifests/, so the lock was adjusted out-of-band to keep pre-implementation red evidence; a promotion-aware lock migration command is needed."
      tags:
