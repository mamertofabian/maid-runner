schema: "2"
goal: "Restrict the Claude payload installed by maid init to MAID skills and the implementation-reviewer agent."
type: fix
created: "2026-05-07"
description: |
  `maid init --tool claude` should not install the legacy Claude slash commands
  or the old multi-agent MAID workflow. The package payload should contain the
  current MAID skills plus the single `maid-implementation-reviewer.md` agent
  needed for review handoff. Empty manifest sections, especially commands, must
  be treated as intentional empty distributions rather than as a fallback to
  copying every source file.
temptations:
  - risk: "Do not hide legacy commands only from dry-run output while still packaging or copying them."
    instead: "Remove command files from the source payload, generated payload, package data, and sync fallback behavior."
  - risk: "Do not keep all old MAID agents because they already exist in the repo."
    instead: "Declare and distribute only `maid-implementation-reviewer.md` as the Claude agent payload."
  - risk: "Do not treat an empty manifest distributable list as missing configuration."
    instead: "Make sync use the explicit empty list so stale generated command directories are pruned."
files:
  edit:
    - path: maid_runner/cli/commands/init.py
      artifacts:
        - kind: function
          name: cmd_init
          args:
            - name: args
              type: argparse.Namespace
          returns: int
    - path: scripts/sync_claude_files.py
      artifacts:
        - kind: function
          name: sync_agents
          args: []
          returns: None
        - kind: function
          name: sync_commands
          args: []
          returns: None
        - kind: function
          name: sync_skills
          args: []
          returns: None
        - kind: function
          name: main
          args: []
          returns: None
    - path: pyproject.toml
      artifacts:
        - kind: attribute
          name: claude_skills
          of: package-data
          type: glob
        - kind: attribute
          name: claude_agent_payload
          of: package-data
          type: glob
    - path: .claude/manifest.json
      artifacts:
        - kind: attribute
          name: agents_distributable
          of: claude manifest
          type: array
        - kind: attribute
          name: commands_distributable
          of: claude manifest
          type: array
        - kind: attribute
          name: skills_distributable
          of: claude manifest
          type: array
    - path: maid_runner/claude/manifest.json
      artifacts:
        - kind: attribute
          name: generated_agents_distributable
          of: generated claude manifest
          type: array
        - kind: attribute
          name: generated_commands_distributable
          of: generated claude manifest
          type: array
    - path: tests/cli/test_init_cmd.py
      artifacts:
        - kind: test_function
          name: test_init_claude_creates_repo_level_maid_assets
        - kind: test_function
          name: test_init_claude_dry_run_reports_assets_without_creating_them
        - kind: test_function
          name: test_init_claude_force_replaces_only_marked_claude_md_section
    - path: tests/ci/test_claude_sync.py
      artifacts:
        - kind: test_function
          name: test_sync_claude_files_copies_manifest_declared_skills
        - kind: test_function
          name: test_sync_claude_files_prunes_stale_generated_payloads
    - path: tests/ci/test_publish_workflow.py
      artifacts:
        - kind: test_function
          name: test_package_data_includes_claude_skills
        - kind: test_function
          name: test_claude_manifest_and_docs_describe_maid_skill_distribution
