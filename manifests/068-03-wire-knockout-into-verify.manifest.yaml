  rationale: "The CLI integration keeps the engine's rewrite/run/restore semantics unchanged, runs the knockout stage only when requested, combines active-manifest reports deterministically, and renders the same structured report through text and JSON verify output. Positive-only limit parsing prevents a zero or negative limit from producing a successful no-op knockout stage."
