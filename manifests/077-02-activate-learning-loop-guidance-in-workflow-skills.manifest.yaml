    tags:
    - behavioral-testing
    - validation-trust
    paths:
    - manifests/077-02-activate-learning-loop-guidance-in-workflow-skills.manifest.yaml
    - tests/cli/test_learn_cmd.py
  - lesson_type: workflow
    summary: "Preserve-red-evidence revision is not appropriate when validate command strings change; use stash-backed plan revision to refresh red evidence instead."
    tags:
