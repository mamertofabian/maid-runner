  rationale: "The change keeps recall, insights, and failure lessons advisory while making agents visibly digest applicable and rejected lessons before planning, reviewing, implementing, or capturing Outcomes. Source skills are tracked; generated package copies are refreshed by sync and covered through isolated payload parity tests."
