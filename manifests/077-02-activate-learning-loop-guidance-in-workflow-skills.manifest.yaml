    - insights
    - recall
    paths:
    - manifests/077-02-activate-learning-loop-guidance-in-workflow-skills.manifest.yaml
  - lesson_type: workflow
    summary: "Formatting behavioral tests before locking or immediately before red evidence matters because Black changes after plan lock tamper the behavioral-file hash and can force a plan revision."
    tags:
    - plan-lock
    - red-evidence
    - formatting
    paths:
    - tests/test_learning_loop_workflow_guidance.py
    - .maid/plan-locks/077-02-activate-learning-loop-guidance-in-workflow-skills.lock.json
  - lesson_type: testing
