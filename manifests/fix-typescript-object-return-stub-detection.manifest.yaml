schema: '2'
goal: Fix TypeScript stub detection for non-empty object literal returns
type: fix
created: '2026-06-27T07:19:25Z'
metadata:
  tags:
  - typescript
  - validation
  - stub-detection
  - e310
  priority: high
description: |
  Erindelle exposed a strict verify false positive where a real TypeScript
  state facade function was reported as E310 because its only statement returned
  an object literal made of getter methods. The current stub detector treats
  object returns as non-empty only when tree-sitter reports `pair` children,
  so getters, methods, shorthand properties, and spreads are misclassified like
  `return {};`.

  Keep the E310 warning and strict verify policy intact. Narrow the TypeScript
  object-literal emptiness check so real object members count as implementation
  behavior while empty object returns remain stub-like.
temptations:
- risk: Do not make E310 advisory or disable strict verify warnings to make Erindelle pass.
  instead: Fix the TypeScript implementation collector so the source artifact is classified correctly before warning policy runs.
- risk: Do not make every object node non-stub just because it has braces or punctuation.
  instead: Count only concrete object member nodes such as pairs, methods, shorthand properties, and spreads as non-empty.
- risk: Do not test the private stub helper directly.
  instead: Exercise behavior through TypeScriptValidator.collect_implementation_artifacts and assert the public FoundArtifact.is_stub result.
files:
  scope:
  - path: maid_runner/validators/_typescript_implementation.py
    reason: The fix is a private helper-level TypeScript implementation collector change with no public API change.
  edit:
  - path: tests/validators/test_typescript.py
    artifacts:
    - kind: test_function
      name: test_return_object_with_getter_is_not_stub
      source_scenario: A TypeScript function returns an object literal containing a getter accessor, matching Svelte state facade patterns.
      actions:
      - type: api_call
        subject:
          export: TypeScriptValidator
      expected:
        behavior: The collected function artifact has is_stub false because the getter object return is real implementation behavior.
    - kind: test_function
      name: test_return_object_with_method_is_not_stub
      source_scenario: A TypeScript function returns an object literal containing a method definition.
      actions:
      - type: api_call
        subject:
          export: TypeScriptValidator
      expected:
        behavior: The collected function artifact has is_stub false because the method object return is real implementation behavior.
    - kind: test_function
      name: test_return_object_with_shorthand_property_is_not_stub
      source_scenario: A TypeScript function returns an object literal containing a shorthand property.
      actions:
      - type: api_call
        subject:
          export: TypeScriptValidator
      expected:
        behavior: The collected function artifact has is_stub false because the shorthand property object return is real implementation behavior.
    - kind: test_function
      name: test_return_object_with_spread_is_not_stub
      source_scenario: A TypeScript function returns an object literal containing a spread element.
      actions:
      - type: api_call
        subject:
          export: TypeScriptValidator
      expected:
        behavior: The collected function artifact has is_stub false because the spread object return is real implementation behavior.
  read:
  - maid_runner/validators/typescript.py
  - maid_runner/validators/base.py
  - manifests/fix-typescript-assertion-nested-braces.manifest.yaml
