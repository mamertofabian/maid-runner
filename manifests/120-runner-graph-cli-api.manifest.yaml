schema: "2"
goal: "Implement runner-owned graph CLI query/export/analyze surfaces"
type: feature
created: "2026-05-31T19:16:00+08:00"
supersedes:
  - snapshot-cli-commands-graph
metadata:
  github_issue: 120
  tags:
    - graph
    - cli
    - api
description: |
  Replace the public `maid graph` placeholder with runner-owned graph query,
  export, and analyze behavior backed by the existing graph builder, query
  facade, and exporters. Add a small public graph API module that returns
  deterministic, JSON-serializable dictionaries so external automation can
  consume runner graph data without depending on visual studio, MCP, or agent
  automation packages.

  Rationale: the graph package already owns manifest-chain graph construction,
  traversal, and DOT/GraphML exporters. The missing boundary is a stable runner
  API and CLI result-shaping layer. Keeping serialization in a dedicated graph
  API module avoids putting graph policy into the CLI handler and avoids
  changing lower-level model/build/export semantics.
temptations:
  - risk: "Do not satisfy the CLI by printing raw Node objects or repr strings."
    instead: "Route query and analyze results through JSON-serializable dictionaries with deterministic ordering."
  - risk: "Do not make graph JSON exports depend on UUID edge IDs generated by GraphBuilder."
    instead: "Serialize edges in sorted order with deterministic edge identifiers at the API boundary."
  - risk: "Do not add visual studio, MCP, or agent automation concerns to this repository."
    instead: "Use only maid_runner.graph, ManifestChain, argparse, json, pathlib, and sys in the runner API and CLI."
  - risk: "Do not duplicate graph traversal logic in the CLI command."
    instead: "Keep cmd_graph as argument dispatch and delegate graph construction, querying, export, and analysis to maid_runner.graph.api."
files:
  create:
    - path: maid_runner/graph/api.py
      artifacts:
        - kind: function
          name: build_graph_from_manifest_dir
          args:
            - name: manifest_dir
              type: str | Path
              default: '"manifests/"'
            - name: project_root
              type: str | Path
              default: '"."'
          returns: KnowledgeGraph
        - kind: function
          name: graph_stats
          args:
            - name: graph
              type: KnowledgeGraph
          returns: dict[str, Any]
        - kind: function
          name: query_graph
