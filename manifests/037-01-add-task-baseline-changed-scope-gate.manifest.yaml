# draft-kind: implementation
schema: "2"
goal: "Add a task-baseline changed-scope gate so files.read cannot hide production files changed during the MAID task"
type: fix
created: "2026-05-20"
metadata:
  maid_task_base: main
  tags:
    - validation
    - anti-gaming
    - changed-scope
    - git
    - verify
  priority: critical
description: |
  Close the loophole where an implementation can move a genuinely edited
  production file from files.edit to files.read and still pass plain
  validation after the edit has already been committed on the feature branch.

  Existing `--worktree-scope` is useful during live local work, but it only
  inspects dirty git status. It cannot catch a branch where the production file
  was edited in an earlier commit and a later commit rewrites the manifest to
  treat that file as read-only context.

  Add a task-baseline changed-scope gate. The gate compares changed
  files from a caller-provided task baseline to the current working tree and
  requires every changed production source file to be writable in the active
  manifest chain. files.read remains context only and does not grant write
  permission.

  Baseline selection must be explicit or task-local. Do not guess `main`,
  `dev`, or any remote branch by default, because brownfield repositories and
  stacked branches may contain legitimate pre-MAID or parent-branch changes.
  The gate accepts the baseline in this order:

  1. `--since <commit-ish>`: compare that exact commit-ish to the working tree.
  2. `--base-ref <ref>`: compute merge-base(ref, HEAD), then compare from that
     merge-base to the working tree.
  3. active manifest metadata `metadata.maid_task_base`: compare that commit-ish
     to the working tree when all active manifests that declare it agree.

  If `--changed-scope` is requested and no baseline can be resolved, validation
  fails with a structured error instead of silently falling back to origin/main.

  The gate should be available from both `maid validate` and `maid verify`.
  `maid verify` runs changed-scope by default as the intended agent/CI handoff
  command for branch review, with `--no-changed-scope` as the explicit opt-out.
  `maid validate --worktree-scope` remains the faster live dirty-worktree guard.
temptations:
  - risk: "Do not default the changed-scope baseline to origin/main, main, or dev."
    instead: "Require --since, --base-ref, or unambiguous metadata.maid_task_base, and fail closed when none is available."
  - risk: "Do not treat files.read as writable just because it is registered in the manifest chain."
    instead: "Use only files.create, files.edit, and files.delete as writable scope, exactly like the worktree-scope gate."
  - risk: "Do not check only committed branch diffs."
    instead: "Compare the resolved baseline to the current working tree so committed, staged, and unstaged changes are all in scope."
  - risk: "Do not make the gate depend on broad static analysis of prose or call graphs."
    instead: "Use git path evidence and the manifest's explicit writable file sections."
  - risk: "Do not conflate task-baseline scope with brownfield file tracking."
    instead: "Keep file-tracking as a separate repo-coverage concern and make changed-scope enforce only files changed in the task window."
files:
  edit:
    - path: maid_runner/core/worktree.py
      artifacts:
        - kind: class
          name: ChangedScopeBaseline
          description: "Immutable value object describing the resolved changed-scope baseline source and commit-ish."
        - kind: attribute
          name: source
          of: ChangedScopeBaseline
          type: str
          description: "Baseline source: since, base-ref, or metadata."
        - kind: attribute
          name: commitish
          of: ChangedScopeBaseline
          type: str
          description: "Commit-ish or ref used to compare the task change window."
        - kind: function
          name: resolve_changed_scope_baseline
          args:
            - name: chain
              type: ManifestChain
            - name: since
              type: "Optional[str]"
              default: None
            - name: base_ref
              type: "Optional[str]"
              default: None
          returns: ChangedScopeBaseline
          description: >
            Resolve the changed-scope baseline from explicit CLI inputs or
            unambiguous metadata.maid_task_base on the active manifest chain.
            Raises a structured validation-facing error when no baseline exists,
            both explicit inputs are supplied, or manifest metadata conflicts.
        - kind: function
          name: changed_files_since
          args:
            - name: project_root
              type: "Union[str, Path]"
            - name: baseline
              type: ChangedScopeBaseline
          returns: "tuple[str, ...]"
          description: >
            Return git paths changed between the resolved baseline and the
            current working tree, including committed, staged, and unstaged
            changes under the project root.
        - kind: function
          name: validate_changed_scope
          args:
            - name: project_root
              type: "Union[str, Path]"
            - name: chain
              type: ManifestChain
            - name: since
              type: "Optional[str]"
              default: None
            - name: base_ref
              type: "Optional[str]"
              default: None
            - name: include_tests
              type: bool
              default: "False"
          returns: "list[ValidationError]"
          description: >
            Report changed files since the task baseline that are outside
            writable manifest scope. Production files listed only in files.read
            must produce ErrorCode.CHANGED_FILE_OUTSIDE_MANIFEST_SCOPE.

    - path: maid_runner/core/result.py
      artifacts:
        - kind: attribute
          name: CHANGED_SCOPE_BASELINE_REQUIRED
          of: ErrorCode
          type: str
          description: "Structured error code for --changed-scope runs that cannot resolve an explicit or metadata task baseline."
        - kind: attribute
          name: CHANGED_SCOPE_BASELINE_INVALID
          of: ErrorCode
          type: str
          description: "Structured error code for invalid, conflicting, or unusable changed-scope baseline inputs."

    - path: maid_runner/cli/commands/_main.py
      artifacts:
        - kind: function
          name: build_parser
          args: []
          returns: argparse.ArgumentParser
          description: >
            Add validate and verify CLI options for --changed-scope, --no-changed-scope,
            --since, and --base-ref without changing the default validate baseline.

    - path: maid_runner/cli/commands/validate.py
      artifacts:
        - kind: function
          name: cmd_validate
          args:
            - name: args
              type: argparse.Namespace
          returns: int
          description: >
            Apply the changed-scope gate after structural validation succeeds
            when --changed-scope is requested. The command exits non-zero and
            includes structured errors when any changed production file is
            outside writable manifest scope or when no baseline can be resolved.
        - kind: function
          name: _run_changed_scope
          args:
            - name: args
              type: argparse.Namespace
          returns: "list[ValidationError]"
          description: "Build the selected manifest or active manifest scope and return changed-scope validation errors for validate output formatting."
        - kind: function
          name: _run_worktree_scope
          args:
            - name: args
              type: argparse.Namespace
          returns: "list[ValidationError]"
          description: "Build the selected manifest or active manifest scope and return worktree-scope validation errors for validate output formatting."
        - kind: function
          name: _scope_chain
          args:
            - name: args
              type: argparse.Namespace
            - name: chain_type
          returns: object
          description: "Use only the selected manifest for single-manifest scope checks, otherwise use the active manifest chain."

    - path: maid_runner/cli/commands/verify.py
      artifacts:
        - kind: function
          name: _run_verify
          args:
            - name: args
              type: argparse.Namespace
          returns: VerificationResult
          description: >
            Add a changed_scope stage after file_tracking/worktree_scope and
            before tests when requested by the caller. The CLI requests it by
            default so verify can serve as the branch handoff gate, while
            --no-changed-scope disables the stage for intentional non-handoff runs.
        - kind: function
          name: _changed_scope_stage
          args:
            - name: root
              type: Path
            - name: manifest_dir
              type: str
            - name: since
              type: "Optional[str]"
            - name: base_ref
              type: "Optional[str]"
            - name: include_tests
              type: bool
          returns: VerificationStageResult
          description: "Run validate_changed_scope and report a pass/fail verify stage with structured error details."

    - path: tests/core/test_changed_scope.py
      artifacts:
        - kind: test_function
          name: test_changed_scope_rejects_changed_read_only_production_file_since_metadata_base
          source_scenario: "A git repo has a clean baseline commit, then a production file listed only in files.read is changed while metadata.maid_task_base points to the baseline."
          actions:
            - type: api_call
              subject:
                export: validate_changed_scope
          expected:
            behavior: "The changed read-only production file produces ErrorCode.CHANGED_FILE_OUTSIDE_MANIFEST_SCOPE."
        - kind: test_function
          name: test_changed_scope_allows_changed_file_in_files_edit
          source_scenario: "A production file changed since metadata.maid_task_base is declared in files.edit."
          actions:
            - type: api_call
              subject:
                export: validate_changed_scope
          expected:
            behavior: "validate_changed_scope returns an empty error list."
        - kind: test_function
          name: test_changed_scope_requires_baseline_when_requested
          source_scenario: "A changed-scope run has no --since, no --base-ref, and no metadata.maid_task_base."
          actions:
            - type: api_call
              subject:
                export: resolve_changed_scope_baseline
          expected:
            behavior: "A structured baseline-required error is returned rather than guessing origin/main."
        - kind: test_function
          name: test_changed_scope_rejects_conflicting_manifest_task_bases
          source_scenario: "Two active manifests declare different metadata.maid_task_base values."
          actions:
            - type: api_call
              subject:
                export: resolve_changed_scope_baseline
          expected:
            behavior: "The resolver reports ErrorCode.CHANGED_SCOPE_BASELINE_INVALID and does not pick either baseline."
        - kind: test_function
          name: test_changed_scope_base_ref_uses_merge_base
          source_scenario: "A feature branch is created from a non-main parent branch and --base-ref points to that parent."
          actions:
            - type: api_call
              subject:
                export: changed_files_since
          expected:
            behavior: "Only files changed after the merge-base are reported; unrelated files already present on the parent branch are excluded."
        - kind: test_function
          name: test_changed_scope_include_tests_reports_changed_test_file
          source_scenario: "A test file changed since the baseline while include_tests is False and then True."
          actions:
            - type: api_call
              subject:
                export: validate_changed_scope
          expected:
            behavior: "The changed test file is ignored by default and reported when include_tests=True."

    - path: tests/cli/test_validate_cmd.py
      artifacts:
        - kind: test_function
          name: test_validate_changed_scope_returns_1_for_changed_read_only_file
          source_scenario: "maid validate --changed-scope runs after a production file changed since metadata.maid_task_base but the file is only in files.read."
          actions:
            - type: api_call
              subject:
                export: main
          expected:
            behavior: "The command exits 1 and prints ErrorCode.CHANGED_FILE_OUTSIDE_MANIFEST_SCOPE with the changed file path."
        - kind: test_function
          name: test_validate_manifest_changed_scope_uses_selected_manifest_scope
          source_scenario: "maid validate selects one manifest whose files.read contains a changed production file while an unrelated active manifest lists that file in files.edit."
          actions:
            - type: api_call
              subject:
                export: main
          expected:
            behavior: "The command exits 1 and reports the read-only changed file instead of being masked by the unrelated active manifest."
        - kind: test_function
          name: test_validate_changed_scope_requires_explicit_or_metadata_baseline
          source_scenario: "maid validate --changed-scope runs without --since, --base-ref, or metadata.maid_task_base."
          actions:
            - type: api_call
              subject:
                export: main
          expected:
            behavior: "The command exits non-zero with ErrorCode.CHANGED_SCOPE_BASELINE_REQUIRED and does not mention origin/main."

    - path: tests/cli/test_verify_cmd.py
      artifacts:
        - kind: test_function
          name: test_verify_changed_scope_stage_reports_read_only_changed_file
          source_scenario: "maid verify --keep-going runs with default changed-scope on a repo where a changed production file is listed only in files.read."
          actions:
            - type: api_call
              subject:
                export: main
          expected:
            behavior: "The JSON and text verify outputs include a failed changed_scope stage with the changed file path."
        - kind: test_function
          name: test_verify_default_changed_scope_requires_baseline
          source_scenario: "maid verify runs without --since, --base-ref, metadata.maid_task_base, or --no-changed-scope."
          actions:
            - type: api_call
              subject:
                export: main
          expected:
            behavior: "The changed_scope stage fails closed with ErrorCode.CHANGED_SCOPE_BASELINE_REQUIRED and does not guess origin/main."
        - kind: test_function
          name: test_verify_changed_scope_stage_passes_with_since_for_writable_changes
          source_scenario: "maid verify --since <baseline> runs after all changed production files are declared writable."
          actions:
            - type: api_call
              subject:
                export: main
          expected:
            behavior: "The changed_scope stage passes and verify continues to the tests stage."

    - path: tests/cli/test_main.py
      artifacts:
        - kind: test_function
          name: test_parser_has_verify_subcommand
          source_scenario: "The verify parser receives --changed-scope, --since, --base-ref, and --include-tests flags."
          actions:
            - type: api_call
              subject:
                export: build_parser
          expected:
            behavior: "The parsed Namespace exposes changed_scope=True, since, base_ref, and include_tests values."
        - kind: test_function
          name: test_verify_changed_scope_defaults_on_and_can_be_disabled
          source_scenario: "The verify parser receives no changed-scope flag and then receives --no-changed-scope."
          actions:
            - type: api_call
              subject:
                export: build_parser
          expected:
            behavior: "The default parsed Namespace has changed_scope=True and --no-changed-scope sets changed_scope=False."
        - kind: test_function
          name: test_validate_accepts_changed_scope_flags
          source_scenario: "The validate parser receives --changed-scope, --since, and --base-ref flags."
          actions:
            - type: api_call
              subject:
                export: build_parser
          expected:
            behavior: "The parsed Namespace exposes changed_scope=True plus the explicit since and base_ref values."
        - kind: test_function
          name: test_changed_scope_handoff_docs_are_discoverable
          source_scenario: "The README, agent skill guide, and draft workflow docs must make the default changed-scope handoff gate discoverable."
          actions:
            - type: api_call
              subject:
                export: Path
          expected:
            behavior: "The docs say maid verify runs changed-scope by default, show --base-ref/--since handoff commands, and describe E115 fail-closed behavior."

    - path: README.md
      artifacts:
        - kind: attribute
          name: changed_scope_handoff_gate_docs
          of: CLI Reference
          type: section
          description: "Human-facing CLI and workflow guidance for default changed-scope branch handoff and explicit opt-out."

    - path: docs/agent-skills.md
      artifacts:
        - kind: attribute
          name: changed_scope_agent_handoff_guidance
          of: maid-implementer
          type: section
          description: "AI-agent guidance requiring a baseline for default changed-scope validation before implementation handoff."

    - path: docs/draft-manifest-workflow.md
      artifacts:
        - kind: attribute
          name: changed_scope_draft_handoff_gate
          of: Automation
          type: section
          description: "Draft promotion workflow guidance for default changed-scope handoff validation before review or commit."
  read:
    - docs/plans/maid-validate-hardening-backlog.md
    - maid_runner/core/chain.py
    - maid_runner/core/manifest.py
    - maid_runner/core/_file_discovery.py
    - manifests/030-09-add-worktree-scope-gate.manifest.yaml
    - manifests/030-10-add-maid-verify-done-gate.manifest.yaml
validate:
  - uv run python -m pytest -q tests/core/test_changed_scope.py tests/cli/test_validate_cmd.py tests/cli/test_verify_cmd.py tests/cli/test_main.py
