schema: "2"
goal: >
  Characterize TypeScript package import identity before package/export
  resolution is considered.
type: refactor
created: "2026-05-06"
description: |
  Lock the current boundary after adding TypeScript tsconfig path alias
  identity: package imports remain package specifiers unless a future manifest
  explicitly introduces package.json exports, node_modules, or workspace package
  resolution. This is characterization coverage, not a package-resolution
  implementation slice. The goal is to prevent future resolver work from
  accidentally treating package names as local source aliases.
temptations:
  - risk: "Do not add package.json exports or node_modules resolution in this characterization slice."
    instead: "Assert package imports pass through unchanged so a later manifest can evolve them intentionally."
  - risk: "Do not let baseUrl rewrite every bare package name."
    instead: "Keep bare package and scoped package specifiers unchanged unless a paths alias explicitly matches."
  - risk: "Do not change TypeScript artifact extraction or barrel re-export scanning."
    instead: "Exercise only resolve_ts_import and behavioral import_source identity."
files:
  edit:
    - path: tests/core/test_ts_module_paths.py
      artifacts:
        - kind: test_function
          name: test_bare_package_import_passes_through_unchanged
        - kind: test_function
          name: test_scoped_package_import_passes_through_unchanged
        - kind: test_function
          name: test_package_json_exports_are_not_resolved
    - path: tests/validators/test_typescript_identity.py
      artifacts:
        - kind: test_function
          name: test_package_import_records_package_source
  read:
    - docs/spikes/spike-parser-library-replacement-options.md
    - pyproject.toml
    - maid_runner/core/ts_module_paths.py
    - maid_runner/validators/typescript.py
    - maid_runner/core/identity.py
validate:
  - uv run python -m pytest -q tests/core/test_ts_module_paths.py tests/validators/test_typescript_identity.py
