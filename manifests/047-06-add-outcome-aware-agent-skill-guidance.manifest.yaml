# draft-kind: implementation
schema: "2"
goal: "Add Outcome-aware agent skill guidance"
type: feature
created: "2026-05-30"
metadata:
  status: active
  tags:
    - agent-skills
    - maid-workflow
    - outcome-records
    - documentation
  priority: medium
description: |
  Update MAID agent-skill guidance so planning, implementation, and review can
  consume explicit Outcome records without making MAID runner depend on an AI
  agent. Planning should recall related Outcome lessons before drafting new
  manifests. Implementation should consult relevant Outcome records when
  choosing tests and code patterns. Review should check whether the completed
  manifest needs a new or updated Outcome section after the implementation
  review gate.

  This work updates repo-owned skill sources and generated Claude distribution
  copies where appropriate. It must keep Outcome as deterministic MAID data,
  not agent-only memory.

  This child is sequenced after the schema, docs, learn, recall, and insights
  drafts are promoted. If it is promoted before all deterministic commands are
  available, the skill text must phrase command use as future-facing and must
  not instruct agents to run unavailable commands.
temptations:
  - risk: "Do not make agent skills the only place where Outcome behavior is specified."
    instead: "Point skills to the manifest Outcome docs and deterministic `maid learn`, `maid recall`, and `maid insights` commands."
  - risk: "Do not ask agents to treat recalled Outcome lessons as approval to skip behavioral tests or implementation review."
    instead: "State that recalled outcomes are planning evidence only and each new manifest still needs its own tests, scope, and review."
  - risk: "Do not update source skill files while leaving package distribution copies stale."
    instead: "Update source-of-truth skill files and the generated distribution files or run the sync script as part of validation."
files:
  read:
    - manifests/drafts/047-00-maid-manifest-outcome-learning.epic.yaml
    - manifests/047-02-add-outcome-workflow-docs-and-review-guidance.manifest.yaml
    - manifests/047-03-add-maid-learn-outcome-index.manifest.yaml
    - manifests/047-04-add-maid-recall-outcome-search.manifest.yaml
    - manifests/047-05-add-maid-insights-outcome-aggregation.manifest.yaml
    - manifests/048-01-refresh-init-codex-payload-and-command-docs.manifest.yaml
    - docs/agent-skills.md
    - scripts/sync_claude_files.py
  create:
    - path: tests/test_claude_skill_distribution.py
      artifacts:
        - kind: test_function
          name: test_outcome_guidance_is_synced_to_distributed_claude_skills
          source_scenario: "Outcome-aware guidance is added to source Claude skills."
          actions:
            - type: api_call
              subject:
                function: Path.read_text
          expected:
            behavior: "The generated package skill copies contain the same Outcome guidance anchors as source skills."
        - kind: test_function
          name: test_claude_skill_distribution_matches_source_after_sync
          source_scenario: "Source Claude skills are synchronized into the package distribution."
          actions:
            - type: api_call
              subject:
                function: Path.read_text
          expected:
            behavior: "Every edited distributed Claude skill matches the source skill content after sync, not only the Outcome anchors."
        - kind: test_function
          name: test_outcome_guidance_role_matrix_is_specific
          source_scenario: "Codex and Claude agent skills mention Outcome recall and capture."
          actions:
            - type: api_call
              subject:
                function: Path.read_text
          expected:
            behavior: "A per-skill matrix verifies planner recall before drafting, implementer consultation for tests/code patterns, plan-review recalled-evidence checks, implementation-review Outcome capture after verdict, and self-improvement routing for recurring lessons; each role also states that Outcome records do not replace behavioral tests, declared scope, validation, or review."
        - kind: test_function
          name: test_outcome_guidance_is_future_facing_until_commands_exist
          source_scenario: "The skill guidance is promoted before all deterministic Outcome commands are implemented."
          actions:
            - type: api_call
              subject:
                function: Path.read_text
          expected:
            behavior: "The guidance either depends on promoted learn/recall/insights commands or clearly says unavailable commands are future-facing."
    - path: .codex/skills/maid-planner/SKILL.md
      artifacts:
