  - uv run maid validate manifests/047-06-add-outcome-aware-agent-skill-guidance.manifest.yaml --mode behavioral --quiet
  - uv run maid validate manifests/047-06-add-outcome-aware-agent-skill-guidance.manifest.yaml --mode schema --quiet
outcome:
