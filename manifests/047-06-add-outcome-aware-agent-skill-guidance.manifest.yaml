  summary: "Added Outcome-aware guidance to Claude and Codex MAID skills."
  rationale: "Implementation completed after focused validation, repository-wide MAID gates, and a read-only review loop confirmed that guidance stays tied to deterministic Outcome commands while preserving MAID contract boundaries."
  lessons:
