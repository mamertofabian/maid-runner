      name: test_planner_theme_map_guidance_keeps_digest_advisory_and_read_only
      args: []
      returns: None
      description: Behavioral coverage that both planner skills keep the digest advisory and read-only, stating the planner must not generate the digest, call a model, or run `maid enrich` generation.
    - kind: test_function
      name: test_planner_theme_map_guidance_uses_only_registered_insights_options
      args: []
      returns: None
      description: Behavioral coverage that planner theme-map guidance uses only registered `maid insights` options and contains no unregistered flags such as `--digest`.
