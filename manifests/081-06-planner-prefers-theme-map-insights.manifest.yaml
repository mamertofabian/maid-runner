schema: '2'
goal: Teach the distributed maid-planner Outcome-Aware phase to prefer `maid insights --theme-map <digest>` when a fresh advisory enrichment digest exists, and to fall back to plain `maid insights` otherwise, closing the 081 enrichment loop into planning for both Claude and Codex, and bump the instruction payload version so downstream `maid init --check` reports the changed planner payload as stale
type: feature
created: '2026-06-28T23:49:42Z'
metadata:
  epic: 081-00-outcome-llm-enrichment
  tags:
  - agent-skills
  - insights
  - outcome-records
  - llm-enrichment
  - maid-workflow
  priority: low
description: |
  Final 081 enrichment-loop child. The deterministic enrichment pipeline now
  exists end to end: the `maid-outcome-enrich` skill generates an advisory
  `.maid/outcomes-digest.json`, `maid enrich validate` rejects fabricated or
  stale digests, and `maid insights --theme-map <digest>` deterministically
  re-aggregates `by_lesson_type` using the normalized themes. But nothing ever
  consumes that enriched view during planning: the maid-planner Outcome-Aware
  phase only tells agents to run plain `maid insights`, which reads the raw
  `.maid/outcomes.json` index and never sees the digest. The theme-mapped
  clustering is therefore opt-in-by-memory only, and a fresh digest provides no
  planning benefit unless an agent happens to remember the `--theme-map` flag.

  This child adds one short preference rule to the maid-planner Outcome-Aware
  guidance for both Claude and Codex: when an advisory enrichment digest is
  present, prefer `maid insights --theme-map .maid/outcomes-digest.json` so
  recurring lessons cluster by normalized theme; when the digest is absent or
  the runner reports it stale or invalid, fall back to plain `maid insights`.
  The rule attaches to the existing "Active insights trigger" bullet so it
  reads as a refinement of current advisory-insights behavior, not a new gate.

  Pinned decisions (do not redesign):

  1. Lean on the runner's own digest rejection, not planner-side freshness
     logic. `maid insights --theme-map` already validates the digest against
     the current Outcome index and refuses a stale or fabricated digest. The
     guidance therefore says: try `--theme-map` when the digest file exists;
     if the runner reports it missing, stale, or invalid, fall back to plain
     `maid insights`. The planner must NOT compute freshness itself, and must
     NOT pass `--allow-stale-index` to force a stale enriched digest into
     planning. A stale enriched digest is worse than none, because it presents
     LLM-normalized themes that no longer match the real index.

  2. The fallback is mandatory and non-blocking. A missing or rejected digest
     must never block, gate, or downgrade planning. Plain `maid insights`
     remains the always-available baseline; the theme-mapped view is a strict
     improvement when available and a no-op when not.

  3. The planner never generates or refreshes the digest. Producing the digest
     requires a model call and lives only in the `maid-outcome-enrich` skill.
     The planner is a read-only consumer of an already-validated digest. The
     guidance must not instruct the planner to run `maid enrich` generation,
     call a model, or hand-edit the digest.

  4. Tool parity, not a planner-only Claude advantage. Consuming an existing
     advisory digest is not a planner-specific Claude optimization; it is
     generic read-only evidence selection. Claude and Codex maid-planner
     payloads must carry identical theme-map guidance. The repo CLAUDE.md note
     about optional planner-only Claude advantages does not apply here.

  5. Quote only registered `maid insights` options. The shipped insights
     surface is `--index`, `--manifest-dir`, `--project-root`,
     `--allow-stale-index`, `--theme-map`, `--limit`, and `--json`. There is no
     `--digest` on insights (that belongs to `maid enrich`); the guidance must
     not invent flags, and a negative test pins this.

  6. The digest stays advisory. The existing section already states that
     recalled, aggregated, and digested Outcomes are planning evidence only and
     do not create an approval, promotion, done, or review gate. The new rule
     reinforces, and must not weaken, that framing.

  Scope: the distributed maid-planner skill guidance plus an instruction
  payload version bump. maid-planner is already a distributable skill for both
  tools, so no `maid init` scope, `manifest.json`, or
  `scripts/sync_claude_files.py` change is required. Edits touch the two source
  skills (`.claude/` and `.codex/`) plus their generated package copies under
  `maid_runner/`, kept byte-for-byte in sync by the existing sync script. No
  `maid insights`, `maid enrich`, or core enrichment CLI behavior changes in
  this child.

  Instruction payload version bump: the skills `maid init` installs are exactly
  the repo-local agent payloads that `INSTRUCTION_PAYLOAD_VERSION` tracks
  (079-01). Changing the planner skill guidance without bumping the constant
  would let a downstream repo that already ran `maid init` keep the old planner
  payload while `maid init --check` still reports `current`, masking the
  staleness the versioning exists to surface. This child therefore advances
  `INSTRUCTION_PAYLOAD_VERSION` in `maid_runner/instruction_payload.py` to a new
  date-stamped value past the current `2026.06.27.1`, so downstream `--check`
  reports the changed planner payload as stale until re-init.

  Planned behavioral tests (red phase pending — handoff stops before tests):
  a new `tests/test_planner_theme_map_guidance.py` reads the maid-planner
  skills and asserts, for both Claude and Codex source copies, that
  (a) the Outcome-Aware guidance tells the planner to prefer
  `maid insights --theme-map .maid/outcomes-digest.json` when a fresh
  advisory enrichment digest exists, (b) the guidance states the mandatory
  fallback to plain `maid insights` when the digest is absent, stale, or
  invalid, and explicitly forbids forcing a stale digest with
  `--allow-stale-index`, (c) the guidance keeps the digest advisory and
  read-only — the planner must not generate the digest, call a model, or run
  `maid enrich`, (d) the guidance uses only registered `maid insights` options
  and contains no unregistered flags such as `--digest`, (e) the generated
  Claude and Codex package copies equal their sources after an isolated sync of
  the payload, so source and packaged guidance cannot drift, and (f) the
  instruction payload version advanced past the pre-change `2026.06.27.1`
  baseline so downstream `maid init --check` will report the changed payload as
  stale.

  Out of scope: changing `maid insights --theme-map` runtime behavior, the
  enrichment digest schema, the `maid-outcome-enrich` generation skill, recall
  ranking, and any non-planner skill guidance.
temptations:
- risk: Do not add planner-side freshness logic, a manual digest mtime check, or force a stale enriched digest with `--allow-stale-index`.
  instead: Tell the planner to try `maid insights --theme-map .maid/outcomes-digest.json` and fall back to plain `maid insights` when the runner reports the digest missing, stale, or invalid; the runner owns digest validation, and a stale enriched digest is worse than none.
- risk: Do not make the theme-mapped view mandatory or let a missing/rejected digest block, gate, or downgrade planning.
  instead: Keep plain `maid insights` as the always-available baseline; assert the fallback is explicit and non-blocking.
- risk: Do not instruct the planner to generate or refresh the digest (that needs a model call) or to run `maid enrich`.
  instead: Frame the planner as a read-only consumer; defer digest generation to the maid-outcome-enrich skill, and assert the planner guidance does not invoke enrich generation or a model.
- risk: Do not invent insights flags such as `maid insights --digest` (that flag belongs to `maid enrich`).
  instead: Quote only registered insights options and assert the absence of unregistered flags in a negative test.
- risk: Do not edit only the source skills, leave the generated package copies stale, make the guidance Claude-only, or change the installed planner payload without bumping the instruction payload version.
  instead: Edit both source skills plus generated copies, keep Claude/Codex identical, assert byte-for-byte parity from an isolated sync workspace, and advance `INSTRUCTION_PAYLOAD_VERSION` so `maid init --check` reports the changed payload as stale.
