schema: "2"
goal: "Format existing test files with Black without changing behavior"
type: refactor
created: "2026-05-17"
metadata:
  tags:
    - formatting
    - safe-refactor
    - tests
  priority: medium
description: |
  Fix repository-wide Black formatting drift in existing test files. The change
  is intentionally mechanical: Black may reflow code, but test behavior,
  assertions, fixtures, and CLI scenarios must remain unchanged.

  Rationale: two formatter targets already have active manifests, while two
  test files enter MAID coverage for the first time as part of this cleanup.
  Declaring their test functions protects the touched files without expanding
  production behavior scope.
temptations:
  - risk: "Do not combine formatter output with test behavior changes."
    instead: "Run Black only and preserve every assertion, fixture, and command scenario."
  - risk: "Do not skip MAID coverage for newly touched test files."
    instead: "Declare the existing test_function artifacts for the newly covered test files."
  - risk: "Do not broaden this cleanup into parser, chain, or manifest-event refactors."
    instead: "Limit implementation edits to mechanical formatting changes."
