    - kind: attribute
      name: _sarif_upload_wiring
      of: workflow
      type: github actions workflow section
      description: 'Opt-in upload-sarif workflow_call input (default false) that adds --sarif output to the verify step, preserves the default validation job permissions when disabled, and uses an if: always() gated github/codeql-action/upload-sarif path with security-events: write only for upload.'
  - path: docs/github-actions.md
    artifacts:
    - kind: attribute
      name: _sarif_upload_guidance
      of: documentation
      type: markdown section
      description: Documents the upload-sarif input, a caller example with the required permissions block, upload-on-failure behavior, and private-repo GitHub Advanced Security limitations.
