schema: '2'
goal: Wire optional SARIF upload into the reusable GitHub Actions workflow templates
type: feature
created: '2026-06-17T09:57:59Z'
metadata:
  epic: 065-00-ci-native-sarif-reporting
  tags:
  - ci-cd
  - sarif
  - github-actions
  - reporting
  priority: medium
description: |
  Update the reusable GitHub Actions workflow templates so consumers can
  optionally upload the SARIF report produced by 065-02 via
  `github/codeql-action/upload-sarif`, making MAID violations appear as
  inline PR annotations through GitHub code scanning. Document the required
  permissions and private-repository limitations. This child depends on
  065-02 (`--sarif <path>` on `maid validate` and `maid verify`).

  Pinned decisions from epic 065-00. Do not redesign these:

  1. Upload mechanism: `github/codeql-action/upload-sarif`. The SARIF file
     comes from the `--sarif <path>` flag added in 065-02; because that
     flag writes the report on both pass and fail, the SARIF artifact and
     code-scanning upload path must use `if: always()` so failing validation
     still annotates the PR.
  2. Exit-code behavior is unchanged: enabling SARIF upload must not
     weaken the validation gate. The workflow's pass/fail outcome stays
     exactly as today; the upload is an additional reporting step only.
  3. SARIF remains a derived view: the templates keep producing and
     uploading their existing JSON artifacts (`.maid/maid-verify.json`,
     `.maid/maid-test.json`); SARIF upload is additive and opt-in.
  4. Required permissions must be documented: uploading SARIF to code
     scanning requires `security-events: write` (and `actions: read` /
     `contents: read` for private repositories). Private-repo limitations
     must be documented: code scanning on private repositories requires
     GitHub Advanced Security; without it the upload step fails or is
     unavailable, so the option must default to off.

  Implementation shape (the reusable templates live in
  `.github/workflows/` and are consumed via
  `mamertofabian/maid-runner/.github/workflows/<name>.yml@<ref>` per
  docs/github-actions.md; there are no separately packaged template
  copies):

  - `.github/workflows/maid-validation.yml`: add an opt-in `workflow_call`
    input (e.g. `upload-sarif`, boolean, default false). When enabled, the
    verify step passes `--sarif .maid/maid-verify.sarif`.
  - Keep the existing validation job's default permission posture
    (`contents: read`) unchanged when the input is off. Because GitHub
    Actions job permissions are static rather than step-conditional, prefer
    a separate gated SARIF upload job with `if: always() &&
    inputs.upload-sarif`, `needs: maid-validation`, and the required
    `security-events: write` permission. The validation job should publish
    the SARIF file as an artifact with `if: always()` when upload is enabled;
    the upload job downloads that artifact and runs
    `github/codeql-action/upload-sarif`.
  - `docs/github-actions.md`: document the new input, an example caller
    snippet with the required `permissions` block, the unconditional
    upload-on-failure behavior, and the private-repo/Advanced Security
    limitation.

  Edge cases and test expectations (extend the existing template tests in
  tests/ci/test_github_actions_templates.py):

  - With the input disabled (default), the rendered workflow contains no
    behavioral change in the validation job: no --sarif flag is passed, no
    SARIF artifact is required, and the validation job keeps `contents:
    read` without `security-events: write`.
  - The template declares the `upload-sarif` input with default false.
  - The SARIF upload path references `github/codeql-action/upload-sarif`,
    is gated on the input, runs after failed validation via `if: always()`,
    and scopes `security-events: write` to the gated upload job rather than
    the default validation job.
  - The verify invocation under the input writes the SARIF path that the
    upload step reads (paths must match).
  - docs/github-actions.md documents `security-events: write` and the
    private-repo limitation (docs assertions).

  Planning note: the epic says "the reusable workflow templates" without
  naming which; this draft conservatively wires SARIF only into
  `maid-validation.yml`, the validation-gate template whose verify step
  produces diagnostics, and leaves `maid-test.yml` (test execution
  reporting) untouched. Planning note: docs/github-actions.md references
  only `.github/workflows/` template paths, so no packaged template copies
  need edits.

  Out of scope: the SARIF serializer and CLI flag (065-02), the
  diagnostics registry (065-01), and non-GitHub CI platform consumption
  documentation for GitLab, Jenkins, and generic pipelines (065-04).
temptations:
- risk: Do not let report upload change validation semantics or weaken the gate.
  instead: 'Keep the workflow''s pass/fail outcome untouched and add the upload as an opt-in, if: always() reporting step.'
- risk: Do not enable SARIF upload by default and break private repositories without Advanced Security.
  instead: 'Default the upload-sarif input to false and document the security-events: write permission and private-repo limitations.'
- risk: Do not fork the templates or drop the existing JSON artifacts.
  instead: Keep .maid/maid-verify.json artifact behavior intact and make SARIF strictly additive.
