schema: "2"
goal: "Retire test-discovery coverage legacy tests from tests/core/test_validate.py"
type: refactor
created: "2026-05-24"
supersedes:
  - 028-02-extract-validation-test-discovery-and-artifact-collection
  - 040-19-retire-behavioral-coverage-smoke-legacy-cases
metadata:
  tags:
    - safe-refactor
    - validation
    - test-retirement
    - priority-6
    - behavioral-coverage
    - test-discovery
  priority: medium
description: |
  Continue Priority 6 by moving the remaining test-discovery and no-artifact
  coverage smokes out of tests/core/test_validate.py. The helper-level test
  discovery contract remains in tests/core/test_validation_test_artifacts.py,
  and implementation-mode coverage behavior now lives in the focused behavioral
  coverage suite.

  This supersedes the original test-discovery extraction contract and the
  interim behavioral coverage smoke retirement anchor. It adds focused
  implementation-mode coverage for validate-command test targets and manifests
  with no declared artifacts before removing the broad legacy methods.
temptations:
  - risk: "Do not weaken discovery from files.read or validate commands."
    instead: "Keep helper-level find_test_files coverage and focused implementation-mode coverage for validate-command test files."
  - risk: "Do not weaken the rule that manifests without public artifacts do not require test files."
    instead: "Add focused implementation-mode coverage for a manifest with only files.read entries and no declared artifacts."
  - risk: "Do not drop collection error conversion or test-function filtering contracts while superseding the extraction manifest."
    instead: "Redeclare collect_test_artifacts, collection_errors_to_validation_errors, and their focused tests."
  - risk: "Do not keep executable placeholders in tests/core/test_validate.py."
    instead: "Remove the retired legacy methods and declare them under removed_artifacts."
removed_artifacts:
  - kind: method
    name: test_test_file_in_read_section_passes
    of: TestImplementationTestCoverage
    file: tests/core/test_validate.py
    reason: "Focused behavioral coverage and test-discovery helper tests now carry files.read test-target behavior."
  - kind: method
    name: test_test_file_in_validate_command_passes
    of: TestImplementationTestCoverage
    file: tests/core/test_validate.py
    reason: "Focused behavioral coverage tests now carry validate-command test-target behavior."
  - kind: method
    name: test_no_artifacts_no_test_required
    of: TestImplementationTestCoverage
    file: tests/core/test_validate.py
    reason: "Focused behavioral coverage tests now carry no-declared-artifacts test requirement behavior."
files:
  edit:
    - path: maid_runner/core/_validation_test_artifacts.py
      artifacts:
        - kind: function
          name: find_test_files
          args:
            - name: manifest
              type: Manifest
            - name: project_root
              type: Path
          returns: list[str]
        - kind: function
          name: get_validator_for_test
          args:
            - name: test_path
              type: str
            - name: registry
              type: ValidatorRegistry
          returns: Optional[BaseValidator]
        - kind: function
          name: collect_test_artifacts
          args:
            - name: test_files
              type: list[str]
            - name: project_root
              type: Path
            - name: registry
              type: ValidatorRegistry
            - name: errors
              type: list[ValidationError]
          returns: dict[str, list[FoundArtifact]]
        - kind: function
          name: collection_errors_to_validation_errors
          args:
            - name: collection_errors
              type: list[str]
            - name: file_path
              type: str
          returns: list[ValidationError]
    - path: maid_runner/core/validate.py
      artifacts:
        - kind: class
          name: ValidationEngine
        - kind: method
          name: validate_behavioral
          of: ValidationEngine
          args:
            - name: manifest
              type: Manifest
            - name: chain
              type: Optional[ManifestChain]
          returns: list[ValidationError]
        - kind: method
          name: _check_test_coverage
          of: ValidationEngine
          args:
            - name: manifest
              type: Manifest
          returns: list[ValidationError]
    - path: tests/core/test_validation_test_artifacts.py
      artifacts:
        - kind: test_function
          name: test_find_test_files_includes_files_read_and_validate_commands
          source_scenario: "A manifest lists test paths in files.read and validate commands."
          actions:
            - type: api_call
              subject:
                export: find_test_files
          expected:
            behavior: "The helper returns test files from both files.read and validate-command targets."
        - kind: test_function
          name: test_collect_test_artifacts_excludes_test_function_declarations
          source_scenario: "A Python test file imports a production artifact and defines a test function."
          actions:
            - type: api_call
              subject:
                export: collect_test_artifacts
          expected:
            behavior: "Collected behavioral artifacts include production references and exclude test_function declarations."
        - kind: test_function
          name: test_collect_test_artifacts_converts_parse_errors_to_validation_errors
          source_scenario: "A test file contains invalid Python syntax."
          actions:
            - type: api_call
              subject:
                export: collect_test_artifacts
          expected:
            behavior: "Collection errors are converted to SOURCE_PARSE_ERROR validation errors with test-file locations."
    - path: tests/core/validation/test_behavioral_coverage.py
      artifacts:
        - kind: test_function
          name: test_public_artifact_without_test_file_reports_no_test_files
          source_scenario: "A non-snapshot manifest declares a public artifact and has no explicit test file target."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "Implementation validation fails with ErrorCode.NO_TEST_FILES."
        - kind: test_function
          name: test_validate_command_test_file_satisfies_implementation_test_requirement
          source_scenario: "A manifest declares a public Python artifact and names the test file only in a validate command."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "Implementation validation succeeds without ErrorCode.NO_TEST_FILES or coverage errors."
        - kind: test_function
          name: test_private_only_manifest_does_not_require_test_files
          source_scenario: "A non-snapshot manifest declares only a private Python function and no explicit test target."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "Implementation validation succeeds without ErrorCode.NO_TEST_FILES or ErrorCode.ARTIFACT_NOT_USED_IN_TESTS in errors or warnings."
        - kind: test_function
          name: test_read_only_manifest_schema_error_does_not_also_require_test_files
          source_scenario: "A schema-invalid manifest contains only files.read entries and no declared artifacts."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "Implementation validation reports the schema error without also reporting ErrorCode.NO_TEST_FILES."
        - kind: test_function
          name: test_all_declared_public_artifacts_used_in_tests_reports_no_coverage_errors
          source_scenario: "A manifest declares two public Python functions and the test imports and calls both."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "Implementation validation succeeds without ErrorCode.ARTIFACT_NOT_USED_IN_TESTS in errors or warnings."
        - kind: test_function
          name: test_private_artifact_without_test_reference_reports_no_coverage_errors
          source_scenario: "A manifest declares one public Python function and one private helper, while the test references only the public function."
          actions:
            - type: api_call
              subject:
                export: ValidationEngine
          expected:
            behavior: "Implementation validation succeeds without ErrorCode.ARTIFACT_NOT_USED_IN_TESTS for the private helper in errors or warnings."
  read:
    - tests/core/test_validate.py
    - tests/core/test_validate_test_functions.py
    - maid_runner/core/_file_discovery.py
    - maid_runner/core/identity.py
    - maid_runner/validators/base.py
    - maid_runner/validators/registry.py
    - manifests/028-02-extract-validation-test-discovery-and-artifact-collection.manifest.yaml
    - manifests/040-19-retire-behavioral-coverage-smoke-legacy-cases.manifest.yaml
    - manifests/038-01-add-lean-behavioral-coverage-characterization.manifest.yaml
    - manifests/030-05-promote-coverage-misses-to-errors.manifest.yaml
    - manifests/snapshot-core-validate.manifest.yaml
validate:
  - uv run python -m pytest -q tests/core/test_validation_test_artifacts.py tests/core/validation/test_behavioral_coverage.py tests/core/test_validate.py tests/core/test_validate_test_functions.py
  - uv run maid validate manifests/snapshot-core-validate.manifest.yaml --mode implementation
