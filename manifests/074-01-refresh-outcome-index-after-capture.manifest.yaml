- uv run python -m pytest -q tests/test_outcome_learn_refresh_guidance.py
- uv run maid validate manifests/074-01-refresh-outcome-index-after-capture.manifest.yaml --mode behavioral --quiet
- uv run maid validate manifests/074-01-refresh-outcome-index-after-capture.manifest.yaml --mode implementation --quiet
