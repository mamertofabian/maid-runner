  rationale: "The incident showed that open-ended guidance lets agents invent recovery maneuvers around red evidence. A first-class targeted stash mode gives agents one concrete method while failing closed on unrelated work, staged target paths, conflicting revise modes, ambiguous stash identity, target-path restore conflicts, and validation-mutated contract files."
