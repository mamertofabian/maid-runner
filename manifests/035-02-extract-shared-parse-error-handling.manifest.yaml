# draft-kind: implementation
schema: "2"
goal: "Extract shared parse-error wrapping from Python and TypeScript validators into BaseValidator"
type: refactor
created: "2026-05-19"
metadata:
  tags:
    - safe-refactor
    - validators
    - base-validator
    - duplication
  priority: medium
  engine: safe-refactor
description: |
  Close the duplication where `PythonValidator` and `TypeScriptValidator` both
  repeat the parse-then-wrap pattern in their implementation and behavioral
  collection methods.

  Current shape:

  - `maid_runner/validators/python.py:119-151` parses with `ast.parse`, catches
    `SyntaxError`, and returns a `CollectionResult` with the error string;
    otherwise returns a `CollectionResult` with collected artifacts.
  - `maid_runner/validators/typescript.py:45-84` parses with
    `parse_typescript_source`, checks `session.parse_errors`, and returns the
    same `CollectionResult` shape with errors; otherwise returns artifacts.

  Add a protected helper on `BaseValidator` that takes a parse callable and
  an artifact-collection callable, and returns the canonical `CollectionResult`
  for the language. Route both Python collection methods and both TypeScript
  collection methods through it. Svelte already delegates to TypeScript so
  no further changes are needed there.

  Public method signatures stay identical: `collect_implementation_artifacts`
  and `collect_behavioral_artifacts` remain the supported API and continue to
  return a `CollectionResult` with the same `language`, `file_path`,
  `artifacts`, and `errors` fields.
temptations:
  - risk: "Do not change the public method signatures of `collect_implementation_artifacts` or `collect_behavioral_artifacts`."
    instead: "Keep them as thin call-throughs to the shared helper; their return types and field shapes stay byte-identical."
  - risk: "Do not change error string content."
    instead: "Preserve `Syntax error: {e}` for Python and the existing `session.parse_errors` strings for TypeScript so downstream callers and tests stay green."
  - risk: "Do not migrate Svelte in this draft."
    instead: "Svelte delegates to the TypeScript validator; further consolidation is out of scope here and would expand the diff."
  - risk: "Do not move the helper into a public, importable function."
    instead: "Keep it as a protected method on BaseValidator so refactor scope stays internal to the validators package."
  - risk: "Do not skip the equivalence test against the 035-01 characterization suite."
    instead: "After implementation, rerun the characterization suite plus the validator-specific tests and confirm the CollectionResult shape is byte-identical for valid and malformed inputs."
files:
  edit:
    - path: maid_runner/validators/base.py
      artifacts:
        - kind: method
          name: _collect_with_parse_guard
          of: BaseValidator
          args:
            - name: language
              type: str
            - name: file_path
              type: "Union[str, Path]"
            - name: parse_fn
              type: "Callable[[], object]"
            - name: collect_fn
              type: "Callable[[object], list[FoundArtifact]]"
            - name: errors_from_session
              type: "Optional[Callable[[object], list[str]]]"
              default: None
            - name: exception_to_error
              type: "Optional[Callable[[Exception], list[str]]]"
              default: None
          returns: CollectionResult
          description: "Run parse_fn, short-circuit on parse errors via either exception_to_error or errors_from_session, otherwise return CollectionResult with collected artifacts."
    - path: maid_runner/validators/python.py
      artifacts:
        - kind: method
          name: collect_implementation_artifacts
          of: PythonValidator
          args:
            - name: source
              type: str
            - name: file_path
              type: "Union[str, Path]"
          returns: CollectionResult
          description: "Delegate parsing and error wrapping to BaseValidator._collect_with_parse_guard; keep return shape identical."
        - kind: method
          name: collect_behavioral_artifacts
          of: PythonValidator
          args:
            - name: source
              type: str
            - name: file_path
              type: "Union[str, Path]"
          returns: CollectionResult
          description: "Delegate parsing and error wrapping to BaseValidator._collect_with_parse_guard; keep return shape identical."
    - path: maid_runner/validators/typescript.py
      artifacts:
        - kind: method
          name: collect_implementation_artifacts
          of: TypeScriptValidator
          args:
            - name: source
              type: str
            - name: file_path
              type: "Union[str, Path]"
          returns: CollectionResult
          description: "Delegate parsing and error wrapping to BaseValidator._collect_with_parse_guard; keep return shape identical."
        - kind: method
          name: collect_behavioral_artifacts
          of: TypeScriptValidator
          args:
            - name: source
              type: str
            - name: file_path
              type: "Union[str, Path]"
          returns: CollectionResult
          description: "Delegate parsing and error wrapping to BaseValidator._collect_with_parse_guard; keep return shape identical."
    - path: tests/validators/test_base.py
      artifacts:
        - kind: test_function
          name: test_collect_with_parse_guard_returns_artifacts_on_success
          source_scenario: "A subclass calls _collect_with_parse_guard with a parse_fn that succeeds and a collect_fn that returns two artifacts."
          actions:
            - type: api_call
              subject:
                export: BaseValidator
          expected:
            behavior: "The returned CollectionResult carries both artifacts, the supplied language, the supplied file_path, and an empty errors list."
        - kind: test_function
          name: test_collect_with_parse_guard_short_circuits_on_exception
          source_scenario: "parse_fn raises SyntaxError and exception_to_error formats it into a single string."
          actions:
            - type: api_call
              subject:
                export: BaseValidator
          expected:
            behavior: "The returned CollectionResult has an empty artifacts list and exactly one error string produced by exception_to_error."
        - kind: test_function
          name: test_collect_with_parse_guard_short_circuits_on_session_errors
          source_scenario: "parse_fn returns a session whose errors_from_session yields two error strings."
          actions:
            - type: api_call
              subject:
                export: BaseValidator
          expected:
            behavior: "The returned CollectionResult has an empty artifacts list and the two error strings, and collect_fn is never invoked."
    - path: tests/validators/test_python.py
      artifacts:
        - kind: test_function
          name: test_python_validator_collection_results_match_pre_refactor_shape
          source_scenario: "PythonValidator collects implementation and behavioral artifacts from a valid module and from a module with a SyntaxError."
          actions:
            - type: api_call
              subject:
                export: PythonValidator
          expected:
            behavior: "Both methods return CollectionResult instances whose language, file_path, artifacts, and errors fields match the pre-refactor characterization snapshot byte-for-byte."
    - path: tests/validators/test_typescript.py
      artifacts:
        - kind: test_function
          name: test_typescript_validator_collection_results_match_pre_refactor_shape
          source_scenario: "TypeScriptValidator collects implementation and behavioral artifacts from a valid TS source and from a TS source with a parse error."
          actions:
            - type: api_call
              subject:
                export: TypeScriptValidator
          expected:
            behavior: "Both methods return CollectionResult instances whose language, file_path, artifacts, and errors fields match the pre-refactor characterization snapshot byte-for-byte."
  read:
    - docs/plans/maid-runner-cleanup-refactor-backlog.md
    - manifests/drafts/035-00-maid-runner-cleanup-refactor-roadmap.epic.yaml
    - manifests/035-01-characterize-validation-engine.manifest.yaml
    - maid_runner/validators/svelte.py
    - tests/core/test_validate_engine_characterization.py
validate:
  - uv run python -m pytest -q tests/core/test_validate_engine_characterization.py tests/validators/test_base.py tests/validators/test_python.py tests/validators/test_typescript.py
