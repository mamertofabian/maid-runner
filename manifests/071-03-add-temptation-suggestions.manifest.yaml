description: |
  Implement deterministic, advisory temptation suggestions over the incident
  store created by 071-01: `maid incident suggest-temptations --paths
  <comma-list> [--json]`.

  Depends on 071-01 (record format, closed vocabulary, and the
  `maid incident` command surface). Do not promote before 071-01; children
  of this epic land strictly in order.

  Pinned decisions (do not redesign):

  1. CLI surface, exactly: `maid incident suggest-temptations --paths
     <comma-list> [--json]`. It aggregates incident records whose packet
     diagnostics touch the given paths, groups them by `pattern_tags`, and
     renders ready-to-paste manifest `temptations` entries.
  2. Rendering uses FIXED text templates per tag. The template table lives
     in code beside the closed vocabulary (in
     `maid_runner/core/incidents.py`, next to `PATTERN_TAGS`). One template
     per vocabulary tag: `test-weakening`, `trivial-test`,
     `stub-implementation`, `contract-renegotiation`, `scope-escape`,
     `runner-gaming`, `false-done`.
  3. Output ordering: tag frequency descending, then tag name ascending.
  4. Rendered entries must match the manifest schema's TemptationSpec shape:
     objects with exactly the keys `risk` and `instead`, both non-empty
     strings, no additional properties (see the TemptationSpec definition in
     `maid_runner/schemas/manifest.v2.schema.json`).
  5. Suggestions stay deterministic and ADVISORY: render ready-to-paste
     entries; a human or planning agent decides what enters a manifest. No
     automatic manifest edits.
  6. Non-AI contract: aggregation handles only explicit stored data. No
     inference or classification.
  7. Epic 066's recall planning integration may later surface incidents; do
     NOT couple the implementations, only the documentation (the
     cross-linking happens in 071-04, not here).

  Behavioral test expectations (from the epic): path filtering against
  packet diagnostics, frequency-then-name ordering, rendered YAML matching
  the manifest schema's TemptationSpec shape (validate the rendered entries
  against the schema definition in a test), and empty-result output (no
  matching incidents renders an explicit empty result, not an error).

  Edge cases: a tag present in records but missing from the template table
  cannot occur because the vocabulary is closed and the template table is
  required to cover every vocabulary tag (assert this pairing in a test);
  records whose diagnostics touch none of the given paths are excluded; an
  empty or absent incident store yields the empty result.

  Planning note: the epic says diagnostics "touch the given paths" without
  pinning the comparison. Conservative reading: a record matches when any
  diagnostic `file` value, normalized to repo-relative POSIX form, exactly
  equals one of the given paths after the same normalization. No prefix,
  glob, or fuzzy overlap matching.

  Out of scope for this child: record capture/update/list (071-01), DPO
  export (071-02), skill guidance and 066 recall cross-linking (071-04).
temptations:
- risk: Do not turn temptation suggestions into automatic manifest edits.
  instead: Render ready-to-paste advisory entries; a human or planning agent decides what enters a manifest.
- risk: Do not generate free-form suggestion text or vary templates by context.
  instead: Use the fixed per-tag template table that lives in code beside the closed vocabulary, with one template per tag.
- risk: Do not couple this implementation to epic 066's recall integration.
  instead: Keep the implementations independent; only documentation (071-04) cross-links the recall workflow.
- risk: Do not emit entries that drift from the manifest schema.
  instead: Render objects with exactly risk and instead keys and assert TemptationSpec conformance in tests.
files:
  create:
  - path: tests/core/test_temptation_suggestions.py
    artifacts:
    - kind: test_function
      name: test_suggest_temptations_filters_by_exact_normalized_diagnostic_path_and_orders_by_frequency_then_tag
      description: Incident records touching the requested path are grouped by pattern tag and ordered by count descending then tag name.
    - kind: test_function
      name: test_temptation_templates_cover_closed_vocabulary_and_render_schema_shape
      description: The fixed template table covers every closed-vocabulary tag and rendered YAML entries match TemptationSpec.
    - kind: test_function
      name: test_suggest_temptations_empty_store_returns_empty_tuple_and_explicit_empty_yaml
      description: Absent or non-matching incident stores produce an empty tuple and explicit empty YAML result.
  - path: tests/cli/test_incident_suggest_cmd.py
    artifacts:
    - kind: test_function
      name: test_build_parser_registers_incident_suggest_temptations_options
      description: The incident parser exposes suggest-temptations with required --paths and optional --json.
    - kind: test_function
      name: test_incident_suggest_temptations_outputs_yaml_and_json
      description: The CLI prints advisory YAML or JSON suggestions ordered by frequency then tag name.
    - kind: test_function
      name: test_incident_suggest_temptations_empty_store_reports_explicit_empty_result
      description: The CLI reports an explicit empty result instead of failing when no incidents match.
  edit:
  - path: maid_runner/core/incidents.py
    artifacts:
    - kind: attribute
      name: TEMPTATION_TEMPLATES
      type: dict[str, tuple[str, str]]
      description: Fixed per-tag (risk, instead) text templates, living beside PATTERN_TAGS, covering every closed-vocabulary tag.
    - kind: class
      name: TemptationSuggestion
      description: One advisory suggestion grouping incidents by pattern tag with its rendered TemptationSpec text.
    - kind: attribute
      name: tag
      of: TemptationSuggestion
      type: str
    - kind: attribute
      name: incident_count
      of: TemptationSuggestion
      type: int
    - kind: attribute
      name: risk
      of: TemptationSuggestion
      type: str
    - kind: attribute
      name: instead
      of: TemptationSuggestion
      type: str
    - kind: function
      name: suggest_temptations
      args:
      - name: incidents_dir
        type: Union[str, Path]
      - name: paths
        type: Collection[str]
      returns: tuple[TemptationSuggestion, ...]
      source_scenario: Incident records whose packet diagnostics touch the given paths carry overlapping pattern tags.
      actions:
      - type: api_call
        subject:
          function: suggest_temptations
      expected:
        behavior: Records are filtered by exact normalized diagnostic-file path match, grouped by pattern_tags, and returned ordered by tag frequency descending then tag name; no matching incidents yields an empty tuple.
    - kind: function
      name: render_temptation_yaml
      args:
      - name: suggestions
        type: Collection[TemptationSuggestion]
      returns: str
      source_scenario: Suggestions are rendered for pasting into a manifest temptations block.
      actions:
      - type: api_call
        subject:
          function: render_temptation_yaml
      expected:
        behavior: Rendered YAML entries have exactly the risk and instead keys with non-empty strings, matching the manifest schema's TemptationSpec shape, and rendering is byte-stable for identical inputs.
  - path: maid_runner/cli/commands/incident.py
    artifacts:
    - kind: function
      name: cmd_incident
      args:
      - name: args
        type: argparse.Namespace
      returns: int
      source_scenario: '`maid incident suggest-temptations --paths maid_runner/core/validate.py --json` aggregates incidents touching that path.'
      actions:
      - type: api_call
        subject:
          function: cmd_incident
      expected:
        behavior: suggest-temptations parses the comma-list of paths, prints ready-to-paste YAML entries or --json output ordered by tag frequency then tag name, and reports an explicit empty result when nothing matches.
  - path: maid_runner/cli/commands/_main.py
    artifacts:
    - kind: function
      name: build_parser
      args: []
      returns: argparse.ArgumentParser
      source_scenario: A user invokes `maid incident suggest-temptations --paths <comma-list> --json`.
      actions:
      - type: api_call
        subject:
          function: build_parser
      expected:
        behavior: The incident subcommand exposes a suggest-temptations action with --paths and --json options.
