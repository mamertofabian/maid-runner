      description: Behavioral coverage that `maid init --tool claude` and `maid init --tool codex` install workflow skill payloads carrying active insights, recall, failure-lesson learning, and phase-specific evidence-digestion anchors.
    - kind: test_function
      name: test_init_generated_guidance_requires_learning_digest
