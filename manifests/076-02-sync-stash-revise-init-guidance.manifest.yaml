    - lesson_type: validation
      summary: "Avoid adding assertions to shared behavioral test files already locked by older active manifests. New follow-up contracts should prefer dedicated test files unless the older locks are intentionally evolved."
      tags:
        - plan-lock
        - shared-tests
        - changed-scope
      paths:
        - tests/cli/test_init_stash_revise_guidance.py
        - .maid/plan-locks/076-02-sync-stash-revise-init-guidance.lock.json
    - lesson_type: validation
      summary: "Tests that verify generated payloads should create the packaged payload in a temp workspace with `scripts/sync_claude_files.py` rather than depending on ignored generated files in the working tree."
      tags:
        - generated-payload
        - package-data
        - tests
      paths:
        - tests/cli/test_init_stash_revise_guidance.py
        - scripts/sync_claude_files.py
