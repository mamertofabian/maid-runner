# archive-kind: consumed-draft-epic
schema: "2"
goal: "Archive consumed manifest authoring and brownfield onboarding epic"
type: feature
created: "2026-06-10"
metadata:
  status: archived
  tags:
    - adoption
    - manifest-authoring
    - bootstrap
    - snapshot
    - developer-experience
    - archive
  priority: low
description: |
  This split-before-promote epic has been consumed. Its implementation-sized
  child contracts were promoted as:

  - `061-01-extract-diff-scope-artifact-collection`
  - `061-02-add-maid-manifest-from-diff-command`
  - `061-03-suggest-validate-commands-from-test-layout`
  - `061-04-rank-bootstrap-adoption-plan`
  - `061-05-document-brownfield-onboarding-path`

  The promoted children added reusable diff-scope collection, deterministic
  `maid manifest from-diff` draft generation, evidence-backed validate command
  suggestions, ranked brownfield bootstrap adoption, and documentation for the
  rank-then-from-diff onboarding path.

  The file remains in `manifests/drafts/` only as a historical pointer. Do not
  promote or implement this archived epic. Future manifest-authoring or
  brownfield-onboarding work should start from a fresh scoped manifest after
  the contracts and documentation added by the 061 children.
temptations:
  - risk: "Do not let generated manifests skip the draft lifecycle or auto-promote into manifests/."
    instead: "Always write to manifests/drafts/ and keep the documented promotion gates as the only path to an active contract."
  - risk: "Do not guess artifact signatures or types that collectors could not determine."
    instead: "Emit explicit placeholder markers that schema-validate but fail promotion review until a human or agent fills them in."
  - risk: "Do not invent new diff or baseline semantics for generation."
    instead: "Reuse the existing changed-scope baseline rules and fail closed when no baseline evidence exists, matching maid verify behavior."
  - risk: "Do not bulk-generate manifests for the whole repository in the guided bootstrap mode."
    instead: "Rank candidates with deterministic, traceable signals and emit a bounded adoption plan the user explicitly acts on."
  - risk: "Do not duplicate snapshot collector logic inside the new command."
    instead: "Extract the shared diff-scope collection helper first (061-01) and have both snapshot and from-diff call it."
files:
  edit:
    - path: manifests/drafts/061-00-manifest-authoring-and-brownfield-onboarding.epic.yaml
      artifacts:
        - kind: attribute
          name: _archived_manifest_authoring_onboarding_epic
          of: manifest
          type: draft epic
          description: "Historical pointer for promoted child manifests 061-01 through 061-05."
  read:
    - manifests/061-01-extract-diff-scope-artifact-collection.manifest.yaml
    - manifests/061-02-add-maid-manifest-from-diff-command.manifest.yaml
    - manifests/061-03-suggest-validate-commands-from-test-layout.manifest.yaml
    - manifests/061-04-rank-bootstrap-adoption-plan.manifest.yaml
    - manifests/061-05-document-brownfield-onboarding-path.manifest.yaml
validate:
  - uv run maid validate manifests/drafts/061-00-manifest-authoring-and-brownfield-onboarding.epic.yaml --mode schema --quiet
