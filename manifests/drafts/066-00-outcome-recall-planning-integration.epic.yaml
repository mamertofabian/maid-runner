# archive-kind: consumed-draft-epic
schema: "2"
goal: "Archive consumed Outcome recall planning integration epic"
type: feature
created: "2026-06-10"
metadata:
  status: archived
  tags:
    - outcome-records
    - recall
    - learning
    - maid-workflow
    - agent-skills
    - archive
  priority: low
description: |
  This split-before-promote epic has been consumed. Its implementation-sized
  child contracts were promoted as:

  - `066-01-add-recall-for-manifest-query`
  - `066-02-add-planning-recall-summary-output`
  - `066-03-update-agent-skill-guidance-for-recall`
  - `066-04-sync-init-payloads-with-recall-workflow`

  The promoted children added deterministic `maid recall --for-manifest <path>`
  query derivation, the advisory `--plan-packet` planning summary, recall-aware
  Claude and Codex MAID skill guidance, and synchronized recall-integrated
  workflow guidance in `maid init` payloads.

  The file remains in `manifests/drafts/` only as a historical pointer. Do not
  promote or implement this archived epic. Future Outcome recall planning work
  should start from a fresh scoped manifest after the contracts, documentation,
  and packaged payload behavior added by the 066 children.
temptations:
  - risk: "Do not add AI inference, embeddings, or semantic similarity to query derivation or ranking."
    instead: "Use the shipped manifest-field extraction and deterministic recall ranking contracts from 066-01."
  - risk: "Do not let recall results gate or modify validation outcomes."
    instead: "Keep recall advisory planning evidence; validation, done gates, and promotion rules remain unchanged by the 066 children."
  - risk: "Do not silently answer planning queries from a stale Outcome index."
    instead: "Reuse the existing stale-index failure and require the explicit allow-stale-index opt-in."
  - risk: "Do not put recall workflow knowledge only in agent skills."
    instead: "Use the CLI behavior, skill guidance, and init payload synchronization shipped by 066-01 through 066-04."
files:
  edit:
    - path: manifests/drafts/066-00-outcome-recall-planning-integration.epic.yaml
      artifacts:
        - kind: attribute
          name: _archived_outcome_recall_planning_epic
          of: manifest
          type: draft epic
          description: "Historical pointer for promoted child manifests 066-01 through 066-04."
  read:
    - manifests/066-01-add-recall-for-manifest-query.manifest.yaml
    - manifests/066-02-add-planning-recall-summary-output.manifest.yaml
    - manifests/066-03-update-agent-skill-guidance-for-recall.manifest.yaml
    - manifests/066-04-sync-init-payloads-with-recall-workflow.manifest.yaml
validate:
  - uv run maid validate manifests/drafts/066-00-outcome-recall-planning-integration.epic.yaml --mode schema --quiet
