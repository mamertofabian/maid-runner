# draft-kind: implementation
schema: "2"
goal: "Add `maid recall --for-manifest <path>` deriving deterministic recall queries from a manifest"
type: feature
created: "2026-06-10T06:01:00Z"
metadata:
  status: draft
  epic: 066-00-outcome-recall-planning-integration.epic
  tags:
    - outcome-records
    - recall
    - learning
    - maid-workflow
  priority: medium
description: |
  Extend `maid_runner/core/outcome_recall.py` and the flag wiring in
  `maid_runner/cli/commands/recall.py` so `maid recall --for-manifest <path>`
  derives a recall query from a manifest file itself instead of requiring the
  caller to compose filters by hand. The flag accepts both draft manifests
  (under `manifests/drafts/`) and active manifests (under `manifests/`).

  Pinned decisions (do not redesign):

  1. Query signals are derived EXACTLY from these manifest fields and nothing
     else: declared file paths (`files.create`, `files.edit`, `files.delete`),
     declared artifact names, `metadata.tags`, and validate command tokens.
     Query derivation is deterministic field extraction, not inference. No AI,
     embeddings, or semantic similarity anywhere in derivation or ranking.
  2. Each derived signal records which manifest field produced it, and that
     source appears in BOTH text and JSON output. Output must show which
     manifest fields produced which query signals.
  3. Result explanations name the match dimensions per result: path overlap,
     artifact identity, tag match, and validation-command similarity. The
     existing recall ranking weights and tie-breakers (sort by score
     descending, then manifest slug, then manifest path) are reused UNCHANGED.
     No new ranking algorithm. The existing `recall_outcomes` reason strings
     already encode these dimensions; the new surface maps derived signals
     onto the existing query fields (`paths`, `artifacts`, `tags`,
     `validation_commands`) and reports per-result reasons as today.
  4. Stale-index behavior matches existing recall semantics: fail with the
     stale-index error unless `--allow-stale-index` is passed. Never silently
     answer a planning query from stale data.
  5. Recall stays advisory planning evidence in this epic. No done-gate or
     promotion gate starts requiring recall evidence; validation, done gates,
     and promotion rules are unchanged.

  Implementation shape:

  - `derive_recall_query(manifest_path, project_root)` loads the manifest
    YAML, extracts the signal values listed in decision 1, and returns a
    `ManifestRecallDerivation` holding the derived `OutcomeRecallQuery` plus a
    tuple of `ManifestQuerySignal` entries. Each signal carries the signal
    value, the query dimension it feeds (path, artifact, tag, or
    validation-command), and the manifest field that produced it (for example
    `files.edit[0].path`, `metadata.tags`, `validate[1]`).
  - Validate command tokens reuse the same tokenization style already used by
    recall's validation-command matching: each whitespace token of each
    validate command becomes one candidate signal value.
  - `cmd_recall` gains the `--for-manifest <path>` flag. When supplied, the
    derived query is run against the learned index via the existing
    `recall_outcomes`, and output (text and `--json`) includes the derived
    signals with their sources, followed by ranked matches with the existing
    per-result reasons. `--for-manifest` composes with the existing index,
    limit, project-root, manifest-dir, and `--allow-stale-index` options.

  Behavioral test expectations (from the epic):

  - Signal extraction: a fixture manifest with create/edit/delete paths,
    artifact declarations, metadata tags, and validate commands produces
    exactly the expected signals, each annotated with its source field.
  - Ranking stability: equal-score records order by manifest slug then
    manifest path, identical to plain `maid recall`.
  - Empty-index behavior: a valid index with zero records returns zero
    matches without error.
  - Stale-index failure: a stale index fails by default and succeeds only
    with `--allow-stale-index`.

  Edge cases: a manifest whose extractable fields are all empty is rejected by
  `derive_recall_query` with a `ValueError` naming the manifest path and
  stating that no recall query signals were found. `cmd_recall` surfaces that
  failure as a clear nonzero CLI error, including JSON error output when
  `--json` is used. The existing `recall_outcomes` empty-query guard remains
  unchanged for manually constructed generic `OutcomeRecallQuery` values. A
  missing or unparseable manifest path returns nonzero with the path in the
  error. Duplicate values across fields are de-duplicated per query dimension
  exactly as existing query normalization already does.

  Planning note: the epic does not pin whether derived filters are conjunctive
  like hand-written recall filters. Conservative reading: derived signals are
  mapped onto the existing `OutcomeRecallQuery` fields without altering
  `recall_outcomes` filter-first semantics, so eligibility and scoring behave
  exactly as if a human had passed the same values by hand.

  Out of scope for this child: the `--plan-packet` planning report mode
  (066-02), agent skill guidance updates (066-03), and init payload sync
  (066-04).
temptations:
  - risk: "Do not add AI inference, embeddings, or semantic similarity to query derivation or ranking."
    instead: "Derive query signals by explicit field extraction from the four pinned manifest fields and reuse the existing deterministic recall ranking with stable tie-breakers."
  - risk: "Do not return unexplained ranked results that agents will treat as oracle output."
    instead: "Report which manifest fields produced each query signal and why each result matched, in both text and JSON output."
  - risk: "Do not silently answer planning queries from a stale Outcome index."
    instead: "Reuse the existing stale-index failure and require the explicit --allow-stale-index opt-in."
  - risk: "Do not let recall results gate or modify validation outcomes."
    instead: "Keep recall advisory planning evidence; validation, done gates, and promotion rules remain unchanged."
files:
  edit:
    - path: maid_runner/core/outcome_recall.py
      artifacts:
        - kind: class
          name: ManifestQuerySignal
          description: "One derived query signal with its value, query dimension, and the manifest field that produced it."
        - kind: attribute
          name: value
          of: ManifestQuerySignal
          type: str
        - kind: attribute
          name: dimension
          of: ManifestQuerySignal
          type: str
        - kind: attribute
          name: source_field
          of: ManifestQuerySignal
          type: str
        - kind: class
          name: ManifestRecallDerivation
          description: "Deterministic derivation result pairing the derived recall query with its traceable signals."
        - kind: attribute
          name: manifest_path
          of: ManifestRecallDerivation
          type: str
        - kind: attribute
          name: signals
          of: ManifestRecallDerivation
          type: tuple[ManifestQuerySignal, ...]
        - kind: attribute
          name: query
          of: ManifestRecallDerivation
          type: OutcomeRecallQuery
        - kind: function
          name: derive_recall_query
          args:
            - name: manifest_path
              type: Union[str, Path]
            - name: project_root
              type: Union[str, Path]
              default: "'.'"
          returns: ManifestRecallDerivation
          source_scenario: "A draft manifest declares files, artifacts, tags, and validate commands."
          actions:
            - type: api_call
              subject:
                function: derive_recall_query
          expected:
            behavior: "Signals are extracted exactly from files.create/edit/delete paths, declared artifact names, metadata.tags, and validate command tokens; each signal records its source manifest field; an all-empty derivation fails loudly."
    - path: maid_runner/cli/commands/recall.py
      artifacts:
        - kind: function
          name: cmd_recall
          args:
            - name: args
              type: argparse.Namespace
          returns: int
          source_scenario: "`maid recall --for-manifest manifests/drafts/some-task.manifest.yaml --json` searches the learned Outcome index."
          actions:
            - type: api_call
              subject:
                function: cmd_recall
          expected:
            behavior: "The command derives the query from the manifest, reports derived signals with their source fields in text and JSON, prints ranked matches with existing per-result reasons, fails stale indexes unless --allow-stale-index, and returns nonzero for missing or unparseable manifests and empty derivations."
    - path: maid_runner/cli/commands/_main.py
      artifacts:
        - kind: function
          name: build_parser
          args: []
          returns: argparse.ArgumentParser
          source_scenario: "A user invokes `maid recall --for-manifest <path>`."
          actions:
            - type: api_call
              subject:
                function: build_parser
          expected:
            behavior: "The recall parser accepts --for-manifest alongside the existing filter, index, limit, stale-check override, --allow-stale-index, and --json options."
        - kind: function
          name: main
          args:
            - name: argv
              type: list[str] | None
              default: None
          returns: int
          source_scenario: "The parsed command is `recall` with --for-manifest."
          actions:
            - type: api_call
              subject:
                function: main
          expected:
            behavior: "The CLI dispatches to `maid_runner.cli.commands.recall.cmd_recall`."
  read:
    - manifests/drafts/066-00-outcome-recall-planning-integration.epic.yaml
    - manifests/047-03-add-maid-learn-outcome-index.manifest.yaml
    - manifests/047-04-add-maid-recall-outcome-search.manifest.yaml
    - maid_runner/core/outcomes.py
    - maid_runner/core/manifest.py
    - tests/core/test_manifest_recall_query.py
    - tests/cli/test_recall_for_manifest_cmd.py
validate:
  - uv run python -m pytest -q tests/core/test_manifest_recall_query.py tests/cli/test_recall_for_manifest_cmd.py
