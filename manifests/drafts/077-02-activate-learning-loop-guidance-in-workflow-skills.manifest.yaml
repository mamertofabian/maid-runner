description: |
  Activate the Outcome learning loop in the four cross-tool workflow skills:
  maid-planner, maid-plan-review, maid-implementer, and
  maid-implementation-review. Today these skills mention `maid insights` and
  (outside the planner) `maid recall` only defensively, so planning-phase
  learning is not actually exploited during implementation or review. This child
  upgrades three concerns at once, in one child, because all three edit the same
  four SKILL.md files; splitting them into sequential drafts over the same files
  would create the plan-lock / stale-sync churn the 066-03/066-04 Outcome
  lessons flag.

  Three concerns:

  1. Insights trigger. Replace the defensive "use `maid insights` only as
     aggregate evidence" framing with an active trigger ("review recurring
     Outcome lessons with `maid insights` before drafting / before reviewing"),
     while preserving the advisory sentence so insights never becomes a gate.
  2. Recall breadth. Add active recall guidance to plan-review, implementer, and
     implementation-review so the planner's recalled evidence is consulted when
     choosing tests and code and when reviewing scope, using the exact shipped
     commands `maid recall --for-manifest <path>` and
     `maid recall --for-manifest <path> --plan-packet`. maid-planner already has
     the 066-03 recall anchor and is edited here only for the insights trigger
     and failure-lesson note, not to change its existing recall anchor.
  3. Failure lessons. Add a short opt-in note that the most instructive failed
     and abandoned Outcomes reach recall only when the index is refreshed with
     `maid learn --include-status completed --include-status abandoned` (then
     recall); framed as an intentional opt-in, not a new default.

  Pinned decisions (do not redesign):

  1. Quote only registered options. `--include-status` is a `maid learn` option
     and must not be attached to `maid recall` or `maid insights`. `maid insights`
     exposes only `--index`, `--manifest-dir`, `--project-root`,
     `--allow-stale-index`, `--limit`, `--json`. Recall uses only
     `--for-manifest <path>` and `--plan-packet` (plus `--allow-stale-index`).
     Negative tests pin the absence of invented flags.
  2. Advisory framing is preserved. Each skill must keep stating that recalled
     and aggregated Outcomes are planning evidence only and never replace
     behavioral tests, declared scope, validation, or review. No done gate or
     promotion gate depends on insights, recall, or failure lessons.
  3. Cross-tool parity. All four skills ship to both Claude and Codex, so each
     edit touches four copies: the Claude source `.claude/skills/<s>/SKILL.md`,
     the Codex source `.codex/skills/<s>/SKILL.md`, and the generated package
     copies `maid_runner/claude/skills/<s>/SKILL.md` and
     `maid_runner/codex/skills/<s>/SKILL.md`. Generated copies are gitignored and
     produced by `scripts/sync_claude_files.py`; parity tests run the sync script
     in an isolated workspace.
  4. Do not regress 066-03. `tests/test_recall_skill_guidance.py` and
     `tests/test_recall_payload_sync.py` assert exact recall command surface and
     byte-for-byte sync parity; keep exactly one canonical recall command line
     per skill and re-run the sync so these stay green. They are included in this
     child's validate command.

  Behavioral test expectations: tests read the four skills (and their Codex
  copies) and assert that (a) each contains an active insights trigger, (b)
  plan-review / implementer / implementation-review contain active recall
  guidance with the exact command surface, (c) the failure-lesson note quotes the
  exact `maid learn --include-status` form, (d) only registered options appear
  (negative coverage), (e) the advisory framing is preserved, and (f) the
  generated Claude and Codex package copies equal their sources after an isolated
  sync.

  Out of scope for this child: maid-auditor (077-01), the recall ranking change
  (077-03), and any CLI behavior change.
temptations:
  - risk: "Do not attach `--include-status` to `maid recall` or `maid insights`, or invent insights filter flags."
    instead: "Keep `--include-status` on `maid learn`; assert only registered options per command with negative tests."
  - risk: "Do not convert advisory guidance into a required gate when activating the triggers."
    instead: "Preserve the advisory sentence in each skill and pin it with a test; insights / recall / failure lessons inform but never gate."
  - risk: "Do not edit one copy and leave the other three (Codex source, generated Claude, generated Codex) stale, or duplicate the canonical recall command line."
    instead: "Edit all four copies per skill, regenerate via the sync script, and assert isolated-workspace parity plus single-canonical-command-line counts."
  - risk: "Do not silently broaden the default learning set to all Outcome statuses."
    instead: "Frame `maid learn --include-status` as an intentional opt-in for chasing failure lessons; the completed-only default is unchanged."
