# archive-kind: consumed-draft-epic
schema: "2"
goal: "Archive consumed manifest Outcome learning epic"
type: feature
created: "2026-05-30"
metadata:
  status: archived
  tags:
    - maid-workflow
    - manifest-schema
    - outcome-records
    - learning
    - recall
    - insights
    - archive
  priority: low
description: |
  This split-before-promote epic has been consumed. Its implementation-sized
  child contracts were promoted as:

  - `047-01-add-manifest-outcome-schema`
  - `047-02-add-outcome-workflow-docs-and-review-guidance`
  - `047-03-add-maid-learn-outcome-index`
  - `047-04-add-maid-recall-outcome-search`
  - `047-05-add-maid-insights-outcome-aggregation`
  - `047-06-add-outcome-aware-agent-skill-guidance`

  The promoted children added optional strict Outcome records, documented the
  post-review Outcome workflow, implemented deterministic `maid learn`,
  `maid recall`, and `maid insights` commands, and updated Claude and Codex
  skill guidance to consume Outcome records without making MAID runner depend
  on an AI agent.

  The file remains in `manifests/drafts/` only as a historical pointer. Do not
  promote or implement this archived epic. Future Outcome workflow enforcement
  should start from a fresh scoped manifest after the schema, commands, docs,
  and skill guidance added by the 047 children.
files:
  edit:
    - path: manifests/drafts/047-00-maid-manifest-outcome-learning.epic.yaml
      artifacts:
        - kind: attribute
          name: _archived_manifest_outcome_learning_epic
          of: manifest
          type: draft epic
          description: "Historical pointer for promoted child manifests 047-01 through 047-06."
  read:
    - manifests/047-01-add-manifest-outcome-schema.manifest.yaml
    - manifests/047-02-add-outcome-workflow-docs-and-review-guidance.manifest.yaml
    - manifests/047-03-add-maid-learn-outcome-index.manifest.yaml
    - manifests/047-04-add-maid-recall-outcome-search.manifest.yaml
    - manifests/047-05-add-maid-insights-outcome-aggregation.manifest.yaml
    - manifests/047-06-add-outcome-aware-agent-skill-guidance.manifest.yaml
validate:
  - uv run maid validate manifests/drafts/047-00-maid-manifest-outcome-learning.epic.yaml --mode schema --quiet
