    - manifests/drafts/070-00-structured-retry-packets.epic.yaml
    - manifests/drafts/066-00-outcome-recall-planning-integration.epic.yaml
    - manifests/drafts/071-01-add-incident-record-storage-and-capture.manifest.yaml
    - manifests/drafts/071-02-add-dpo-export.manifest.yaml
    - manifests/drafts/071-03-add-temptation-suggestions.manifest.yaml
    - manifests/047-02-add-outcome-workflow-docs-and-review-guidance.manifest.yaml
    - scripts/sync_claude_files.py
    - tests/test_incident_skill_guidance.py
