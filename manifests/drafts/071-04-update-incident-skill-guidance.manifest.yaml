          description: "Rewritten guidance calling maid incident capture/update/list/export/suggest-temptations, documenting the post-gate capture workflow, the closed tag vocabulary, and the 066 recall cross-link."
    - path: maid_runner/claude/skills/maid-incident-logger/SKILL.md
      artifacts:
        - kind: attribute
          name: _distributed_incident_logger_cli_workflow_guidance
          of: skill
          type: markdown section
          description: "Generated package copy of the rewritten incident-logger guidance."
  read:
