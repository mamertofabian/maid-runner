          name: _codex_onboard_learning_digest_refresh_guidance
          of: user_skill_payload
          type: markdown section
          description: "Codex user-level onboard skill mirrors the learning-digestion refresh guidance."
    - path: maid_runner/docs/draft-manifest-workflow.md
      artifacts:
