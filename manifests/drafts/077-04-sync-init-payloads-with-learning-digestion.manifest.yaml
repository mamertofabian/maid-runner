          name: _packaged_draft_workflow_learning_digest_step
          of: package_resource
          type: markdown document
          description: "Packaged copy of the draft workflow learning-digestion guidance installed by `maid init`."
    - path: maid_runner/docs/manifest-outcome-records.md
      artifacts:
        - kind: attribute
          name: _packaged_outcome_learning_digest_guidance
          of: package_resource
          type: markdown document
          description: "Packaged copy of the Outcome learning-digestion guidance installed by `maid init`."
    - path: maid_runner/manifests/drafts/README.md
      artifacts:
        - kind: attribute
          name: _packaged_drafts_readme_learning_digest_guidance
          of: package_resource
          type: markdown document
          description: "Packaged copy of the drafts README learning-digestion guidance installed by `maid init`."
    - path: maid_runner/user_skills/claude/maid-onboard/SKILL.md
      artifacts:
        - kind: attribute
          name: _packaged_claude_onboard_learning_digest_refresh_guidance
          of: user_skill_payload
          type: markdown section
          description: "Packaged Claude maid-onboard copy matches the source learning-digestion refresh guidance."
