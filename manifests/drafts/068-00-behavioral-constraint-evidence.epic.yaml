  README/spec/troubleshooting documentation, and high-risk review guidance for
  Claude and Codex implementation-review skill sources.

  The file remains in `manifests/drafts/` only as a historical pointer. Do not
  promote or implement this archived epic. Future artifact-coverage, knockout,
  full mutation-testing, TypeScript/Svelte runtime evidence, or default-on
  enforcement work should start from a fresh scoped manifest after the
  contracts, CLI behavior, tests, documentation, and skill guidance added by
  the 068 children.
