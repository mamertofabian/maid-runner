description: |
  This split-before-promote epic has been consumed. Its implementation-sized
  child contracts were promoted as:

  - `068-01-add-artifact-execution-coverage-gate`
  - `068-02-add-artifact-knockout-harness`
  - `068-03-wire-knockout-into-verify`
  - `068-04-document-constraint-evidence-gates`

  The promoted children added the opt-in Python-only artifact execution
  coverage gate for `maid validate --artifact-coverage` and
  `maid verify --artifact-coverage`, the Python knockout rewrite/run/restore
  engine, `maid verify --knockout` with `--knockout-limit` and
