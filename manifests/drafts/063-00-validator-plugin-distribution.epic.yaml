# archive-kind: consumed-draft-epic
schema: "2"
goal: "Archive consumed validator plugin distribution epic"
type: feature
created: "2026-06-10"
metadata:
  status: archived
  tags:
    - validators
    - plugin-architecture
    - language-support
    - ecosystem
    - archive
  priority: low
description: |
  This split-before-promote epic has been consumed. Its implementation-sized
  child contracts were promoted as:

  - `063-01-add-entry-point-validator-discovery`
  - `063-02-add-maid-validators-cli-listing`
  - `063-03-publish-validator-conformance-kit`
  - `063-04-document-validator-plugin-authoring`

  The promoted children added deterministic `maid_runner.validators`
  entry-point discovery, built-in-wins precedence with E903 conflict
  warnings, isolated E902 plugin load-failure warnings, the
  `MAID_DISABLE_VALIDATOR_PLUGINS=1` kill switch, the `maid validators`
  audit command, a public pytest-based validator conformance kit, and the
  validator plugin authoring guide that routes new language support through
  external plugins instead of in-tree validators.

  The file remains in `manifests/drafts/` only as a historical pointer. Do not
  promote or implement this archived epic. Future validator plugin, language
  support, reference-plugin, or conformance-kit work should start from a fresh
  scoped manifest after the contracts, CLI behavior, diagnostics, tests, and
  documentation added by the 063 children.
temptations:
  - risk: "Do not start writing new in-tree language validators from this archived epic."
    instead: "Use the external validator plugin path documented by 063-04 unless a fresh approved manifest changes the support boundary."
  - risk: "Do not let plugins override built-in validators for extensions the built-ins already claim."
    instead: "Preserve the built-in-wins precedence and E903 warning behavior shipped by 063-01."
  - risk: "Do not swallow plugin import or registration errors."
    instead: "Preserve isolated E902 plugin load-failure diagnostics while keeping built-ins functional."
  - risk: "Do not expose the full internal validator package as public plugin API."
    instead: "Keep the documented public contract narrow: BaseValidator, CollectionResult, registration semantics, discovery rules, and the conformance kit."
  - risk: "Do not soften the conformance kit into optional marketing guidance."
    instead: "Treat the adversarial conformance suite shipped by 063-03 and documented by 063-04 as the evidence bar for plugin collectors."
files:
  edit:
    - path: manifests/drafts/063-00-validator-plugin-distribution.epic.yaml
      artifacts:
        - kind: attribute
          name: _archived_validator_plugin_distribution_epic
          of: manifest
          type: draft epic
          description: "Historical pointer for promoted child manifests 063-01 through 063-04."
  read:
    - manifests/063-01-add-entry-point-validator-discovery.manifest.yaml
    - manifests/063-02-add-maid-validators-cli-listing.manifest.yaml
    - manifests/063-03-publish-validator-conformance-kit.manifest.yaml
    - manifests/063-04-document-validator-plugin-authoring.manifest.yaml
validate:
  - uv run maid validate manifests/drafts/063-00-validator-plugin-distribution.epic.yaml --mode schema --quiet
