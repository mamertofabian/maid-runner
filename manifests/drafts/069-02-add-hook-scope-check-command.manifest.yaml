# draft-kind: implementation
schema: "2"
goal: "Add the deterministic `maid hook scope-check` command that agent pre-tool-use hooks call"
type: feature
created: "2026-06-10T09:02:00Z"
metadata:
  status: draft
  epic: 069-00-edit-time-scope-enforcement-hooks
  tags:
    - anti-gaming
    - scope-enforcement
    - hooks
  priority: medium
description: |
  Implement `maid hook scope-check` through a small pure decision module
  `maid_runner/core/scope_check.py` plus a new
  `maid_runner/cli/commands/hook.py`, registered in
  `maid_runner/cli/commands/_main.py`, reusing manifest loading from
  `maid_runner/core/manifest.py` and active-task resolution from
  `maid_runner/core/active_task.py` (created by sibling child 069-01,
  which must land first). This command answers one question fast: is a
  given file path inside the active task's declared manifest scope?

  Pinned decisions (from epic 069-00; do not redesign):

  1. Command surface: `maid hook scope-check --path <file-path>`. With
     `--stdin`, the command instead reads a JSON object from stdin with a
     `path` field (shape `{"path": ...}`), to match agent hook event
     payloads.
  2. Active-task resolution order is exactly: the `MAID_ACTIVE_MANIFEST`
     environment variable if set; otherwise the single-line file
     `.maid/active-manifest` containing a repo-relative manifest path;
     otherwise no active task. Resolution is delegated to
     `resolve_active_manifest` in `maid_runner/core/active_task.py`.
  3. Decision logic: if no active task is set, the decision is `allow`
     with reason `no-active-task` under the default policy. If an active
     task exists, load that manifest and decide `allow` when the path
     matches `files.create`, `files.edit`, or `files.delete` entries, the
     manifest's own path, its declared test files, or paths under
     `manifests/drafts/`; decide `deny` otherwise with a reason naming
     the active manifest and the closest declared scope entries.
  4. Output is a single JSON object on stdout:
     `{"decision": "allow"|"deny", "reason": ..., "active_manifest": ...}`.
     Exit code 0 for allow, 2 for deny, 1 for internal errors. The
     default policy treats internal errors as allow so a broken hook
     never bricks an editor.
  5. A `--strict` flag flips both the no-active-task and internal-error
     outcomes to deny, for locked-down autonomous loops.
  6. Performance budget: the hook path must answer in well under one
     second. Load only the active manifest directly with `load_manifest`;
     do NOT build the full manifest chain for a single-manifest scope
     answer. When the 064 daemon epic lands a scope-check method, the
     hook command may route through the daemon with fail-open fallback;
     until then, direct execution is the contract. Do not block this
     child on 064.
  7. The hook is advisory infrastructure, not a validation gate. It never
     replaces `maid verify` changed-scope checks, which remain the
     authoritative handoff evidence. No new error codes are added to
     `ErrorCode` for hook decisions.

  Planning note: the epic does not pin how "its declared test files" are
  derived. The most conservative reading: treat as allowed the manifest's
  `files.read` entries that are test files plus test file paths that
  appear as arguments of the manifest's `validate:` commands, matching
  how `maid_runner/core/manifest.py` already recognizes test paths. Do
  not expand this into general read-scope allowance: plain non-test
  `files.read` dependencies are NOT writable scope and must be denied.
  Because the existing validate-command test-path extraction is private
  inside `maid_runner/core/manifest.py`, this child exposes a narrow
  public helper in `maid_runner/core/scope_check.py` rather than binding
  the hook command to private manifest helpers.

  Sequencing note: adding a new top-level CLI command trips the existing
  command-documentation parity test in `tests/test_agent_payload_distribution.py`
  unless README or ROADMAP mentions the registered command. This child includes
  a minimal README CLI entry for `maid hook`; the fuller workflow guidance
  remains in 069-04.

  Behavioral tests must cover: allow for paths declared in
  `files.create`, `files.edit`, and `files.delete`; allow for the active
  manifest's own path and for paths under `manifests/drafts/`; allow for
  the manifest's declared test files; deny for an undeclared source path
  with a reason that names the active manifest and the closest declared
  scope entries; `--stdin` JSON parsing of `{"path": ...}`; no-active-task
  default allow with reason `no-active-task`; `--strict` flipping the
  no-active-task outcome to deny; internal errors (for example an active
  manifest path that fails to load) exiting 1 and allowing by default
  versus denying under `--strict`; and the stdout payload always being a
  single JSON object with exactly the keys decision, reason, and
  active_manifest.

  Out of scope for this child: the `maid task start|stop|status` commands
  and active-task file writing (069-01); Claude/Cursor/Codex init payload
  hook wiring (069-03); README, docs, and skill guidance for the
  edit-time scope workflow (069-04).
temptations:
  - risk: "Do not let a broken hook block all editing by default."
    instead: "Default policy fails open on internal errors and missing active task; reserve deny-on-error for the explicit --strict flag."
  - risk: "Do not build full chain merging inside the hot hook path."
    instead: "Load only the active manifest for the scope answer and keep the sub-second budget; daemon routing is a later optional acceleration."
  - risk: "Do not treat hook decisions as validation evidence."
    instead: "Keep maid verify changed-scope checks authoritative; the hook is fast advisory enforcement and adds no ErrorCode entries."
  - risk: "Do not widen allow rules to all files.read dependencies."
    instead: "Allow only declared create/edit/delete paths, the manifest's own path, its declared test files, and manifests/drafts/ paths; deny everything else with a named reason."
  - risk: "Do not couple the hook command to private manifest parser helpers."
    instead: "Put the fast single-manifest scope calculation, including declared test path extraction, behind a small public core helper tested through the CLI behavior."
files:
  create:
    - path: maid_runner/core/scope_check.py
      artifacts:
        - kind: class
          name: ScopeCheckDecision
          description: "JSON-serializable allow/deny decision for one candidate path under the active manifest scope rules."
        - kind: attribute
          name: decision
          of: ScopeCheckDecision
          type: Literal['allow', 'deny']
          description: "Whether the hook should allow or deny the candidate path."
        - kind: attribute
          name: reason
          of: ScopeCheckDecision
          type: str
          description: "Machine-readable or concise human-readable reason for the decision."
        - kind: attribute
          name: active_manifest
          of: ScopeCheckDecision
          type: str | None
          description: "Resolved active manifest path when one participated in the decision."
        - kind: function
          name: declared_scope_paths
          args:
            - name: manifest
              type: Manifest
            - name: project_root
              type: Union[str, Path]
              default: "'.'"
          returns: set[str]
          description: "Return the single-manifest allowed path set: create/edit/delete paths, manifest path, declared test files from files.read and validate commands, and draft-manifest paths."
        - kind: function
          name: scope_check_path
          args:
            - name: candidate_path
              type: str
            - name: active_manifest
              type: str | None
            - name: project_root
              type: Union[str, Path]
              default: "'.'"
            - name: strict
              type: bool
              default: "False"
          returns: ScopeCheckDecision
          description: "Load only the active manifest when present and decide whether the candidate path is allowed under the pinned hook scope rules."
    - path: maid_runner/cli/commands/hook.py
      artifacts:
        - kind: function
          name: cmd_hook
          args:
            - name: args
              type: argparse.Namespace
          returns: int
          description: "Handle maid hook scope-check: resolve the active task, decide allow/deny per the pinned scope rules, print one JSON decision object on stdout, and return 0 (allow), 2 (deny), or 1 (internal error, allow by default, deny under --strict)."
  edit:
    - path: maid_runner/cli/commands/_main.py
      artifacts:
        - kind: function
          name: build_parser
          args: []
          returns: argparse.ArgumentParser
          description: "Parser exposes a hook command group with a scope-check subcommand accepting --path, --stdin, and --strict."
        - kind: function
          name: main
          args:
            - name: argv
              type: list[str] | None
              default: None
          returns: int
          description: "The CLI dispatches hook subcommands to maid_runner.cli.commands.hook.cmd_hook."
    - path: README.md
      artifacts:
        - kind: attribute
          name: _maid_hook_cli_reference
          of: documentation
          type: markdown section
          description: "Minimal CLI reference entry for the registered `maid hook` command group so command-doc parity remains green before the fuller 069-04 workflow docs land."
  read:
    - maid_runner/core/manifest.py
    - maid_runner/core/active_task.py
    - maid_runner/cli/commands/files.py
    - tests/cli/test_hook_cmd.py
    - tests/test_agent_payload_distribution.py
validate:
  - uv run python -m pytest -q tests/cli/test_hook_cmd.py tests/test_agent_payload_distribution.py
  - uv run maid validate manifests/069-02-add-hook-scope-check-command.manifest.yaml --mode behavioral --quiet
  - uv run maid validate manifests/069-02-add-hook-scope-check-command.manifest.yaml --mode schema --quiet
