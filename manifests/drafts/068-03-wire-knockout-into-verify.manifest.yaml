# draft-kind: implementation
schema: "2"
goal: "Wire the knockout engine into `maid verify` via `--knockout`, `--knockout-limit`, and `--knockout-allow-dirty`"
type: feature
created: "2026-06-10T08:03:00Z"
metadata:
  status: draft
  epic: 068-00-behavioral-constraint-evidence
  tags:
    - validation-trust
    - hardening
    - anti-gaming
    - mutation
  priority: high
description: |
  Add `--knockout`, `--knockout-limit`, and `--knockout-allow-dirty` to
  `maid verify`, emitting E711/E712 with text and JSON parity. This child
  depends on sibling 068-02-add-artifact-knockout-harness (the engine in
  `maid_runner/core/knockout.py` and the E711/E712 error codes), which
  must land first. This child is wiring only: no changes to the engine's
  rewrite/run/restore semantics.

  Pinned decisions (from epic 068-00; do not redesign):

  1. Scope is Python-only in this epic. TypeScript and Svelte knockout
     are explicitly out of scope.
  2. The knockout gate is opt-in: `maid verify --knockout`. Default
     enforcement belongs to the 062 strict-by-default major-release
     decision after usage evidence; do not flip defaults here.
  3. Per declared public function or method artifact in the manifest's
     Python files, the engine: verifies the target file has no
     uncommitted modifications via the worktree helpers in
     `maid_runner/core/worktree.py` (refuse with a structured error
     otherwise, overridable by `--knockout-allow-dirty`); rewrites the
     artifact body in place to `raise NotImplementedError("maid-knockout")`
     using AST line spans; runs the manifest's `validate:` commands;
     restores the original file content from an in-memory copy in a
     `finally` block and verifies the restored content hash equals the
     original before reporting.
  4. If every validate command still exits 0 with the artifact knocked
     out, the run fails with E711 ARTIFACT_KNOCKOUT_NOT_DETECTED naming
     the artifact and file. Harness errors (restore failure, parse
     failure, command spawn failure) fail closed with E712
     KNOCKOUT_HARNESS_FAILURE; a restore failure must also print the
     recovery instruction (git checkout of the named file).
  5. Cost control: `--knockout` runs artifacts sequentially and
     deterministically in manifest declaration order; `--knockout-limit N`
     bounds the number of artifacts tested (default unlimited); results
     report per-artifact pass/fail with durations in both text and JSON
     output. No parallelism in this epic.
  6. Hardening-lane discipline: first reproduce the gaming vector in a
     throwaway project (a hardcoded-return stub that passes its trivial
     tests normally), then land that reproduction as an adversarial
     behavioral test proving `maid verify --knockout` fails it with E711.

  Adversarial behavioral tests must reproduce: a hardcoded-return stub
  passing its tests normally but surviving knockout fails E711 (named
  artifact and file appear in the error); an honest implementation whose
  tests genuinely constrain it passes; and a harness spawn failure fails
  E712 while the target file content is restored. Also cover:
  `--knockout-limit N` bounds the artifact count deterministically in
  manifest declaration order; dirty-worktree refusal without
  `--knockout-allow-dirty` and acceptance with it; per-artifact pass/fail
  with durations present in both text and `--json` output with the same
  error codes in both modes.

  Out of scope for this child: the engine internals (068-02), the
  execution-coverage gate and E710 (068-01), documentation (068-04),
  TypeScript/Svelte support, parallel execution, and full mutation
  testing (explicitly out of scope for the whole epic).
temptations:
  - risk: "Do not make the knockout gate default-on in this epic."
    instead: "Ship the opt-in --knockout flag; default enforcement belongs to epic 062 after usage evidence."
  - risk: "Do not modify or fork the engine's rewrite/run/restore semantics while wiring the CLI."
    instead: "Call run_knockout from maid_runner/core/knockout.py as-is; this child is flag parsing, dispatch, and output formatting only."
  - risk: "Do not let text and JSON verify output diverge on E711/E712 or per-artifact results."
    instead: "Emit the same structured errors and per-artifact durations in both output modes and assert parity in the behavioral tests."
  - risk: "Do not wire the CLI before reproducing the gaming vector."
    instead: "First reproduce a hardcoded-return stub surviving its tests in a throwaway project, then land that reproduction as an adversarial test against maid verify --knockout."
files:
  edit:
    - path: maid_runner/cli/commands/verify.py
      artifacts:
        - kind: function
          name: cmd_verify
          args:
            - name: args
              type: argparse.Namespace
          returns: int
          description: "Verify honors --knockout, --knockout-limit, and --knockout-allow-dirty, reporting per-artifact pass/fail with durations and E711/E712 in text and JSON."
    - path: maid_runner/cli/commands/_main.py
      artifacts:
        - kind: function
          name: build_parser
          args: []
          returns: argparse.ArgumentParser
          description: "Verify parser exposes --knockout, --knockout-limit N (default unlimited), and --knockout-allow-dirty."
        - kind: function
          name: main
          args:
            - name: argv
              type: list[str] | None
              default: None
          returns: int
          description: "Verify dispatch passes the knockout flags through to cmd_verify."
  read:
    - maid_runner/core/knockout.py
    - maid_runner/core/result.py
    - maid_runner/cli/commands/_format.py
    - tests/cli/test_verify_knockout_cmd.py
validate:
  - uv run python -m pytest -q tests/cli/test_verify_knockout_cmd.py
  - uv run maid validate manifests/068-03-wire-knockout-into-verify.manifest.yaml --mode behavioral --quiet
  - uv run maid validate manifests/068-03-wire-knockout-into-verify.manifest.yaml --mode schema --quiet
