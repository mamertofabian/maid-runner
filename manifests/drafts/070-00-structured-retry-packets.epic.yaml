# archive-kind: consumed-draft-epic
schema: "2"
goal: "Archive consumed structured retry packets epic"
type: feature
created: "2026-06-10"
metadata:
  status: archived
  tags:
    - agent-loops
    - diagnostics
    - retry-protocol
    - developer-experience
    - anti-gaming
    - archive
  priority: low
description: |
  This split-before-promote epic has been consumed. Its implementation-sized
  child contracts were promoted as:

  - `070-01-add-error-code-registry-with-repair-recipes`
  - `070-02-emit-failure-packets-from-validate-and-verify`
  - `070-03-generalize-bounded-retry-loop`
  - `070-04-update-skill-guidance-for-packets`

  The promoted children added the shared diagnostic rule registry with
  structured `next_action` repair recipes, deterministic failure-packet
  emission for `maid validate --packet` and `maid verify --packet`, shared
  packet-consuming retry-loop helpers under `tools/`, the documented bounded
  retry protocol, and packet-aware README, howto, Claude skill, and Codex skill
  guidance.

  The file remains in `manifests/drafts/` only as a historical pointer. Do not
  promote or implement this archived epic. Future failure-packet, diagnostic
  recipe, or agent-retry work should start from a fresh scoped manifest after
  the contracts, CLI behavior, documentation, and skill guidance added by the
  070 children.
temptations:
  - risk: "Do not create recipes that tell agents to weaken tests or manifests to make errors disappear."
    instead: "Use the shipped diagnostics registry and preserve the repair-recipe safety tests from 070-01."
  - risk: "Do not replace or fork the existing --json output contract."
    instead: "Keep failure packets as the additive sidecar view shipped by 070-02."
  - risk: "Do not build a general agent orchestrator inside maid-runner."
    instead: "Keep retry behavior to the documented protocol and reference tooling under tools/ from 070-03."
  - risk: "Do not let packets grow unbounded with file contents or full logs."
    instead: "Preserve the prompt-sized manifest excerpts and 50-line output-tail cap shipped by 070-02."
  - risk: "Do not leave stale packets behind after a passing run."
    instead: "Preserve the clear-on-success behavior shipped by 070-02 so retry loops cannot act on outdated failure state."
files:
  edit:
    - path: manifests/drafts/070-00-structured-retry-packets.epic.yaml
      artifacts:
        - kind: attribute
          name: _archived_structured_retry_packets_epic
          of: manifest
          type: draft epic
          description: "Historical pointer for promoted child manifests 070-01 through 070-04."
  read:
    - manifests/070-01-add-error-code-registry-with-repair-recipes.manifest.yaml
    - manifests/070-02-emit-failure-packets-from-validate-and-verify.manifest.yaml
    - manifests/070-03-generalize-bounded-retry-loop.manifest.yaml
    - manifests/070-04-update-skill-guidance-for-packets.manifest.yaml
validate:
  - uv run maid validate manifests/drafts/070-00-structured-retry-packets.epic.yaml --mode schema --quiet
