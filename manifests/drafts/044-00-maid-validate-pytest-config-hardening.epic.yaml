    instead: "Limit this wave to runner configuration that directly adds known selector or non-executing flags."
  - risk: "Do not trust a directory target when pyproject pytest config can deselect the declared test file."
    instead: "Combine target coverage with effective pytest option checks before running done-gate tests."
  - risk: "Do not make documentation-only guidance the fix for an automation bypass."
    instead: "Add a repeatable validation/test-runner gate with structured failure output."
  - risk: "Do not weaken 032 command-integrity checks to handle this exception."
    instead: "Layer config inspection or runner evidence on top of the existing command-target checks."
files:
