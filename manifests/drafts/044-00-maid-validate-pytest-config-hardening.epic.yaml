description: |
  This split-before-promote epic has been consumed. Its implementation-sized
  child contract was promoted as
  `manifests/044-01-reject-pytest-config-selector-addopts.manifest.yaml`.

  The promoted child closes the reproduced `pyproject.toml` pytest `addopts`
