  create:
    - path: manifests/drafts/064-00-daemon-first-agent-validation.epic.yaml
      artifacts:
        - kind: attribute
          name: _daemon_first_validation_roadmap
          of: manifest
          type: draft epic
          description: "Split-before-promote roadmap for daemon-backed CLI validation routing, daemon-resident caching, protocol extension, Windows transport, and benchmark-gated default flip."
  read:
    - maid_runner/daemon/server.py
    - maid_runner/daemon/protocol.py
    - maid_runner/daemon/handlers.py
    - maid_runner/cli/commands/serve.py
    - maid_runner/cli/commands/validate.py
    - maid_runner/core/benchmark.py
    - docs/maid-serve.md
    - docs/plans/maid-runner-performance-backlog.md
validate:
  - uv run maid validate manifests/drafts/064-00-daemon-first-agent-validation.epic.yaml --mode schema --quiet
