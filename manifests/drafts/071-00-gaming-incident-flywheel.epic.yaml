    - maid_runner/cli/commands/_main.py
    - maid_runner/schemas/manifest.v2.schema.json
    - .claude/skills/maid-incident-logger/SKILL.md
    - manifests/drafts/070-00-structured-retry-packets.epic.yaml
    - manifests/drafts/066-00-outcome-recall-planning-integration.epic.yaml
validate:
  - uv run maid validate manifests/drafts/071-00-gaming-incident-flywheel.epic.yaml --mode schema --quiet
