# archive-kind: consumed-draft-epic
schema: "2"
goal: "Archive consumed gaming-incident flywheel epic"
type: feature
created: "2026-06-10"
metadata:
  status: archived
  tags:
    - anti-gaming
    - incidents
    - learning
    - temptations
    - dpo-data
    - archive
  priority: low
description: |
  This split-before-promote epic has been consumed. Its implementation-sized
  child contracts were promoted as:

  - `071-01-add-incident-record-storage-and-capture`
  - `071-02-add-dpo-export`
  - `071-03-add-temptation-suggestions`
  - `071-04-update-incident-skill-guidance`

  The promoted children added deterministic gaming-incident YAML storage under
  `.maid/incidents/`, the `maid incident capture|update|list` command surface,
  DPO JSONL export for complete chosen/rejected pairs, advisory
  `suggest-temptations` rendering from stored incident evidence, and
  command-backed maid-incident-logger skill guidance.

  The file remains in `manifests/drafts/` only as a historical pointer. Do not
  promote or implement this archived epic. Future incident capture, DPO export,
  temptation-suggestion, or incident skill guidance work should start from a
  fresh scoped manifest after the contracts, CLI behavior, documentation, and
  skill guidance added by the 071 children.
temptations:
  - risk: "Do not add AI classification of whether an attempt was gaming."
    instead: "Use the caller-asserted incident capture contract shipped by 071-01; MAID stores and retrieves explicit evidence deterministically."
  - risk: "Do not invent an open-ended tag taxonomy."
    instead: "Preserve the closed vocabulary enforced by 071-01 and evolve it with a new manifest when it changes."
  - risk: "Do not silently export incomplete or malformed incident records."
    instead: "Preserve the 071-02 export behavior: skip valid records without chosen_diff with counts, and fail loudly on malformed records."
  - risk: "Do not turn temptation suggestions into automatic manifest edits."
    instead: "Keep the 071-03 behavior advisory and deterministic; humans or planning agents decide what enters a manifest."
  - risk: "Do not return the incident skill to hand-authored record files."
    instead: "Keep the maid-incident-logger skill as a consumer of the deterministic `maid incident` commands shipped by 071-01 through 071-03."
files:
  edit:
    - path: manifests/drafts/071-00-gaming-incident-flywheel.epic.yaml
      artifacts:
        - kind: attribute
          name: _archived_gaming_incident_flywheel_epic
          of: manifest
          type: draft epic
          description: "Historical pointer for promoted child manifests 071-01 through 071-04."
  read:
    - manifests/071-01-add-incident-record-storage-and-capture.manifest.yaml
    - manifests/071-02-add-dpo-export.manifest.yaml
    - manifests/071-03-add-temptation-suggestions.manifest.yaml
    - manifests/071-04-update-incident-skill-guidance.manifest.yaml
validate:
  - uv run maid validate manifests/drafts/071-00-gaming-incident-flywheel.epic.yaml --mode schema --quiet
