# draft-kind: implementation
schema: "2"
goal: "Extract maid test stream orchestration helpers"
type: refactor
created: "2026-05-29"
metadata:
  status: planning
  engine: safe-refactor
  tags:
    - test-runner
    - safe-refactor
    - extract-method
    - command-execution
  priority: medium
description: |
  Apply Fowler's Extract Method to the mixed-concern
  `maid_runner.core.test_runner._run_tests_cached` function.

  `_run_tests_cached()` currently spans
  `maid_runner/core/test_runner.py:188-356` and handles chain loading,
  integrity errors, command stream collection, batching, acceptance execution,
  implementation execution, cached `maid validate` execution, fail-fast
  accounting, and final `BatchTestResult` assembly. Earlier waves extracted
  command normalization and batching policy; this slice extracts the remaining
  stream orchestration helpers while preserving public `run_tests(...)` and
  `run_manifest_tests(...)` behavior.

  Feathers seam: command execution already flows through `run_command` and
  `_run_cached_maid_validate_command`, so tests can characterize ordering and
  accounting through temporary manifests and monkeypatched execution.
temptations:
  - risk: "Do not change command ordering, stream labels, batch slugs, or fail-fast behavior."
    instead: "Add ordering and accounting characterization before extracting helpers."
  - risk: "Do not change batching eligibility or command normalization policy."
    instead: "Keep `_test_command_batching`, `_pytest_command_normalization`, and `_maid_validate_command_cache` semantics unchanged."
  - risk: "Do not hide chain diagnostics or command-integrity failures behind fallback execution."
    instead: "Return the same zero-result `BatchTestResult` shapes when diagnostics or integrity errors are present."
  - risk: "Do not combine this with `run_manifest_tests` restructuring."
    instead: "Keep single-manifest execution unchanged except for shared private helpers if the extraction naturally reuses them."
files:
  edit:
    - path: maid_runner/core/test_runner.py
      artifacts:
        - kind: function
          name: run_tests
          args:
            - name: manifest_dir
              type: "Union[str, Path]"
              default: "manifests/"
            - name: fail_fast
              type: bool
              default: "False"
            - name: project_root
              type: "Union[str, Path]"
              default: "."
            - name: batch
              type: "bool | None"
              default: "None"
          returns: BatchTestResult
          description: "Public multi-manifest test entry point with unchanged cache-scope behavior."
        - kind: function
          name: _run_tests_cached
          args:
            - name: manifest_dir
              type: "Union[str, Path]"
              default: "manifests/"
            - name: fail_fast
              type: bool
              default: "False"
            - name: project_root
              type: "Union[str, Path]"
              default: "."
            - name: batch
              type: "bool | None"
              default: "None"
          returns: BatchTestResult
          description: "Delegate stream collection, batched execution, sequential execution, and result accounting to focused private helpers."
        - kind: function
          name: _collect_test_command_streams
          args:
            - name: manifests
              type: "Iterable[Manifest]"
          returns: "tuple[list[tuple[tuple[str, ...], str]], list[tuple[tuple[str, ...], str]]]"
          description: "Return acceptance commands and implementation commands with manifest slugs in the same order as the current loop."
        - kind: function
          name: _run_acceptance_commands
          args:
            - name: commands
              type: "list[tuple[tuple[str, ...], str]]"
            - name: project_root
              type: Path
            - name: fail_fast
              type: bool
            - name: chain_errors
              type: list[ValidationError]
          returns: "tuple[list[TestRunResult], int, int, BatchTestResult | None]"
          description: "Run acceptance commands sequentially and return an early BatchTestResult only when fail-fast stops execution before implementation commands start."
        - kind: function
          name: _run_implementation_commands
          args:
            - name: commands
              type: "list[tuple[tuple[str, ...], str]]"
            - name: project_root
              type: Path
            - name: batch
              type: "bool | None"
            - name: fail_fast
              type: bool
            - name: chain_errors
              type: list[ValidationError]
            - name: previous_results
              type: "list[TestRunResult]"
            - name: previous_passed
              type: int
            - name: previous_failed
              type: int
          returns: "tuple[list[TestRunResult], int, int, BatchTestResult | None]"
          description: "Run batched and sequential implementation commands with unchanged cached maid validate behavior, carrying prior acceptance results and counts into any fail-fast BatchTestResult."
    - path: tests/core/test_test_runner.py
      artifacts:
        - kind: test_function
          name: test_run_tests_preserves_acceptance_before_batched_implementation_order
          source_scenario: "A manifest set has one acceptance command and multiple batch-compatible implementation commands."
          actions:
            - type: api_call
              subject:
                export: run_tests
          expected:
            behavior: "The acceptance result appears before the single batched implementation result, with acceptance_results and implementation_results preserving stream labels."
        - kind: test_function
          name: test_run_tests_fail_fast_after_acceptance_failure_preserves_counts
          source_scenario: "The first acceptance command fails while implementation commands are present."
          actions:
            - type: api_call
              subject:
                export: run_tests
          expected:
            behavior: "The BatchTestResult reports one failed acceptance result, zero implementation results, total one, and the original chain_errors list."
        - kind: test_function
          name: test_run_tests_fail_fast_after_implementation_failure_preserves_acceptance_counts
          source_scenario: "An acceptance command passes, then the first implementation command fails with fail_fast enabled."
          actions:
            - type: api_call
              subject:
                export: run_tests
          expected:
            behavior: "The early BatchTestResult includes both the prior acceptance result and the failed implementation result, reports total two, preserves stream labels, and does not run later implementation commands."
        - kind: test_function
          name: test_run_tests_cached_maid_validate_execution_preserved_after_extraction
          source_scenario: "Two manifests use equivalent `maid validate` implementation commands."
          actions:
            - type: api_call
              subject:
                export: run_tests
          expected:
            behavior: "The extracted implementation runner still routes commands through `_run_cached_maid_validate_command` and reports the same result counts as before."
  read:
    - docs/plans/maid-runner-cleanup-refactor-backlog.md
    - manifests/snapshot-core-test-runner.manifest.yaml
    - manifests/038-19-extract-test-command-batching.manifest.yaml
    - manifests/038-20-extract-maid-validate-command-cache.manifest.yaml
    - manifests/038-21-extract-test-command-execution.manifest.yaml
    - maid_runner/core/_test_command_batching.py
    - maid_runner/core/_maid_validate_command_cache.py
    - maid_runner/core/_test_command_execution.py
validate:
  - uv run python -m pytest -q tests/core/test_test_runner.py tests/core/validation/test_pnpm_vitest_batching.py
