# draft-kind: epic
# promotion: split-before-promote
schema: "2"
goal: "Plan an optional, advisory enrichment layer over the Outcome index (lesson-type theme normalization + recurring-lessons digest) using a HYBRID split: maid-runner owns only deterministic prompt/validate/render/apply, while a skill owns the LLM generation, so the runner never calls AI services"
type: feature
created: "2026-06-28T14:30:00Z"
metadata:
  status: planning
  tags:
    - outcome-records
    - insights
    - learning
    - llm-enrichment
    - local-first
    - maid-workflow
  priority: medium
description: |
  Split-before-promote epic. Inspection of the live `.maid/outcomes.json`
  (95 completed outcomes) showed two pools of value the deterministic surfaces
  cannot extract:

  1. Lesson prose is the richest field but is structurally discarded.
     `aggregate_outcome_insights` (`maid_runner/core/outcome_insights.py`) only
     counts by key and never synthesizes the 225 hand-written lesson summaries.
  2. The free-text `lesson_type` taxonomy is fragmented: 72 distinct types for
     225 lessons, 49 singletons, with the "validation" theme alone splintered
     across 8 near-synonym keys (43 lessons) reported as 8 separate buckets.

  ARCHITECTURE DECISION — hybrid, runner stays AI-free (revised after review):

  `docs/manifest-outcome-records.md` defines a deliberate command boundary: the
  learning commands "may rank, group, filter, and report explicit records, but
  they must not invent missing lessons, summarize private conversation state,
  call AI services, or hide stale index data." maid-runner is intentionally an
  AI-free deterministic validator/runner. Therefore the LLM generation does NOT
  live in a runner command. Instead:

  - maid-runner owns the DETERMINISTIC parts only: build a bounded enrichment
    prompt/corpus from the index, validate a candidate digest against the index
    (schema + anti-fabrication + staleness), render advisory markdown from a
    validated digest, and apply a validated theme map in
    `maid insights --theme-map`. No runner command calls a model, opens a
    network socket to an LLM, or reads provider API keys.
  - A SKILL (`maid-outcome-enrich`) owns the NON-DETERMINISTIC generation: it
    runs `maid enrich prompt`, sends the bounded corpus to whatever model the
    agent has (local llama-server first, cloud as opt-in), writes a candidate
    `.maid/outcomes-digest.json`, then runs `maid enrich validate` so the runner
    rejects stale or fabricated output. Secrets, network behavior, model drift,
    provider quirks, prompt-injection exposure, and cloud-privacy disclosure all
    live in the skill, outside the core package.

  This keeps the determinism payoff (theme-map re-aggregation in insights,
  schema/validation/staleness, traceable markdown) inside the trusted runner
  while keeping AI generation where agents already hold credentials and context.

  On determinism scope: full semantic clustering of lessons is LLM-shaped, but
  the claim is bounded — `apply_theme_map` and digest validation are fully
  deterministic; only the proposed theme map and recurring-lesson prose are
  generated, and the runner verifies that generated output is grounded in real,
  co-occurring index lessons before it is usable.

  Anti-fabrication is deep, not shallow: validation proves every cited
  (manifest, lesson_type) pair actually co-occurs in the index, rejects a digest
  entry whose `theme` is not a declared theme, rejects a lesson_type mapped into
  more than one theme, and defines explicit pass-through behavior for unmapped
  lesson_types. Fail loud: validation failures are non-zero and block use; no
  silent or partial digest.

  This epic decomposes into four implementation-sized child drafts:

  - `081-01-add-outcome-enrichment-core`: deterministic enrichment policy
    (`maid_runner/core/outcome_enrichment.py`) — prompt/corpus building,
    `validate_enrichment_digest` deep checks, `apply_theme_map`, markdown
    rendering, digest serialization/staleness, and a small public record-set
    seam. No LLM client, no network, no orchestration-with-a-model.
  - `081-02-add-maid-enrich-command`: the deterministic `maid enrich`
    CLI (`prompt`, `validate`, `render` subcommands; NO AI call), `_main.py`
    registration (edit), `.gitignore`.
  - `081-03-wire-theme-map-into-insights`: opt-in `maid insights --theme-map`
    re-aggregation + advisory docs.
  - `081-04-add-outcome-enrich-skill`: the `maid-outcome-enrich` skill payload
    (Claude + Codex source and packaged copies) and its init distribution
    entry; this is the only place an LLM is invoked, and it carries the
    cloud-privacy disclosure.

  Promotion order is dependency-driven and must be `081-01` → `081-02` →
  `081-03` → `081-04`: 081-02 imports the policy from 081-01; 081-03 imports
  `apply_theme_map`/`digest_is_stale`/`read_enrichment_digest` from 081-01 and
  consumes the digest; 081-04 orchestrates the 081-02 commands. Do not promote a
  later child before its predecessor's contract is locked and implemented.
temptations:
  - risk: "Do not call an AI service, open an LLM network socket, or read provider API keys from any maid-runner command (violates the docs/manifest-outcome-records.md command boundary)."
    instead: "Keep the runner deterministic: maid enrich only emits a prompt/corpus, validates a candidate digest, and renders markdown. The LLM call lives in the 081-04 skill."
  - risk: "Do not make anti-fabrication a shallow existence check."
    instead: "Validate that every cited (manifest, lesson_type) co-occurs in the index, reject undeclared themes, reject lesson_types mapped into multiple themes, and define unmapped-lesson-type pass-through; pin each with a rejection test."
  - risk: "Do not let enrichment mutate the deterministic core (learn/recall/insights default behavior, OutcomeIndex schema, or the outcomes.json contract)."
    instead: "Keep enrichment additive in new modules plus one opt-in insights flag; default behavior stays byte-for-byte unchanged."
  - risk: "Do not emit generated narrative into the deterministic insights report (047-05 lesson)."
    instead: "Keep `--theme-map` a deterministic re-aggregation through the validated map; narrative prose lives only in the advisory .md the runner renders from a validated digest."
  - risk: "Do not add httpx, openai, or anthropic SDKs, or a semantic-search rewrite of recall, to the runner."
    instead: "The runner stays dependency-free and AI-free; any model access is the skill's responsibility using the agent's existing tooling."
