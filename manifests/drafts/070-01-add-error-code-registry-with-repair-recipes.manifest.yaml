# draft-kind: implementation
schema: "2"
goal: "Add the introspectable error-code registry with structured repair recipes per diagnostic code"
type: feature
created: "2026-06-10T10:01:00Z"
metadata:
  status: draft
  epic: 070-00-structured-retry-packets
  tags:
    - diagnostics
    - developer-experience
    - anti-gaming
  priority: high
description: |
  Build the introspectable error-code registry in a new
  `maid_runner/core/diagnostics_registry.py`: per-code metadata (code,
  default severity, short description, full description, docs link) plus
  an optional structured `next_action` repair recipe template. This is
  the registry the failure packets of sibling child 070-02 consume, and
  the same module the 065 SARIF epic builds its rules from.

  Registry reconciliation decision (checked at split time, per epic
  070-00): no `manifests/065-01-*.manifest.yaml` exists and
  `maid_runner/core/diagnostics_registry.py` does not exist in the
  codebase, so THIS child creates the registry module. The 065-01 draft
  (`065-01-add-error-code-rule-registry-export` in epic
  manifests/drafts/065-00-ci-native-sarif-reporting.epic.yaml) must be
  re-scoped at its own promotion time to extend and reuse this module
  instead of creating it. Per the 065 epic's pinned decision 1, the
  registry exposes a `DiagnosticRule` dataclass (code, default_severity,
  short_description, description, help_uri) plus `get_rule(code)` and
  `all_rules()`, and a unit test asserts every `ErrorCode` member in
  `maid_runner/core/result.py` has a registered rule.

  Pinned decisions (from epic 070-00; do not redesign):

  1. `next_action` is a structured repair recipe attached per diagnostic
     code: an object with `kind` (one of `edit-implementation`,
     `edit-tests`, `edit-manifest`, `run-command`, `revise-plan`,
     `escalate-human`), `target` (file or command), and `instruction`
     (imperative sentence template filled with the diagnostic's actual
     file/artifact/command values). Recipes live in the error-code
     registry beside code metadata.
  2. Initial recipe coverage is the gaming-relevant and high-frequency
     codes: E200, E201, E210, E230, E300, E301, E302, E303, E114, E115.
     Codes without a recipe emit `next_action: null`; never invent a
     generic recipe that could instruct contract weakening.
  3. Recipe safety rule: no `next_action` may instruct editing behavioral
     tests or the manifest as the FIRST remedy for an implementation
     failure. For codes where test or manifest edits are a legitimate fix
     (for example E201 missing test file at planning time), the recipe
     kind says so explicitly and names the plan-revision path
     (`maid plan revise`) when the 067 epic is available, so contract
     changes stay loud. Enforce the safety rule with a unit test over the
     recipe table: implementation-failure codes (E300, E301, E302, E303,
     E114, E115) must not have recipes of kind `edit-tests` or
     `edit-manifest`.

  Planning note: the E7xx family is excluded from initial recipe coverage
  because `ErrorCode` in maid_runner/core/result.py has no E7xx members
  at split time (epics 067 and 068 have not landed). Do not invent E7xx
  entries; a later child or epic extends coverage when those codes exist.

  Planning note: the `maid plan revise` command does not exist yet (067
  epic not landed). Recipe instruction text for legitimate test/manifest
  edit cases should direct the agent to revise the plan deliberately and
  name `maid plan revise` as the loud path once available, without
  making the registry depend on that command existing.

  Planning note: the epics do not pin the types of registry fields. The
  most conservative reading: `code`, `default_severity`,
  `short_description`, `description`, and `help_uri` are plain strings
  (severity values matching the existing Severity enum values "error",
  "warning", "info"; help_uri pointing into docs/troubleshooting.md
  anchors), and the recipe template is a frozen `RepairRecipe` dataclass
  whose `instruction` contains named placeholders (for example {file},
  {artifact}, {command}) rendered by `render_next_action`.

  Behavioral tests must cover: every `ErrorCode` member in
  maid_runner/core/result.py is registered (all_rules covers the full
  enum and get_rule returns a rule for each member); get_rule on an
  unknown code fails loudly; the ten pinned codes (E200, E201, E210,
  E230, E300, E301, E302, E303, E114, E115) each have a non-null recipe
  whose kind is one of the six pinned kinds; recipe templates render
  with sample diagnostic values (placeholders replaced by actual
  file/artifact/command values, no unfilled braces left); codes without
  recipes render next_action as null; and the safety-rule unit test over
  the recipe table proves no implementation-failure code has an
  edit-tests or edit-manifest first remedy.

  Out of scope for this child: the `--packet` flag, packet serialization,
  and stale-packet removal (070-02); refactoring the loop tools and the
  retry-protocol document (070-03); skill and README guidance updates
  (070-04); SARIF serialization (065 epic children).
temptations:
  - risk: "Do not create recipes that tell agents to weaken tests or manifests to make errors disappear."
    instead: "Enforce the recipe safety rule with a unit test over the recipe table; contract changes must route through the loud plan-revision path."
  - risk: "Do not invent generic recipes for codes outside the pinned coverage list."
    instead: "Emit next_action: null for uncovered codes; recipe coverage grows deliberately, code by code."
  - risk: "Do not fork or duplicate the diagnostic model."
    instead: "Register every ErrorCode member in one module that both failure packets (070-02) and SARIF rules (065) derive from."
files:
  create:
    - path: maid_runner/core/diagnostics_registry.py
      artifacts:
        - kind: class
          name: RepairRecipe
          description: "Structured next_action recipe template: kind, target, and an imperative instruction template with named placeholders."
        - kind: attribute
          name: kind
          of: RepairRecipe
          type: str
        - kind: attribute
          name: target
          of: RepairRecipe
          type: str
        - kind: attribute
          name: instruction
          of: RepairRecipe
          type: str
        - kind: class
          name: DiagnosticRule
          description: "Per-error-code registry entry: code, default severity, short description, full description, docs link, and optional repair recipe."
        - kind: attribute
          name: code
          of: DiagnosticRule
          type: str
        - kind: attribute
          name: default_severity
          of: DiagnosticRule
          type: str
        - kind: attribute
          name: short_description
          of: DiagnosticRule
          type: str
        - kind: attribute
          name: description
          of: DiagnosticRule
          type: str
        - kind: attribute
          name: help_uri
          of: DiagnosticRule
          type: str
        - kind: attribute
          name: next_action
          of: DiagnosticRule
          type: RepairRecipe | None
        - kind: function
          name: get_rule
          args:
            - name: code
              type: str
          returns: DiagnosticRule
          description: "Return the registered rule for an error code; fail loudly for unknown codes."
        - kind: function
          name: all_rules
          args: []
          returns: tuple[DiagnosticRule, ...]
          description: "Return all registered rules, deterministically ordered by code, covering every ErrorCode member."
        - kind: function
          name: render_next_action
          args:
            - name: code
              type: str
            - name: values
              type: dict[str, str]
          returns: dict | None
          description: "Render the recipe template for a code with actual diagnostic file/artifact/command values into a {kind, target, instruction} dict; return None for codes without a recipe."
  read:
    - maid_runner/core/result.py
    - manifests/drafts/065-00-ci-native-sarif-reporting.epic.yaml
    - docs/troubleshooting.md
    - tests/core/test_diagnostics_registry.py
validate:
  - uv run python -m pytest -q tests/core/test_diagnostics_registry.py
  - uv run maid validate manifests/070-01-add-error-code-registry-with-repair-recipes.manifest.yaml --mode behavioral --quiet
  - uv run maid validate manifests/070-01-add-error-code-registry-with-repair-recipes.manifest.yaml --mode schema --quiet
