# draft-kind: implementation
schema: "2"
goal: "Cache ManifestChain per CLI invocation so validate, coherence, file tracking, and verify reuse one load"
type: refactor
created: "2026-05-19"
metadata:
  status: draft
  tags:
    - performance
    - chain
    - verify
    - file-tracking
  priority: high
description: |
  Close the inefficiency where each CLI command instantiates ManifestChain
  multiple times for the same manifest directory. `maid verify` runs three
  validation stages plus coherence, file tracking, and worktree-scope, each
  walking `manifests/**.manifest.yaml` from disk and resolving supersession
  again. `maid validate` re-enters `_load` from `validate_all`, `validate_behavioral`,
  and `run_file_tracking` even when nothing on disk has changed.

  Introduce a per-invocation chain cache keyed by `(absolute_manifest_dir,
  manifest_set_signature)` where the signature is built from the sorted list of
  `(path, mtime_ns, size)` tuples for every discovered manifest file plus the
  inactive-marker set. The first call inside a CLI invocation loads the chain
  normally; subsequent callers receive the same cached instance. The cache is
  invalidated automatically when the on-disk signature changes (so watch mode
  and tests stay correct) and is cleared at the end of each CLI invocation.

  This optimization must preserve every validation result. Equivalence tests
  compare the full `ValidationResult` and chain diagnostics between cached and
  uncached runs over the live `manifests/` tree.
temptations:
  - risk: "Do not make the cache a module-level singleton that survives across CLI invocations."
    instead: "Scope the cache to a single CLI entry point and clear it before the process exits."
  - risk: "Do not key the cache by manifest directory path alone."
    instead: "Include a content signature (mtime_ns, size, and inactive-marker set) so edits invalidate the cache."
  - risk: "Do not skip rebuilding diagnostics when returning a cached chain."
    instead: "Cache the chain object only; let callers continue requesting `diagnostics()` so error reporting stays identical."
  - risk: "Do not bypass `ManifestChain.reload()` semantics for watch mode."
    instead: "Treat `reload()` as a cache-invalidation signal and re-run signature collection on the next access."
files:
  edit:
    - path: maid_runner/core/chain.py
      artifacts:
        - kind: function
          name: get_cached_manifest_chain
          args:
            - name: manifest_dir
              type: "Union[str, Path]"
            - name: project_root
              type: "Optional[Path]"
              default: None
          returns: ManifestChain
          description: "Return a per-invocation cached ManifestChain for the given manifest directory, rebuilding when the on-disk signature changes."
        - kind: function
          name: clear_manifest_chain_cache
          args: []
          returns: None
          description: "Drop all cached ManifestChain instances; called at the end of each CLI invocation."
        - kind: function
          name: _manifest_dir_signature
          args:
            - name: manifest_dir
              type: Path
          returns: "tuple[tuple[str, int, int], ...]"
          description: "Build a content-anchored signature of the manifest directory used as the cache invalidation key."
    - path: maid_runner/core/validate.py
      artifacts:
        - kind: method
          name: validate_all
          of: ValidationEngine
          args:
            - name: manifest_dir
              type: "Union[str, Path]"
              default: '"manifests/"'
            - name: mode
              type: ValidationMode
              default: ValidationMode.IMPLEMENTATION
            - name: use_chain
              type: bool
              default: "True"
            - name: check_stubs
              type: bool
              default: "False"
            - name: check_assertions
              type: bool
              default: "False"
            - name: fail_on_warnings
              type: bool
              default: "False"
          returns: BatchValidationResult
          description: "Route chain construction through the per-invocation chain cache so validate_all reuses a single ManifestChain instance."
    - path: maid_runner/cli/commands/verify.py
      artifacts:
        - kind: function
          name: _run_verify
          args:
            - name: args
              type: argparse.Namespace
          returns: VerificationResult
          description: "Share one cached ManifestChain across the validation, coherence, file-tracking, and worktree-scope stages of verify."
    - path: tests/core/test_chain.py
      artifacts:
        - kind: test_function
          name: test_get_cached_manifest_chain_returns_same_instance_within_invocation
          source_scenario: "Two callers request a chain for the same manifest directory inside one CLI run with no on-disk changes."
          actions:
            - type: api_call
              subject:
                export: get_cached_manifest_chain
          expected:
            behavior: "Both callers receive the same ManifestChain instance and no second disk scan happens."
        - kind: test_function
          name: test_get_cached_manifest_chain_invalidates_when_signature_changes
          source_scenario: "A manifest file is touched (mtime change) between two requests for the chain."
          actions:
            - type: api_call
              subject:
                export: get_cached_manifest_chain
          expected:
            behavior: "The second request returns a freshly loaded ManifestChain, not the stale cached instance."
        - kind: test_function
          name: test_clear_manifest_chain_cache_drops_all_entries
          source_scenario: "Two manifest directories are cached and then the cache is cleared."
          actions:
            - type: api_call
              subject:
                export: clear_manifest_chain_cache
          expected:
            behavior: "Subsequent requests for either directory perform a full reload from disk."
    - path: tests/core/test_validate.py
      artifacts:
        - kind: test_function
          name: test_validate_all_results_match_uncached_run
          source_scenario: "validate_all is run with and without the chain cache against the live manifests/ tree."
          actions:
            - type: api_call
              subject:
                export: validate_all
          expected:
            behavior: "Both BatchValidationResult objects expose the same per-manifest success flags, errors, and warnings."
        - kind: test_function
          name: test_validate_all_loads_manifest_chain_once_per_invocation
          source_scenario: "validate_all is invoked once over a manifest directory containing multiple manifests."
          actions:
            - type: api_call
              subject:
                export: validate_all
          expected:
            behavior: "ManifestChain construction is observed exactly once via a counting hook even though many manifests are validated."
    - path: tests/cli/test_verify_cmd.py
      artifacts:
        - kind: test_function
          name: test_verify_shares_one_manifest_chain_across_stages
          source_scenario: "maid verify runs validation, coherence, file tracking, and worktree-scope on the same manifest directory."
          actions:
            - type: api_call
              subject:
                export: main
          expected:
            behavior: "ManifestChain construction is observed exactly once across all verify stages and the verify exit code matches the uncached baseline."
  read:
    - docs/plans/maid-runner-performance-backlog.md
    - maid_runner/core/result.py
    - maid_runner/core/manifest.py
    - maid_runner/coherence/engine.py
    - maid_runner/graph/builder.py
validate:
  - uv run python -m pytest -q tests/core/test_chain.py tests/core/test_validate.py tests/cli/test_verify_cmd.py
