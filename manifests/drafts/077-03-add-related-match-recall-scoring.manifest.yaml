# draft-kind: implementation
schema: "2"
goal: "Loosen recall ranking so same-directory paths and substring-related tags surface at reduced weights below exact matches via a narrow documented rule"
type: feature
created: "2026-06-26T20:13:00Z"
metadata:
  status: draft
  epic: 077-00-skills-exploit-outcome-learning-loop
  tags:
    - recall
    - outcome-records
    - ranking
    - maid-workflow
  priority: medium
description: |
  Engine child. Today `recall_outcomes` (in `maid_runner/core/outcome_recall.py`)
  excludes a record entirely unless each supplied query dimension has an exact
  match: a record declaring `maid_runner/core/chain.py` is invisible to a query
  for `maid_runner/core/manifest.py` even though both live in the same module
  directory, and a record tagged `validator-hardening` is invisible to a query
  for `hardening`. This drops genuinely related lessons that recall should
  surface as advisory context.

  This child loosens ranking with a deliberately narrow, documented rule so
  related records surface at reduced weights strictly below their exact
  counterparts, observable through the public `recall_outcomes` return value.

  Pinned decisions (do not redesign):

  1. Two narrow partial signals only, applied only to the path and tag
     dimensions; exact matches keep full weight and their existing reason
     strings unchanged:
     - Path shared-parent: when a query path and a record path differ but share
       the same immediate parent directory (`Path(q).parent == Path(r).parent`),
       award a reduced partial weight below the exact path weight (80). Counts
       at most one best partial per query path; no recursive ancestor walking and
       no fuzzy/substring directory matching.
     - Tag containment: when no exact tag matched but a lowercased query tag is a
       substring of a record tag or vice versa, award a reduced partial weight
       below the exact tag weight (40).
  2. Gating change: a supplied dimension excludes a record only when it yields
     neither an exact nor a partial signal. Partial matches add distinct reason
     labels (for example `path~dir:<dir> (+N)` and `tag~related:<tag> (+N)`) so
     the partial nature is observable through `OutcomeRecallMatch.reasons` and
     does not collide with existing exact `path:`/`tag:` reasons.
  3. Bounded and documented per the AGENTS.md "Validator Hardening Constraints":
     no heuristic analyzers, no synonym tables, no recursive or fuzzy matching.
     Spelling-unrelated synonyms (for example `hardening` vs `anti-gaming`) are
     intentionally out of scope; the negative test pins that they do not match.
     The new partial weights are centralized as named module constants for
     greppability; they are implementation detail, not part of the public
     contract, which is the observable `recall_outcomes` behavior.
  4. Partial never outranks exact and partials do not stack into inflated scores:
     each partial weight is strictly below its exact counterpart, and at most one
     best partial per query value is counted.

  The contracted production artifact is the public `recall_outcomes` function,
  whose signature is unchanged; only its ranking behavior is extended. The new
  behavioral tests live in a dedicated file so the large existing
  `tests/core/test_outcome_recall.py` is kept as a stay-green regression guard
  (its exact-weight assertions must not change) rather than reorganized.

  Behavioral test expectations (all assert via the public `recall_outcomes`
  API on score, reasons, and inclusion; never on private helpers):
  - a same-directory record surfaces for a sibling-path query at the reduced
    path weight with a `path~dir` reason;
  - an exact path match outranks a same-directory partial match;
  - a substring-related tag surfaces at the reduced tag weight while a
    spelling-unrelated tag query returns no match (narrowness pinned);
  - an unrelated record (different parent directory and no tag relation) is
    still excluded;
  - partial matches stay bounded and never outrank an exact path+tag combination.

  Out of scope for this child: the skill guidance children (077-01, 077-02), any
  CLI flag change, and any change to the learn index schema or insights.
temptations:
  - risk: "Do not build a synonym table or semantic similarity so spelling-unrelated tags match."
    instead: "Ship only lowercased substring containment for tags; pin the unrelated-synonym exclusion with a negative test."
  - risk: "Do not add recursive ancestor-directory walking or fuzzy path distance."
    instead: "Compare only immediate parent equality (`Path(q).parent == Path(r).parent`); bound with the no-inflation test."
  - risk: "Do not let a partial match equal or outrank an exact match, or let partials stack into an inflated score."
    instead: "Keep each partial weight strictly below its exact counterpart and count at most one best partial per query value; pin with the exact-outranks-partial and no-inflation tests."
  - risk: "Do not reuse the existing `path:`/`tag:` reason prefixes for partial matches and silently change exact-match reason strings."
    instead: "Use distinct `path~dir`/`tag~related` reason labels and keep `tests/core/test_outcome_recall.py` exact-weight assertions green unmodified."
  - risk: "Do not suppress recall CLI or plan-packet tests if their output shifts because more related records now surface."
    instead: "Re-verify `tests/cli/test_recall_plan_packet_cmd.py`; if packet content legitimately changes, update those expectations within this child rather than hiding the change."
files:
  create:
    - path: tests/core/test_outcome_recall_related_match.py
      artifacts:
        - kind: test_function
          name: test_recall_partial_match_same_directory_surfaces_related_record
          args: []
          returns: None
          description: "A record declaring a sibling path in the same directory surfaces for a query path it does not exactly match, at the reduced path weight with a path~dir reason."
        - kind: test_function
          name: test_recall_exact_path_outranks_partial_path
          args: []
          returns: None
          description: "An exact path match ranks above a same-directory partial match, with distinct exact and partial reason labels."
        - kind: test_function
          name: test_recall_related_tag_substring_surfaces_but_unrelated_excluded
          args: []
          returns: None
          description: "A substring-related tag surfaces at the reduced tag weight while a spelling-unrelated tag query returns no match, pinning the rule's narrowness."
        - kind: test_function
          name: test_recall_unrelated_record_still_excluded
          args: []
          returns: None
          description: "A record with a different parent directory and no tag relation is still excluded, proving loosening did not become a catch-all."
        - kind: test_function
          name: test_recall_partial_does_not_inflate_above_exact_combination
          args: []
          returns: None
          description: "An exact path-and-tag record ranks above records with only partial matches, and partials do not stack into an inflated score."
  edit:
    - path: maid_runner/core/outcome_recall.py
      artifacts:
        - kind: function
          name: recall_outcomes
          args:
            - name: index
              type: OutcomeIndex
            - name: query
              type: OutcomeRecallQuery
            - name: limit
              type: int
              default: "10"
          returns: list[OutcomeRecallMatch]
          description: "Rank Outcome index records for a query; extended so same-directory paths and substring-related tags surface at reduced weights below exact matches, with distinct partial reason labels, while exact-match scoring and reasons are unchanged."
  read:
    - manifests/drafts/077-00-skills-exploit-outcome-learning-loop.epic.yaml
    - manifests/066-01-add-recall-for-manifest-query.manifest.yaml
    - maid_runner/core/outcomes.py
    - tests/core/test_outcome_recall.py
    - tests/cli/test_recall_plan_packet_cmd.py
    - AGENTS.md
validate:
  - uv run python -m pytest -q tests/core/test_outcome_recall_related_match.py tests/core/test_outcome_recall.py tests/cli/test_recall_cmd.py tests/cli/test_recall_for_manifest_cmd.py tests/cli/test_recall_plan_packet_cmd.py
