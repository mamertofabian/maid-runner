schema: "2"
goal: "Add the opt-in `maid insights --theme-map <digest.json>` flag that deterministically re-aggregates lesson_types through the advisory canonical theme map, keeping default insights byte-for-byte unchanged, and document the advisory enrichment artifacts"
type: feature
created: "2026-06-28T14:33:00Z"
metadata:
  epic: 081-00-outcome-llm-enrichment
  status: planning
  tags:
    - outcome-records
    - insights
    - llm-enrichment
    - documentation
    - maid-workflow
  priority: medium
description: |
  Insights-wiring child of the 081 epic. Surfaces the payoff of theme
  normalization without compromising the deterministic insights contract.

  `cmd_insights` (`maid_runner/cli/commands/insights.py`) gains an opt-in
  `--theme-map <path>` flag. When absent, insights behaves exactly as today
  (deterministic aggregation; output unchanged). When present, the command
  loads the advisory digest, rejects it if it is stale relative to the index
  (via `digest_is_stale`) unless `--allow-stale-index` is set, and replaces the
  `by_lesson_type` section of the rendered report with the canonical-theme
  re-aggregation from `apply_theme_map` (081-01). The `--theme-map` flag is
  registered by editing `build_parser` in `_main.py`, declared under
  `files.edit` per the 047-05 precedent (which contracted `_main.py`).

  Pinned decisions (do not redesign):

  1. Default insights output is byte-for-byte unchanged when `--theme-map` is
     not supplied. The flag is purely additive.
  2. The re-aggregation is deterministic and emits no generated narrative into
     the insights report — it only re-keys the existing lesson_type aggregation
     through the canonical map. This honors the 047-05 lesson that insight
     reports stay deterministic aggregate data with source manifest lists, not
     generated guidance. The narrative retrospective stays in the separate
     `.maid/outcomes-digest.md` produced by `maid enrich`.
  3. A stale theme map is rejected with a clear error unless the existing
     `--allow-stale-index` opt-in is supplied, mirroring the index staleness
     guard already in `cmd_insights`.

  Documentation: `docs/manifest-outcome-records.md` and its packaged copy
  `maid_runner/docs/manifest-outcome-records.md` gain an advisory note
  describing `maid enrich`, the generated digest artifacts, and the opt-in
  `maid insights --theme-map` consumption — using the same "advisory,
  generated and ignored" framing already applied to `.maid/outcomes.json`.
temptations:
  - risk: "Do not change default insights output or aggregation when --theme-map is absent."
    instead: "Gate all new behavior behind the flag; pin an unchanged-default test that asserts identical output without the flag."
  - risk: "Do not emit generated narrative or inferred guidance into the insights report via the theme map."
    instead: "Use apply_theme_map's deterministic re-aggregation only; assert collapsed counts and source manifests, not prose."
  - risk: "Do not consume a stale theme map silently."
    instead: "Reject a stale digest via digest_is_stale unless --allow-stale-index is set; pin with a stale-digest rejection test."
  - risk: "Do not document the digest as authoritative outcome data."
    instead: "Describe it as advisory, generated, and gitignored, matching the existing outcomes.json wording."
files:
  edit:
    - path: maid_runner/cli/commands/insights.py
      artifacts:
        - kind: function
          name: cmd_insights
          args:
            - name: args
              type: argparse.Namespace
          returns: int
          description: "Aggregate deterministic Outcome insights; when --theme-map is supplied, validate the advisory digest against the index and replace the by_lesson_type section with the canonical-theme re-aggregation, otherwise behave exactly as before."
    - path: docs/manifest-outcome-records.md
      artifacts:
        - kind: attribute
          name: _outcome_enrichment_advisory_guidance
          of: documentation
          type: doc-section
          description: "Advisory note describing maid enrich, the generated .maid/outcomes-digest.json and .md artifacts, and the opt-in maid insights --theme-map consumption."
    - path: maid_runner/docs/manifest-outcome-records.md
      artifacts:
        - kind: attribute
          name: _packaged_outcome_enrichment_advisory_guidance
          of: package_resource
          type: doc-section
          description: "Packaged copy of the advisory enrichment note kept in sync with the repo docs."
    - path: maid_runner/cli/commands/_main.py
      artifacts:
        - kind: function
          name: build_parser
          args: []
          returns: argparse.ArgumentParser
          description: "Expose the opt-in --theme-map option on the insights subparser."
  read:
    - maid_runner/core/outcome_enrichment.py
    - maid_runner/core/outcome_insights.py
    - tests/cli/test_insights_cmd.py
    - manifests/047-05-add-maid-insights-outcome-aggregation.manifest.yaml
    - manifests/drafts/081-01-add-outcome-enrichment-core.manifest.yaml
  create:
    - path: tests/cli/test_insights_theme_map_cmd.py
      artifacts:
        - kind: test_function
          name: test_insights_without_theme_map_keeps_default_aggregation
          args: []
          returns: None
          description: "Running insights without --theme-map produces the existing deterministic lesson_type aggregation unchanged."
        - kind: test_function
          name: test_insights_with_theme_map_collapses_lesson_types
          args: []
          returns: None
          description: "With --theme-map, fragmented lesson_types are reported under their canonical theme buckets."
        - kind: test_function
          name: test_insights_with_theme_map_emits_no_generated_narrative
          args: []
          returns: None
          description: "The theme-mapped report contains only aggregate keys, counts, and source manifests, not synthesized prose."
        - kind: test_function
          name: test_insights_rejects_stale_theme_map_without_allow_flag
          args: []
          returns: None
          description: "A theme map whose source fingerprint no longer matches the index is rejected unless --allow-stale-index is supplied."
validate:
  - uv run python -m pytest -q tests/cli/test_insights_theme_map_cmd.py tests/cli/test_insights_cmd.py
