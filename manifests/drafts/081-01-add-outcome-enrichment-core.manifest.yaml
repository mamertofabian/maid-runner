schema: "2"
goal: "Add the pure Outcome enrichment policy (request building, anti-fabrication response parsing, theme re-aggregation, markdown rendering, digest serialization/staleness, client-injected orchestration) and the LLMClient seam, fully unit-tested with a fake client and no network"
type: feature
created: "2026-06-28T14:31:00Z"
metadata:
  epic: 081-00-outcome-llm-enrichment
  status: planning
  tags:
    - outcome-records
    - insights
    - llm-enrichment
    - learning
    - maid-workflow
  priority: medium
description: |
  Core child of the 081 epic. Adds the deterministic enrichment policy and the
  LLM seam so the rest of the feature can be built and tested without touching
  the deterministic learn/recall/insights core and without any network in tests.

  Two new modules:

  - `maid_runner/core/llm_client.py`: the seam only. A minimal `LLMClient`
    Protocol with a single `complete(system, user) -> str` method. No concrete
    adapters yet (those land in 081-02). Core logic depends only on this
    interface, so unit tests use an in-test fake implementation.
  - `maid_runner/core/outcome_enrichment.py`: pure policy plus serialization,
    mirroring the structure of `maid_runner/core/outcomes.py` (frozen
    dataclasses + pure to_dict/from_dict + thin read/write wrappers).

  Pinned decisions (do not redesign):

  1. `build_enrichment_request(index)` derives its lesson/manifest universe from
     the same active/deduped record set `aggregate_outcome_insights` uses, so
     enrichment sees exactly the lessons insights would. It returns an
     `EnrichmentRequest` carrying the system/user prompts plus the known
     lesson_type and manifest_slug universe used later for validation.
  2. `parse_enrichment_response(raw, index)` is the anti-fabrication gate. It
     parses the model's JSON and validates that every theme's
     `member_lesson_types` are real lesson_types in the index and every
     `source_manifests`/digest-entry manifest reference is a real manifest_slug
     in the index. Any foreign reference, malformed JSON, or missing field
     raises `ValueError` — the model may cluster and summarize existing lessons
     but never invent manifests or lesson_types.
  3. `run_enrichment(index, client)` is the orchestration seam:
     build request → `client.complete(...)` → parse. It does no I/O itself and
     propagates client failures (fail loud); it never returns a stub/empty
     digest on failure.
  4. `apply_theme_map(index, digest)` is the deterministic payoff: it
     re-aggregates the index's lesson_types into canonical-theme buckets using
     the digest's theme map and returns `tuple[OutcomeInsightGroup, ...]`,
     reusing the insights aggregation shape. It emits NO generated narrative;
     it only re-keys existing aggregation (honoring the 047-05 lesson that
     insight reports stay deterministic aggregate data).
  5. `EnrichmentDigest` carries `schema_version`, `source_generated_from` (the
     index `generated_from` fingerprint at enrichment time), and `advisory`
     (always True), so consumers can detect staleness via `digest_is_stale`
     and never mistake the artifact for deterministic truth.
  6. Serialization mirrors `outcomes.py`: pure `enrichment_digest_to_dict` /
     `enrichment_digest_from_dict` plus thin `read_enrichment_digest` /
     `write_enrichment_digest` file wrappers.

  All behavioral tests assert through the public functions on returned values
  and raised errors; the in-test fake `LLMClient` returns canned JSON. No test
  performs real network I/O.
temptations:
  - risk: "Do not let parse_enrichment_response accept themes/entries that reference manifests or lesson_types absent from the index."
    instead: "Validate every reference against index.records and raise ValueError on any foreign manifest_slug or lesson_type; pin with unknown-slug and unknown-lesson-type tests."
  - risk: "Do not let run_enrichment swallow a client error and return an empty or stub digest."
    instead: "Let the client exception propagate; pin with a failing-fake-client test asserting the error is raised and no digest is produced."
  - risk: "Do not make apply_theme_map emit narrative or inferred guidance into the aggregation."
    instead: "Re-key the existing deterministic lesson_type aggregation through the canonical map only; assert collapsed counts, not prose."
  - risk: "Do not duplicate the insights active/dedup filtering with subtly different semantics, and do not reach into private helpers from tests."
    instead: "The needed helpers `_active_unique_records` and `_aggregate` are private in `maid_runner/core/outcome_insights.py`. Default: import them directly from that module (it stays in files.read, uncontracted) rather than re-implementing them, so enrichment and insights share one record-set/aggregation definition. If contract hardening instead prefers a public shared seam, move `maid_runner/core/outcome_insights.py` into files.edit via plan revision before editing it. Either way, tests assert only through the public enrichment functions, never the private helpers."
  - risk: "Do not perform file or network I/O inside the pure policy functions."
    instead: "Keep build/parse/run/apply/render pure; confine file I/O to read_enrichment_digest/write_enrichment_digest, matching outcomes.py."
files:
  create:
    - path: maid_runner/core/llm_client.py
      artifacts:
        - kind: interface
          name: LLMClient
          description: "Minimal seam for a chat-completion client; core enrichment logic depends only on this Protocol so tests can substitute a fake."
        - kind: method
          name: complete
          of: LLMClient
          args:
            - name: system
              type: str
            - name: user
              type: str
          returns: str
          description: "Return the model's completion text for the given system and user prompts."
    - path: maid_runner/core/outcome_enrichment.py
      artifacts:
        - kind: class
          name: EnrichmentTheme
          description: "Frozen dataclass: one canonical theme that groups several fragmented lesson_types."
        - kind: attribute
          name: canonical_name
          of: EnrichmentTheme
          type: str
          description: "Canonical theme label, e.g. 'validation'."
        - kind: attribute
          name: member_lesson_types
          of: EnrichmentTheme
          type: tuple[str, ...]
          description: "Index lesson_types mapped into this theme; each must exist in the source index."
        - kind: attribute
          name: summary
          of: EnrichmentTheme
          type: str
          description: "Short synthesized description of the theme."
        - kind: attribute
          name: source_manifests
          of: EnrichmentTheme
          type: tuple[str, ...]
          description: "Manifest slugs contributing lessons to this theme; each must exist in the source index."
        - kind: class
          name: DigestEntry
          description: "Frozen dataclass: one recurring-lesson retrospective entry."
        - kind: attribute
          name: theme
          of: DigestEntry
          type: str
          description: "Canonical theme this recurring lesson belongs to."
        - kind: attribute
          name: summary
          of: DigestEntry
          type: str
          description: "Synthesized recurring-lesson statement."
        - kind: attribute
          name: source_manifests
          of: DigestEntry
          type: tuple[str, ...]
          description: "Manifest slugs evidencing this recurring lesson; each must exist in the source index."
        - kind: class
          name: EnrichmentRequest
          description: "Frozen dataclass: the deterministic prompt payload plus the validation universe for a single enrichment call."
        - kind: attribute
          name: system_prompt
          of: EnrichmentRequest
          type: str
          description: "System instruction constraining the model to cluster existing lessons only."
        - kind: attribute
          name: user_prompt
          of: EnrichmentRequest
          type: str
          description: "User content listing the active lessons, their types, tags, and source manifests."
        - kind: attribute
          name: known_lesson_types
          of: EnrichmentRequest
          type: tuple[str, ...]
          description: "Every lesson_type present in the active index, used to reject fabricated types."
        - kind: attribute
          name: known_manifest_slugs
          of: EnrichmentRequest
          type: tuple[str, ...]
          description: "Every manifest slug present in the active index, used to reject fabricated references."
        - kind: class
          name: EnrichmentDigest
          description: "Frozen dataclass: the advisory enrichment artifact (theme map + recurring-lessons digest) with provenance."
        - kind: attribute
          name: schema_version
          of: EnrichmentDigest
          type: str
          description: "Digest schema version, independent of the outcome index schema."
        - kind: attribute
          name: source_generated_from
          of: EnrichmentDigest
          type: str
          description: "The source index generated_from fingerprint at enrichment time, for staleness detection."
        - kind: attribute
          name: advisory
          of: EnrichmentDigest
          type: bool
          description: "Always True; marks the artifact as derived, advisory, non-authoritative."
        - kind: attribute
          name: themes
          of: EnrichmentDigest
          type: tuple[EnrichmentTheme, ...]
          description: "Canonical theme map collapsing fragmented lesson_types."
        - kind: attribute
          name: digest_entries
          of: EnrichmentDigest
          type: tuple[DigestEntry, ...]
          description: "Recurring-lessons retrospective entries."
        - kind: function
          name: build_enrichment_request
          args:
            - name: index
              type: OutcomeIndex
          returns: EnrichmentRequest
          description: "Build the deterministic prompt payload and validation universe from the active, deduped records of the index (same record set as aggregate_outcome_insights)."
        - kind: function
          name: parse_enrichment_response
          args:
            - name: raw
              type: str
            - name: index
              type: OutcomeIndex
          returns: EnrichmentDigest
          description: "Parse the model JSON into an EnrichmentDigest and raise ValueError on malformed payloads or any theme/entry referencing a manifest_slug or lesson_type absent from the index."
        - kind: function
          name: run_enrichment
          args:
            - name: index
              type: OutcomeIndex
            - name: client
              type: LLMClient
          returns: EnrichmentDigest
          description: "Orchestrate build_enrichment_request, client.complete, and parse_enrichment_response; propagate client errors and never return a stub digest on failure."
        - kind: function
          name: apply_theme_map
          args:
            - name: index
              type: OutcomeIndex
            - name: digest
              type: EnrichmentDigest
          returns: tuple[OutcomeInsightGroup, ...]
          description: "Deterministically re-aggregate the index lesson_types into canonical-theme buckets using the digest theme map, returning insight groups with no generated narrative."
        - kind: function
          name: render_digest_markdown
          args:
            - name: digest
              type: EnrichmentDigest
          returns: str
          description: "Render the advisory digest (themes + recurring lessons) as a human/agent-readable Markdown retrospective."
        - kind: function
          name: digest_is_stale
          args:
            - name: digest
              type: EnrichmentDigest
            - name: index
              type: OutcomeIndex
          returns: bool
          description: "Return True when the digest source_generated_from no longer matches the index generated_from fingerprint."
        - kind: function
          name: enrichment_digest_to_dict
          args:
            - name: digest
              type: EnrichmentDigest
          returns: dict
          description: "Serialize an EnrichmentDigest to a JSON-ready dict."
        - kind: function
          name: read_enrichment_digest
          args:
            - name: digest_path
              type: Union[str, Path]
          returns: EnrichmentDigest
          description: "Load and validate an EnrichmentDigest from a JSON file."
        - kind: function
          name: write_enrichment_digest
          args:
            - name: digest
              type: EnrichmentDigest
            - name: output_path
              type: Union[str, Path]
          returns: None
          description: "Write an EnrichmentDigest to a JSON file, creating parent directories."
    - path: tests/core/test_outcome_enrichment.py
      artifacts:
        - kind: test_function
          name: test_build_request_covers_active_lesson_types_and_slugs
          args: []
          returns: None
          description: "build_enrichment_request includes every active lesson_type and manifest slug in the request's validation universe."
        - kind: test_function
          name: test_parse_response_builds_digest_from_valid_payload
          args: []
          returns: None
          description: "A valid model payload referencing only real lesson_types and slugs parses into an EnrichmentDigest with themes and digest entries."
        - kind: test_function
          name: test_parse_response_rejects_unknown_manifest_slug
          args: []
          returns: None
          description: "parse_enrichment_response raises ValueError when a theme or entry cites a manifest slug absent from the index."
        - kind: test_function
          name: test_parse_response_rejects_unknown_lesson_type
          args: []
          returns: None
          description: "parse_enrichment_response raises ValueError when a theme maps a lesson_type absent from the index."
        - kind: test_function
          name: test_run_enrichment_returns_digest_from_injected_client
          args: []
          returns: None
          description: "run_enrichment passes the built prompts to an injected fake LLMClient and parses its canned response into a digest."
        - kind: test_function
          name: test_run_enrichment_propagates_client_failure
          args: []
          returns: None
          description: "run_enrichment lets a failing LLMClient's exception propagate and returns no digest (fail loud)."
        - kind: test_function
          name: test_apply_theme_map_collapses_fragmented_lesson_types
          args: []
          returns: None
          description: "apply_theme_map re-aggregates several fragmented lesson_types into a single canonical-theme bucket with the combined source manifests."
        - kind: test_function
          name: test_render_digest_markdown_lists_themes_and_entries
          args: []
          returns: None
          description: "render_digest_markdown produces Markdown containing each theme's canonical name and each recurring-lesson summary."
        - kind: test_function
          name: test_digest_is_stale_detects_fingerprint_change
          args: []
          returns: None
          description: "digest_is_stale returns False for a matching fingerprint and True when the index generated_from differs."
        - kind: test_function
          name: test_digest_roundtrips_through_dict_and_file
          args: []
          returns: None
          description: "enrichment_digest_to_dict, write_enrichment_digest, and read_enrichment_digest round-trip an EnrichmentDigest without loss."
  read:
    - maid_runner/core/outcomes.py
    - maid_runner/core/outcome_insights.py
    - maid_runner/core/types.py
    - manifests/047-05-add-maid-insights-outcome-aggregation.manifest.yaml
validate:
  - uv run python -m pytest -q tests/core/test_outcome_enrichment.py
