# draft-kind: epic
# promotion: split-before-promote
schema: "2"
goal: "Plan SARIF output and CI-native diagnostic reporting"
type: feature
created: "2026-06-10"
metadata:
  status: planning
  tags:
    - ci-cd
    - sarif
    - reporting
    - github-actions
    - diagnostics
  priority: medium
description: |
  Surface MAID diagnostics where reviewers actually see them: inline on pull
  requests. MAID Runner already emits structured, coded diagnostics (E1xx
  chain, E2xx command integrity, E3xx implementation) with file locations and
  suggestions, and ships reusable GitHub Actions workflows, but findings land
  as job logs and JSON artifacts that reviewers must go digging for. SARIF
  2.1.0 is the industry interchange format that GitHub code scanning, GitLab,
  and other platforms render as inline annotations, so a SARIF serializer over
  the existing result model converts validation evidence into review-time
  visibility with no new analysis logic.

  This epic is a serialization and packaging layer only. It must not change
  what the validator reports, weaken any gate, or fork the diagnostic model.
  The existing `--json` contract remains the canonical machine output; SARIF
  is a derived view.

  Design constraints agreed for this epic:

  1. One diagnostic model. SARIF rules are generated from the same error-code
     registry the JSON output uses; every SARIF result must be traceable to
     the equivalent JSON diagnostic (same code, message, location).
  2. Deterministic output: identical validation results produce
     byte-identical SARIF (excluding run-level timestamps, which should be
     omitted or fixed where the spec allows), so SARIF files are testable
     and diffable.
  3. Stable rule identity: error codes become SARIF rule ids, with severity
     mapping documented (errors -> error, warnings/advisory -> warning/note),
     so code-scanning alert history stays stable across releases.
  4. Exit-code behavior is unchanged: writing a SARIF report never alters
     pass/fail semantics, including under `--strict` or advisory modes.

  Decisions already made for the implementer. Do not redesign these:

  1. Registry module (065-01): `maid_runner/core/diagnostics_registry.py`
     exposing a `DiagnosticRule` dataclass (code, default_severity,
     short_description, description, help_uri) plus `get_rule(code)` and
     `all_rules()`. A unit test asserts every `ErrorCode` member in
     `maid_runner/core/result.py` has a registered rule. This is the same
     module the 070 retry-packet epic extends with repair recipes;
     whichever child lands first creates the module and the other extends
     it.
  2. SARIF flag (065-02): `--sarif <path>` on `maid validate` and
     `maid verify`. The report is written on both pass and fail so CI
     uploads are unconditional; writing the report never changes exit
     codes.
  3. Severity mapping: error diagnostics map to SARIF level `error`,
     warnings to `warning`, advisory/info diagnostics to `note`. The
     SARIF ruleId is the E-code; rule metadata comes from the registry;
     results are sorted by file path, then line, then code; run-level
     timestamp fields are omitted entirely.
  4. SARIF version target is 2.1.0. Tests validate emitted documents
     against the official SARIF 2.1.0 JSON schema vendored under the test
     tree (do not fetch it at test time).

  Planned child order:

  1. `065-01-add-error-code-rule-registry-export` - consolidate the
     diagnostic code surface (codes, default severities, short and full
     descriptions, help links into docs/troubleshooting.md) into one
     introspectable registry in core, exported through the library API, with
     tests proving every emitted diagnostic code is registered. This is the
     prerequisite that keeps SARIF rules and JSON diagnostics from drifting.
  2. `065-02-add-sarif-output-to-validate-and-verify` - add `--sarif <path>`
     (or `--format sarif`) to `maid validate` and `maid verify`, serializing
     batch results to SARIF 2.1.0: tool metadata, rules from the 065-01
     registry, results with physical locations (file, line where available),
     severity mapping, and suggestion text as result messages. Includes
     schema-validation of produced SARIF against the official SARIF JSON
     schema in tests, plus determinism tests.
  3. `065-03-wire-sarif-into-github-actions-templates` - update the reusable
     workflow templates to optionally upload the SARIF report via
     `github/codeql-action/upload-sarif`, so violations appear as PR
     annotations through code scanning; document required permissions and
     private-repo limitations.
  4. `065-04-document-ci-platform-sarif-consumption` - documentation child:
     extend docs/ci-cd-integration.md with SARIF consumption guidance for
     GitLab (code quality/SAST report conversion), Jenkins (warnings-ng), and
     generic pipelines, including which MAID error codes map to which
     severities and how to gate on them.

  Children land in order; 4 may start once 2 is stable. If 065-02 grows past
  one implementation-sized draft, split the serializer library slice from the
  CLI flag wiring before promotion.
temptations:
  - risk: "Do not fork or duplicate the diagnostic model to make SARIF emission easier."
    instead: "Derive SARIF rules and results from the single registered error-code surface added in 065-01 so JSON and SARIF cannot drift."
  - risk: "Do not let report generation change validation semantics or exit codes."
    instead: "Treat SARIF as a write-only derived view; assert in tests that pass/fail behavior is identical with and without the SARIF flag."
  - risk: "Do not emit nondeterministic SARIF that breaks diff-based tests and alert dedup."
    instead: "Omit or fix volatile fields, define stable result ordering, and test byte-identical output for identical validation results."
  - risk: "Do not invent ad-hoc severity levels per command."
    instead: "Document one error-code-to-SARIF-severity mapping in the registry and reuse it across validate and verify."
  - risk: "Do not hand-roll SARIF structure from blog examples."
    instead: "Validate emitted reports against the official SARIF 2.1.0 JSON schema in the test suite."
files:
  create:
    - path: manifests/drafts/065-00-ci-native-sarif-reporting.epic.yaml
      artifacts:
        - kind: attribute
          name: _ci_native_sarif_reporting_roadmap
          of: manifest
          type: draft epic
          description: "Split-before-promote roadmap for the diagnostic rule registry, SARIF 2.1.0 output, GitHub code-scanning wiring, and CI platform documentation."
  read:
    - maid_runner/core/result.py
    - maid_runner/core/types.py
    - maid_runner/cli/commands/validate.py
    - maid_runner/cli/commands/verify.py
    - maid_runner/cli/commands/_format.py
    - docs/ci-cd-integration.md
    - docs/github-actions.md
    - docs/troubleshooting.md
validate:
  - uv run maid validate manifests/drafts/065-00-ci-native-sarif-reporting.epic.yaml --mode schema --quiet
