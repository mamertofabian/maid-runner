# archive-kind: consumed-draft-epic
schema: "2"
goal: "Archive consumed CI-native SARIF reporting epic"
type: feature
created: "2026-06-10"
metadata:
  status: archived
  tags:
    - ci-cd
    - sarif
    - reporting
    - github-actions
    - diagnostics
    - archive
  priority: low
description: |
  This split-before-promote epic has been consumed. Its implementation-sized
  child contracts were promoted as:

  - `065-01-add-error-code-rule-registry-export`
  - `065-02-add-sarif-output-to-validate-and-verify`
  - `065-03-wire-sarif-into-github-actions-templates`
  - `065-04-document-ci-platform-sarif-consumption`

  The promoted children exported the shared diagnostics registry through the
  public package surfaces, added deterministic SARIF 2.1.0 output for
  `maid validate --sarif` and `maid verify --sarif`, wired optional GitHub code
  scanning upload into the reusable validation workflow, documented GitHub
  permissions and private-repository constraints, and added platform
  consumption guidance for GitLab conversion, Jenkins warnings-ng, and generic
  CI pipelines.

  The file remains in `manifests/drafts/` only as a historical pointer. Do not
  promote or implement this archived epic. Future SARIF, diagnostics-registry,
  code-scanning, or CI platform reporting work should start from a fresh scoped
  manifest after the contracts, CLI behavior, workflow templates, tests, and
  documentation added by the 065 children.
temptations:
  - risk: "Do not fork or duplicate the diagnostic model for future SARIF or reporting work."
    instead: "Preserve the single diagnostics registry surface exported by 065-01 and derive report metadata from it."
  - risk: "Do not let report generation alter validation or verification gate semantics."
    instead: "Keep SARIF as the derived review-time view shipped by 065-02; preserve command exit codes and `--json` as the canonical machine contract."
  - risk: "Do not reintroduce nondeterministic SARIF output."
    instead: "Preserve the stable result ordering and omitted run-level timestamps covered by 065-02."
  - risk: "Do not duplicate GitHub-specific upload guidance in generic CI docs."
    instead: "Keep GitHub upload details in docs/github-actions.md and keep platform guidance focused on non-GitHub consumers."
files:
  edit:
    - path: manifests/drafts/065-00-ci-native-sarif-reporting.epic.yaml
      artifacts:
        - kind: attribute
          name: _archived_ci_native_sarif_reporting_epic
          of: manifest
          type: draft epic
          description: "Historical pointer for promoted child manifests 065-01 through 065-04."
  read:
    - manifests/065-01-add-error-code-rule-registry-export.manifest.yaml
    - manifests/065-02-add-sarif-output-to-validate-and-verify.manifest.yaml
    - manifests/065-03-wire-sarif-into-github-actions-templates.manifest.yaml
    - manifests/065-04-document-ci-platform-sarif-consumption.manifest.yaml
validate:
  - uv run maid validate manifests/drafts/065-00-ci-native-sarif-reporting.epic.yaml --mode schema --quiet
