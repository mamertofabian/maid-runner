# draft-kind: epic
# promotion: split-before-promote
schema: "2"
goal: "Post-030 MAID validate hardening roadmap for identity coverage, runnable tests, and strict verify"
type: fix
created: "2026-05-17"
metadata:
  status: planning
  tags:
    - validation
    - anti-gaming
    - fail-closed
    - verify
  priority: critical
description: |
  Epic planning inventory for closing the confirmed post-030 `maid validate`
  and `maid verify` loopholes recorded in
  docs/plans/maid-validate-hardening-backlog.md.

  This epic must not be promoted or implemented directly. Promote one child
  draft at a time so each closure has its own behavioral tests,
  implementation patch, validation evidence, and implementation review.

  Planned child order:
  1. Require identity-backed behavioral coverage for production artifacts.
  2. Require `validate:` commands used by done gates to run behavioral tests.
  3. Make `maid verify` strict by default.

  The queue intentionally focuses on current, reproduced gaps rather than
  re-planning the already promoted 030 hardening work.
temptations:
  - risk: "Do not re-open broad name-only coverage to keep legacy tests green."
    instead: "Add identity-preserving positive cases and update affected tests/manifests deliberately."
  - risk: "Do not treat a no-op command as a passing tests stage."
    instead: "Require done-gate commands to target discovered behavioral test files through recognized test runners."
  - risk: "Do not leave the automation-safe verify command permissive by default."
    instead: "Make strict checks the default and provide any advisory mode as an explicit opt-out."
  - risk: "Do not implement this epic as one broad validation rewrite."
    instead: "Promote and implement one child draft at a time."
files:
  edit:
    - path: docs/plans/maid-validate-hardening-backlog.md
      artifacts:
        - kind: attribute
          name: _maid_validate_post_030_hardening_roadmap
          of: documentation
          type: markdown
          description: "Planning anchor for the post-030 validator hardening queue."
  read:
    - manifests/030-05-promote-coverage-misses-to-errors.manifest.yaml
    - manifests/030-08-add-validate-run-tests-gate.manifest.yaml
    - manifests/030-10-add-maid-verify-done-gate.manifest.yaml
    - maid_runner/core/identity.py
    - maid_runner/core/_validation_test_artifacts.py
    - maid_runner/core/test_runner.py
    - maid_runner/cli/commands/validate.py
    - maid_runner/cli/commands/verify.py
validate:
  - uv run maid validate manifests/drafts/032-00-maid-validate-post-030-hardening-roadmap.epic.yaml --mode schema
