# draft-kind: implementation
schema: "2"
goal: "Export the existing diagnostics registry through the public library APIs"
type: feature
created: "2026-06-10T05:01:00Z"
metadata:
  status: draft
  epic: 065-00-ci-native-sarif-reporting
  tags:
    - ci-cd
    - sarif
    - reporting
    - diagnostics
  priority: medium
description: |
  Reconcile epic 065 with the registry already delivered by
  `070-01-add-error-code-registry-with-repair-recipes`. The current codebase
  already has `maid_runner/core/diagnostics_registry.py`, including
  `DiagnosticRule`, `RepairRecipe`, `get_rule(code)`, `all_rules()`, and
  `render_next_action(code, values)`, with tests proving every `ErrorCode`
  member in `maid_runner/core/result.py` has a registered rule.

  This child no longer creates or redesigns that registry. Its remaining
  implementation purpose is to expose the shipped registry through the public
  library import surfaces used by integrations and later SARIF work:
  `maid_runner` and `maid_runner.core`.

  Pinned decisions after reconciling with active manifest 070-01. Do not
  redesign these:

  1. The registry source is `maid_runner/core/diagnostics_registry.py`,
     created and covered by active manifest
     `manifests/070-01-add-error-code-registry-with-repair-recipes.manifest.yaml`.
     Preserve its existing public surface and recipe behavior.
  2. `DiagnosticRule.default_severity` stores MAID's internal severity values
     from `Severity` (`"error"`, `"warning"`, `"info"`), matching current
     emitters. SARIF conversion maps `Severity.INFO` to SARIF level `"note"`
     in 065-02; do not change registry severities to SARIF-specific values.
  3. `get_rule(code)` currently accepts an `ErrorCode` member or string value
     despite its narrow annotation, normalizes to the E-code string, and fails
     loudly for unknown codes. Preserve that behavior.
  4. `all_rules()` returns all registered rules in deterministic code order,
     covering every `ErrorCode` member.
  5. Library export only: add `DiagnosticRule`, `RepairRecipe`, `get_rule`,
     `all_rules`, and `render_next_action` to the `maid_runner` and
     `maid_runner.core` import surfaces. Do not alter validator behavior,
     existing JSON output, failure-packet contents, or repair-recipe coverage.

  Edge cases and test expectations:

  - The existing diagnostics-registry tests continue to pass: every
    `ErrorCode` is registered, unknown codes fail loudly, default severities
    match current non-error emitters, recipe rendering remains opt-in, and
    implementation-failure recipes do not first instruct test or manifest
    edits.
  - The top-level package exports `DiagnosticRule`, `RepairRecipe`,
    `get_rule`, `all_rules`, and `render_next_action` from `maid_runner`.
  - The core package exports the same symbols from `maid_runner.core`.
  - Export tests assert the imported objects are the same objects provided by
    `maid_runner.core.diagnostics_registry`, not wrappers or duplicated
    metadata.

  Planning note: the previous version of this draft predated 070-01 and
  declared `maid_runner/core/diagnostics_registry.py` as a created file. That
  is stale and would collide with the active 070 manifest. This draft is now
  intentionally scoped to package export wiring plus tests.

  Out of scope: changing registry metadata or recipe coverage, SARIF
  serialization and the --sarif flag (065-02), GitHub Actions wiring (065-03),
  CI platform documentation (065-04), and retry-packet behavior from the 070
  epic.
temptations:
  - risk: "Do not recreate, move, or fork the diagnostics registry that 070-01 already shipped."
    instead: "Import and re-export the existing symbols from maid_runner.core.diagnostics_registry."
  - risk: "Do not change DiagnosticRule.default_severity from internal Severity values to SARIF-specific levels."
    instead: "Keep registry severities as error/warning/info and perform the info->note mapping in the SARIF serializer."
  - risk: "Do not broaden repair-recipe coverage while preparing SARIF work."
    instead: "Leave render_next_action behavior and the 070-01 recipe safety tests unchanged."
files:
  edit:
    - path: maid_runner/__init__.py
      artifacts:
        - kind: attribute
          name: __all__
          type: list[str]
          description: "Extended with DiagnosticRule, RepairRecipe, get_rule, all_rules, and render_next_action so the existing diagnostics registry is exported through the top-level library API."
    - path: maid_runner/core/__init__.py
      artifacts:
        - kind: attribute
          name: __all__
          type: list[str]
          description: "Extended with DiagnosticRule, RepairRecipe, get_rule, all_rules, and render_next_action so the existing diagnostics registry is exported through maid_runner.core."
  read:
    - maid_runner/core/diagnostics_registry.py
    - maid_runner/core/result.py
    - docs/troubleshooting.md
    - tests/core/test_diagnostics_registry.py
    - tests/integration/test_library_api.py
    - manifests/070-01-add-error-code-registry-with-repair-recipes.manifest.yaml
validate:
  - uv run python -m pytest -q tests/core/test_diagnostics_registry.py tests/integration/test_library_api.py
  - uv run maid validate manifests/drafts/065-01-add-error-code-rule-registry-export.manifest.yaml --mode behavioral --quiet
  - uv run maid validate manifests/drafts/065-01-add-error-code-rule-registry-export.manifest.yaml --mode schema --quiet
