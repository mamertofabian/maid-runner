  priority: medium
description: |
  This implementation-sized child was promoted and implemented experimentally,
  then abandoned before merge because fresh benchmark evidence did not satisfy
  the epic gate.

  The attempted design added `--daemon auto|off|require` to single-manifest
  `maid validate <manifest>` calls and routed through `maid serve` over the
  existing Unix-socket NDJSON protocol. Behavior and validation tests passed,
  but the CLI still paid per-call client process startup, so daemon routing was
  practical parity rather than a measurable improvement.

  Benchmark evidence from the abandoned implementation:

  - `uv run maid benchmark --repeat 1 --json` succeeded for the repository.
  - Targeted timing with a local `maid serve` daemon over 10 runs:
    - `uv run maid validate ... --daemon off`: mean 2142.4ms, median 2146.3ms.
    - `uv run maid validate ... --daemon require`: mean 2138.2ms, median 2136.7ms.
  - Targeted timing inside the `uv` environment over 10 runs:
    - `maid validate ... --daemon off`: mean 2124.2ms, median 2117.9ms.
    - `maid validate ... --daemon require`: mean 2109.1ms, median 2108.3ms.

  The measured difference is not a defensible performance win. Future daemon
  validation work should target integrations that avoid per-call CLI startup,
  such as editor/agent clients speaking the daemon protocol directly, then
  replan protocol docs and benchmark expectations around that integration.
