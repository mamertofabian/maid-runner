description: |
  Documentation child. Update `docs/draft-manifest-workflow.md`, the README
  quick start, and the `maid howto` content
  (`maid_runner/cli/commands/howto.py`) to describe the from-diff authoring
  loop and the ranked bootstrap adoption path as the recommended brownfield
  entry into MAID.

  The documented behavior must restate the implemented contracts exactly;
  do not document aspirational behavior:

  - From-diff authoring loop (`maid manifest from-diff`): code the change,
    run `maid manifest from-diff` with exactly one of `--since <commit>`,
    `--base-ref <ref>`, or `--worktree` (zero or two baselines exit 2 with
    an E115-style baseline-required message; MAID will not guess main, dev,
    or a remote branch). The command renders a deterministic, schema-valid
    draft into `manifests/drafts/<slug>.manifest.yaml` (default slug
    `from-diff-<UTC-date>-<short-commit-hash>`); supports `--slug`,
    `--output`, `--force` (required to overwrite an existing draft),
    `--dry-run`, and `--json`. Generated drafts are marked with the goal
    placeholder `"TODO: describe this change"`,
    `metadata.generated_by: maid-manifest-from-diff`, and
    `metadata.needs_review: true`; artifacts whose types the collectors
    could not determine omit the unknown fields rather than guessing.
  - Promotion boundary: generated manifests are always drafts. They land in
    `manifests/drafts/`, never directly in the active chain, and never
    self-promote. The promotion gates already documented in
    `docs/draft-manifest-workflow.md` remain the only path to an active
    contract, and `needs_review: true` is not promotable: the author must
    review, replace the goal placeholder, fill placeholder artifacts, and
    clear needs_review before promotion.
  - Validate suggestions: generated drafts suggest pytest commands only for
    test files that exist and currently reference at least one changed
    artifact; otherwise the draft's validate list is only
    `maid validate <draft-path> --mode schema --quiet`.
  - Ranked bootstrap adoption (`maid bootstrap --rank`): ranks undeclared
    files with `--limit N` (default 20) and `--json` support, using raw
    signals churn (commit count from `git log --follow --oneline --
    <path>`), inbound_refs (count of project files importing the
    candidate), and public_artifacts (collector artifact count), ordered
    churn descending, inbound_refs descending, public_artifacts descending,
    path ascending. There is no composite weighted score; output reports
    the raw signal values per file, and `--rank` writes no manifests. The
    documented brownfield path is: rank, then onboard the top files one at
    a time (snapshot or from-diff), instead of bulk snapshotting
    everything.

  Edits:

  - `docs/draft-manifest-workflow.md`: add a section describing the
    from-diff authoring loop as a draft-generation entry point, the
    generated-draft markers, and how needs_review interacts with the
    existing promotion criteria.
  - `README.md`: extend the Quick Start / common workflows with the
    brownfield entry: `maid bootstrap --rank` then `maid manifest
    from-diff` per change, with the review-then-promote loop.
  - `maid_runner/cli/commands/howto.py`: add or extend howto topic content
    covering `manifest from-diff` and `bootstrap --rank` so `maid howto`
    surfaces the same guidance. Only the private `_TOPICS` content and the
    existing `cmd_howto` flow change; no new public API.

  Documentation standards: state facts in present tense; no temporal
  markers ("NEW", "now available", before/after comparisons).

  Test expectations (planned behavioral tests in
  tests/test_brownfield_onboarding_docs.py, following the existing
  docs-assertion pattern of tests/test_manifest_outcome_docs.py reading
  rendered files with Path.read_text):

  - the workflow doc describes from-diff drafts landing in
    manifests/drafts/ with the needs_review marker and no self-promotion.
  - the README quick start mentions `maid bootstrap --rank` and
    `maid manifest from-diff` as the brownfield entry.
  - the howto content covers both commands and the exactly-one-baseline
    rule.

  Planning notes: the epic says "README quick start" without naming the
  file; this child conservatively edits the repository root `README.md`.
  The docs test file lives at tests/ root, matching the existing
  tests/test_manifest_outcome_docs.py docs-test placement.

  Out of scope: any code behavior changes to diff-scope collection
  (061-01), the from-diff command (061-02), validate suggestions (061-03),
  or bootstrap ranking (061-04). If a sibling's flag or marker differs at
  implementation time, fix the documentation to match the implemented
  contract, not the other way around.
