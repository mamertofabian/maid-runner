  priority: low
description: |
  This split-before-promote epic has been consumed. Its implementation-sized
  child contracts were promoted as:

  - `069-01-add-task-active-manifest-commands`
  - `069-02-add-hook-scope-check-command`
  - `069-03-wire-hooks-into-init-payloads`
  - `069-04-document-edit-time-scope-workflow`

  The promoted children added the single-path active manifest task state with
  `maid task start|stop|status`, the advisory `maid hook scope-check` command
  with fail-open default policy and explicit `--strict` fail-closed behavior,
  Claude and Cursor init payload hook wiring plus Codex managed-section
  guidance, and README, agent-skills, and MAID implementation guidance for the
  edit-time scope enforcement workflow.

  The file remains in `manifests/drafts/` only as a historical pointer. Do not
  promote or implement this archived epic. Future active-task, hook, agent
  payload, or edit-time scope enforcement work should start from a fresh scoped
  manifest after the contracts, CLI behavior, payload wiring, documentation,
  and skill guidance added by the 069 children.
temptations:
  - risk: "Do not let a broken hook block all editing by default."
    instead: "Preserve the default fail-open hook policy shipped by 069-02; reserve deny-on-error behavior for the explicit --strict flag."
  - risk: "Do not grow task state into a session or workflow database."
    instead: "Preserve the 069-01 single repo-relative active-manifest path contract with start, stop, and status only."
  - risk: "Do not treat hook decisions as validation evidence."
    instead: "Keep maid verify changed-scope checks authoritative; hook decisions remain advisory edit-time enforcement."
  - risk: "Do not hand-edit installed payload files outside the packaged flow."
    instead: "Preserve the 069-03 init payload installation and source/distribution parity flow for Claude, Cursor, and Codex hook guidance."
files:
