# draft-kind: implementation
schema: "2"
goal: "Propagate recall-integrated skill guidance through maid init Claude and Codex payloads"
type: feature
created: "2026-06-10T06:04:00Z"
metadata:
  status: draft
  epic: 066-00-outcome-recall-planning-integration.epic
  tags:
    - agent-skills
    - maid-workflow
    - recall
    - learning
  priority: medium
description: |
  Documentation/packaging child. Propagate the recall-integrated skill
  guidance from 066-03 through the `maid init --tool claude` and
  `maid init --tool codex` payloads and their packaged-distribution parity
  checks, so new MAID-enabled repositories receive the recall-integrated
  workflow.

  Pinned decisions (do not redesign):

  1. The propagated guidance must quote the exact commands shipped by
     066-01/066-02 (`maid recall --for-manifest <path>` and
     `maid recall --for-manifest <path> --plan-packet`) and add no new CLI
     behavior. This child changes packaging and parity checks only; it must
     not modify any command implementation.
  2. Skill guidance is workflow text and packaged payloads only; MAID Runner
     gains no AI dependency and no hidden behavior.
  3. Recall stays advisory. The propagated guidance keeps the 066-03
     statements that recalled Outcomes never replace behavioral tests,
     declared artifacts, validation commands, or implementation review.

  Implementation shape:

  - Claude payload: the generated copies under `maid_runner/claude/skills/`
    for maid-planner, maid-implementer, and maid-implementation-review are
    already declared by 066-03 and produced by `scripts/sync_claude_files.py`;
    this child verifies through parity tests that the payload `maid init
    --tool claude` installs carries the recall guidance anchors.
  - Codex payload: the packaged Codex payload (`maid_runner/codex/`,
    `CODEX_DISTRIBUTABLE_SKILLS` in `scripts/sync_claude_files.py`) currently
    distributes only the five repo-specific runner skills, NOT the
    maid-planner / maid-implementer / maid-implementation-review skills whose
    repo-local Codex copies live under `.codex/skills/`. To satisfy the
    epic's requirement that `maid init --tool codex` repositories receive the
    recall-integrated workflow, this child adds those three skills (and their
    skill-local `agents/openai.yaml` metadata) to `CODEX_DISTRIBUTABLE_SKILLS`
    so the sync script regenerates `maid_runner/codex/manifest.json` and the
    packaged skill copies. The init command (`maid_runner/cli/commands/init.py`)
    installs manifest-declared payload files generically and needs no code
    change; verify this stays true in tests.

  Behavioral test expectations: tests run the sync script in an isolated
  workspace (the 047-06 lesson: do not depend on ignored local generated
  files) and assert (a) generated Claude payload copies of the three skills
  match the repo-local sources and contain the recall guidance anchors and
  the exact quoted commands, (b) the generated Codex payload manifest lists
  the three added skills and their agent metadata, (c) generated Codex skill
  copies match the `.codex/skills/` sources byte-for-byte, and (d) the
  pyproject package-data globs cover all newly packaged Codex payload files.

  Planning note: the epic does not pin how the Codex init payload, which
  previously shipped only runner-specific skills, should carry the workflow
  guidance. Chosen reading: extend `CODEX_DISTRIBUTABLE_SKILLS` with exactly
  the three roles named by the epic (maid-planner, maid-implementer,
  maid-implementation-review); maid-plan-review and other skills are not
  added because the epic does not name them.

  Planning note: `maid_runner/codex/manifest.json` and the packaged Codex
  skill files are generated by the sync script; they are declared here so the
  distribution contract stays explicit, matching the 048-01 pattern.

  Out of scope for this child: the CLI behavior (066-01, 066-02), the
  guidance text itself and repo-local/distributed Claude skill edits
  (066-03), and any change to `maid init` command-line options or install
  semantics.
temptations:
  - risk: "Do not copy live source directories directly from the development checkout into target repositories."
    instead: "Package generated payload copies via the sync script and install from the packaged payload manifests, matching the existing Claude and Codex payload pattern."
  - risk: "Do not leave generated package payloads, payload manifests, or package-data globs stale after adding Codex skills."
    instead: "Update the sync script skill list, regenerate the payload manifest and copies, and assert parity plus package-data coverage in isolated-workspace tests."
  - risk: "Do not put recall workflow knowledge only in agent skills or document unshipped commands."
    instead: "Propagate guidance that quotes exactly the 066-01/066-02 command forms and add no new CLI behavior."
files:
  create:
    - path: maid_runner/codex/skills/maid-planner/SKILL.md
      artifacts:
        - kind: attribute
          name: _distributed_codex_planner_skill
          of: codex_payload
          type: markdown document
          description: "Generated package copy of the Codex maid-planner skill with recall-integrated guidance."
    - path: maid_runner/codex/skills/maid-planner/agents/openai.yaml
      artifacts:
        - kind: attribute
          name: _distributed_codex_planner_agent_metadata
          of: codex_payload
          type: yaml document
          description: "Generated package copy of the Codex maid-planner skill-local OpenAI agent metadata."
    - path: maid_runner/codex/skills/maid-implementer/SKILL.md
      artifacts:
        - kind: attribute
          name: _distributed_codex_implementer_skill
          of: codex_payload
          type: markdown document
          description: "Generated package copy of the Codex maid-implementer skill with recall-integrated guidance."
    - path: maid_runner/codex/skills/maid-implementer/agents/openai.yaml
      artifacts:
        - kind: attribute
          name: _distributed_codex_implementer_agent_metadata
          of: codex_payload
          type: yaml document
          description: "Generated package copy of the Codex maid-implementer skill-local OpenAI agent metadata."
    - path: maid_runner/codex/skills/maid-implementation-review/SKILL.md
      artifacts:
        - kind: attribute
          name: _distributed_codex_implementation_review_skill
          of: codex_payload
          type: markdown document
          description: "Generated package copy of the Codex maid-implementation-review skill with recall-integrated guidance."
    - path: maid_runner/codex/skills/maid-implementation-review/agents/openai.yaml
      artifacts:
        - kind: attribute
          name: _distributed_codex_implementation_review_agent_metadata
          of: codex_payload
          type: yaml document
          description: "Generated package copy of the Codex maid-implementation-review skill-local OpenAI agent metadata."
  edit:
    - path: scripts/sync_claude_files.py
      artifacts:
        - kind: function
          name: main
          args: []
          returns: None
          source_scenario: "Maintainers sync agent payloads before building a package."
          actions:
            - type: api_call
              subject:
                function: main
          expected:
            behavior: "CODEX_DISTRIBUTABLE_SKILLS includes maid-planner, maid-implementer, and maid-implementation-review, and the sync copies their skill files and agent metadata into maid_runner/codex/ with a regenerated payload manifest."
    - path: maid_runner/codex/manifest.json
      artifacts:
        - kind: attribute
          name: _codex_payload_manifest_workflow_skills
          of: codex_payload
          type: json object
          description: "Regenerated Codex payload manifest listing the recall-updated workflow skills and their skill-local agent metadata for install and pruning."
    - path: pyproject.toml
      artifacts:
        - kind: attribute
          name: _maid_runner_package_data_codex_workflow_skills
          of: pyproject
          type: TOML package-data entry
          description: "Package data covers the newly packaged Codex workflow skill files and agent metadata."
  read:
    - manifests/drafts/066-00-outcome-recall-planning-integration.epic.yaml
    - manifests/drafts/066-03-update-agent-skill-guidance-for-recall.manifest.yaml
    - manifests/047-06-add-outcome-aware-agent-skill-guidance.manifest.yaml
    - manifests/048-01-refresh-init-codex-payload-and-command-docs.manifest.yaml
    - maid_runner/cli/commands/init.py
    - tests/test_agent_payload_distribution.py
    - tests/test_claude_skill_distribution.py
    - tests/test_recall_payload_sync.py
validate:
  - uv run python -m pytest -q tests/test_recall_payload_sync.py
