schema: "2"
goal: "Add the maid-outcome-enrich agent skill (Claude + Codex source and packaged copies, init distribution, docs) that orchestrates `maid enrich prompt` → model generation → `maid enrich validate` → `maid enrich render`; this skill is the ONLY place an LLM is invoked and carries the cloud-privacy disclosure"
type: feature
created: "2026-06-28T15:40:00Z"
metadata:
  epic: 081-00-outcome-llm-enrichment
  status: planning
  tags:
    - outcome-records
    - insights
    - llm-enrichment
    - agent-skills
    - local-first
    - maid-workflow
  priority: medium
description: |
  Skill child of the 081 hybrid epic. This is where the non-deterministic LLM
  generation lives — deliberately outside the maid-runner package so the runner
  stays AI-free (per the docs/manifest-outcome-records.md command boundary).

  The `maid-outcome-enrich` skill is a distributed agent skill (like
  maid-auditor) installed by `maid init` for Claude and Codex. Its SKILL.md
  drives this workflow using only the deterministic 081-02 commands:

  1. If the Outcome index is stale, run `maid learn` first.
  2. Run `maid enrich prompt` to obtain the bounded corpus and validation
     universe.
  3. Send the corpus to a model — local llama-server first (local-first), cloud
     only as an explicit opt-in — and produce a candidate
     `.maid/outcomes-digest.json`.
  4. Run `maid enrich validate` and treat any non-zero result as a hard stop:
     never hand-edit the digest to pass validation; regenerate instead.
  5. Run `maid enrich render` to produce the advisory `.maid/outcomes-digest.md`.
  6. Optionally consume it via `maid insights --theme-map`.

  Pinned decisions (do not redesign):

  1. The skill is the only component that calls a model or touches a provider
     credential. It must not instruct the agent to bypass `maid enrich validate`
     or to write a digest the runner would reject.
  2. Local-first: prefer the local llama-server; cloud models are an explicit
     opt-in. The skill carries a CLOUD-PRIVACY disclosure stating that sending
     the lesson corpus to a cloud provider publishes outcome lessons externally,
     so local generation is the default.
  3. The skill references only registered `maid enrich` / `maid insights`
     options (no invented flags), mirroring the auditor-skill guidance contract.
  4. Distribution mirrors maid-auditor (077-01): source skills under
     `.claude/skills/` and `.codex/skills/` (with skill-local OpenAI metadata),
     generated package copies under `maid_runner/claude/skills/` and
     `maid_runner/codex/skills/`, the Codex distributable list and payload
     manifest, and the agent-skills docs.

  Behavioral tests assert the workflow anchors are present, that guidance uses
  only registered options, that the validate-is-a-hard-stop and cloud-privacy
  rules are stated, and that source and packaged copies stay in sync after an
  isolated payload sync. Existing shared payload tests are updated in the same
  child because adding a new distributable Codex skill changes their hardcoded
  expected skill lists.
temptations:
  - risk: "Do not let the skill tell the agent to bypass or hand-satisfy maid enrich validate."
    instead: "State that a non-zero validate is a hard stop requiring regeneration; pin with a guidance test."
  - risk: "Do not omit the cloud-privacy disclosure or default to cloud generation."
    instead: "Default to local llama-server, mark cloud as explicit opt-in, and state that cloud sends lessons externally; pin with a disclosure test."
  - risk: "Do not reference unregistered maid enrich / maid insights flags in the skill."
    instead: "Use only registered options; pin with a registered-options-only test like the auditor skill guidance test."
  - risk: "Do not let source, generated package copies, Claude/Codex manifests, or shared payload tests drift apart."
    instead: "Add maid-outcome-enrich to sync and both init payload manifests, update existing hardcoded distribution tests, and assert source == generated copies after isolated sync."
  - risk: "Do not put an LLM client back into the runner because the skill feels indirect."
    instead: "Keep generation in the skill; the runner only provides prompt/validate/render. Genuinely new runner needs go through a fresh planning loop."
