# draft-kind: implementation
schema: "2"
goal: "Cache TypeScript compiler bridge project state for import resolution"
type: refactor
created: "2026-05-29"
metadata:
  tags:
    - performance
    - typescript
    - compiler
    - caching
  priority: high
description: |
  Post-041 profiling shows Tower Recall strict behavioral validation is still
  dominated by TypeScript compiler bridge request latency. The old one-Node-
  process-per-request cost is gone, but the CJS bridge still rebuilds TypeScript
  project state for import resolution.

  `resolveImport` currently calls `loadProject`, and `loadProject` creates a
  TypeScript program even though import resolution only needs parsed compiler
  options and a compiler host. Split and cache the import-resolution project
  state inside the session process while preserving the program-backed path for
  re-export symbol chasing.
temptations:
  - risk: "Do not cache compiler results across CLI invocations or repository changes."
    instead: "Keep the cache inside the existing session process and key it by project root, tsconfig signature, and importer root inputs."
  - risk: "Do not reuse the import-resolution path for re-export symbol chasing."
    instead: "Keep `resolveReexport` on a checker/program-backed path because it needs TypeScript symbols."
  - risk: "Do not treat missing TypeScript, parse errors, bridge timeouts, or malformed responses as successful resolution."
    instead: "Return the same null/None result shape as the current fail-closed bridge path."
  - risk: "Do not optimize by changing module identity output."
    instead: "Add equivalence tests that compare import identities before and after the cached path for aliases, relative imports, and missing imports."
files:
  read:
    - manifests/041-02-batch-typescript-compiler-resolution.manifest.yaml
    - manifests/041-04-cache-ts-reexport-compiler-fallback.manifest.yaml
    - maid_runner/core/ts_compiler_resolver.py
    - maid_runner/core/ts_module_paths.py
    - maid_runner/validators/_typescript_behavioral.py
    - tests/core/test_ts_compiler_resolver.py
  edit:
    - path: maid_runner/core/ts_compiler_resolver.cjs
      artifacts:
        - kind: attribute
          name: ts_compiler_resolver_bridge_cached_import_resolution
          of: TypeScript compiler resolver bridge
          type: script behavior
          source_scenario: "A resolver session sends many import and re-export requests in one validation run."
          actions:
            - type: api_call
              subject:
                export: ts_compiler_resolver_bridge_cached_import_resolution
          expected:
            behavior: "Import requests reuse cached project options and host state without constructing a TypeScript program, while re-export requests still use the program-backed symbol path and all response identities remain unchanged."
    - path: tests/core/test_ts_compiler_resolver_session.py
      artifacts:
        - kind: test_function
          name: test_compiler_resolver_bridge_import_resolution_does_not_build_program_per_request
          source_scenario: "A batch contains several compiler-backed import requests from the same TypeScript project."
          actions:
            - type: api_call
              subject:
                export: resolveMany
          expected:
            behavior: "The bridge returns the same import identities while a call-count assertion proves import resolution avoids per-request TypeScript program construction."
        - kind: test_function
          name: test_compiler_resolver_bridge_import_resolution_invalidates_when_tsconfig_changes
          source_scenario: "A cached import-resolution project is used, then tsconfig path mappings change."
          actions:
            - type: api_call
              subject:
                export: resolveImport
          expected:
            behavior: "The next import lookup observes the changed config instead of returning stale cached module identities."
        - kind: test_function
          name: test_compiler_resolver_bridge_import_resolution_invalidates_when_extended_jsonc_tsconfig_changes
          source_scenario: "A cached import-resolution project is used, then an extended JSONC tsconfig file changes path mappings."
          actions:
            - type: api_call
              subject:
                export: resolveImport
          expected:
            behavior: "The next import lookup observes the changed extended config instead of returning stale cached module identities."
        - kind: test_function
          name: test_compiler_resolver_bridge_import_resolution_keeps_missing_import_fail_closed
          source_scenario: "A compiler-backed import request cannot resolve a missing package or alias target."
          actions:
            - type: api_call
              subject:
                export: resolveImport
          expected:
            behavior: "The bridge returns null and the Python session maps that to the same None/pass-through behavior as before."
        - kind: test_function
          name: test_compiler_resolver_bridge_reexport_still_uses_program_backed_path
          source_scenario: "A re-export request needs TypeScript checker symbol resolution."
          actions:
            - type: api_call
              subject:
                export: resolveReexport
          expected:
            behavior: "The re-export result remains unchanged and the test proves the program-backed path is still exercised for symbol chasing."
    - path: docs/plans/maid-runner-performance-backlog.md
      artifacts:
        - kind: attribute
          name: _performance_backlog_043_04_promoted_status
          of: documentation
          type: markdown
          description: "Marks 043-04 as promoted and implemented, with no remaining performance draft from the post-041 refresh."
    - path: docs/plans/maid-runner-self-improvement-backlog.md
      artifacts:
        - kind: attribute
          name: _self_improvement_043_04_promoted_status
          of: documentation
          type: markdown
          description: "Marks the 043-04 performance follow-up as implemented and routes the next action to re-benchmarking."
    - path: docs/ROADMAP.md
      artifacts:
        - kind: attribute
          name: _roadmap_043_04_promoted_reference
          of: documentation
          type: markdown
          description: "Points the performance roadmap at the promoted 043-04 manifest instead of the deleted draft path."
validate:
  - uv run python -m pytest -q tests/core/test_ts_compiler_resolver_session.py tests/core/test_ts_compiler_resolver.py
  - uv run maid validate manifests/043-04-cache-typescript-compiler-project-for-import-resolution.manifest.yaml --mode schema --quiet
