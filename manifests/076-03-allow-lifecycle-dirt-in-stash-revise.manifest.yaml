- uv run maid validate manifests/076-03-allow-lifecycle-dirt-in-stash-revise.manifest.yaml --mode schema --quiet
outcome:
  status: completed
  completed_at: "2026-06-26T23:55:00Z"
  summary: "Stash-backed plan revise now treats same-task MAID lifecycle dirt as safe only when it is fully verified: `.maid/active-manifest` may remain dirty only when unstaged or untracked and pointing at the revised manifest, and the promoted source draft deletion may remain dirty only as a clean worktree deletion for the matching slug. Lifecycle paths stay outside the targeted stash set."
  rationale: "The original guard was correct to refuse unrelated dirt, but normal promote-then-implement sessions produce same-task lifecycle byproducts that repeatedly forced agents into manual cleanup. The implementation preserves the fail-closed stance by allowing only verifiable lifecycle states and adding staged/index mismatch regressions for both active markers and promoted draft deletions."
  lessons:
