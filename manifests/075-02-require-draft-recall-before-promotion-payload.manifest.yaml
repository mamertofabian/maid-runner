schema: "2"
goal: "Require draft Outcome recall before promotion in init and onboard payloads"
type: fix
created: "2026-06-26T05:40:00Z"
metadata:
  status: active
  tags:
    - init
    - onboard
    - draft-manifests
    - recall
    - agent-skills
    - packaging
  priority: high
description: |
  Downstream MAID users receive draft workflow guidance from two install
  surfaces: `maid init` per-repo payloads and the user-level `maid-onboard`
  bootstrap skill. The current guidance refreshes the Outcome index with
  `maid learn` after Outcome capture, but the draft implementation path can
  promote and implement a selected draft without first running
  `maid recall --for-manifest <draft> --plan-packet`.

  Add explicit recall-before-promotion guidance to the canonical draft workflow
  docs, generated CLAUDE/AGENTS init section, generic implementer skills,
  packaged init payload copies, and packaged `maid-onboard` skills. The recall
  remains advisory planning evidence only: it may sharpen draft hardening and
  implementation risks, but it must not broaden scope or replace red evidence,
  behavioral validation, plan lock, implementation validation, or review.

  Outcome recall for this work surfaced the 047-06, 050-02, 066-03, and 066-04
  lessons: assert exact guidance strings, keep generated payloads synced from
  source, update repo-local and user-level skill copies together, and exercise
  payload sync in tests instead of trusting ignored generated state.
temptations:
  - risk: "Do not update only source docs while leaving `maid init` generated CLAUDE/AGENTS sections stale."
    instead: "Update `maid_runner/cli/commands/init.py` and assert generated guidance includes the exact draft recall command."
  - risk: "Do not update only repo-local skills while packaged payloads stay stale."
    instead: "Edit source `.claude`/`.codex` skills, run `make sync-agent-payloads`, and validate source/package parity tests."
  - risk: "Do not make recall sound like a scope-expansion or validation bypass."
    instead: "State that recall is advisory planning context and cannot replace red evidence, behavioral validation, plan lock, or review."
  - risk: "Do not omit the user-level onboard skill, because stale onboarding guidance can reinstall old habits into new repos."
    instead: "Update the source `maid-onboard` skills and packaged `maid_runner/user_skills` copies."
