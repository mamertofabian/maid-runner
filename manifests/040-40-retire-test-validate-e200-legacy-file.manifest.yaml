schema: "2"
goal: "Retire executable tests/core/test_validate.py coverage after moving E200 cases"
type: refactor
created: "2026-05-24"
supersedes:
  - 030-05-promote-coverage-misses-to-errors
  - 040-20-retire-typescript-attribute-coverage-legacy-cases
  - 040-21-retire-chain-strictness-legacy-cases
metadata:
  tags:
    - safe-refactor
    - validation
    - test-retirement
    - priority-6
    - behavioral-coverage
  priority: medium
description: |
  Finish Priority 6 by retiring executable coverage from tests/core/test_validate.py
  after moving the final implementation coverage E200 contract into focused
  validation suites.

  The remaining legacy file contained only TestImplementationTestCoverage plus
  inert compatibility anchors. This manifest supersedes the last active
  manifests that pinned tests/core/test_validate.py, preserves their production
  contracts and focused tests, and leaves tests/core/test_validate.py as a
  non-executable compatibility shell for older retirement manifests that still
  verify removed_artifacts against that path.
temptations:
  - risk: "Do not weaken missing behavioral coverage from error back to warning."
    instead: "Keep focused ValidationEngine and CLI tests that assert E200 is an implementation error."
  - risk: "Do not let local same-name, shadowed, type-only, or import-only references satisfy production coverage."
    instead: "Keep focused Python and TypeScript identity/shadowing tests for those edge cases."
  - risk: "Do not drop snapshot and test-file artifact exemptions."
    instead: "Keep focused tests for snapshot/system-style exemption and test_function meta-test exemption."
  - risk: "Do not leave executable placeholder tests in tests/core/test_validate.py."
    instead: "Keep only compatibility anchors and an empty TestStubDetection class; all executable assertions live in focused suites."
files:
  edit:
    - path: maid_runner/validators/base.py
      artifacts:
        - kind: class
          name: FoundArtifact
        - kind: attribute
          name: reference_context
          of: FoundArtifact
          type: Optional[str]
    - path: maid_runner/core/identity.py
      artifacts:
