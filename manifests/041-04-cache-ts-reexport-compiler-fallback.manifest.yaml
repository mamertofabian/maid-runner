# draft-kind: implementation
schema: "2"
goal: "Cache TypeScript re-export compiler fallback results for existing module entries"
type: fix
created: "2026-05-26"
metadata:
  status: planning
  tags:
    - performance
    - typescript
    - caching
  priority: medium
description: |
  The 041-02 TypeScript resolver work caches compiler-backed re-export results
  for modules without a local barrel entry, but a real barrel file that the
  local scanner cannot resolve still calls the compiler fallback on every
  duplicate lookup in the same validation cache scope.

  Cache the compiler fallback result for that existing-entry path while keeping
  local barrel scans live and signature-bound so source edits still invalidate
  cached fallback results.
temptations:
  - risk: "Do not cache local scanner hits for existing barrels in a way that hides nested barrel edits."
    instead: "Only cache after the local scanner explicitly asks for compiler fallback."
  - risk: "Do not reuse compiler fallback results after the barrel entry file or project config changes."
    instead: "Key the cache by project root, module, name, project config signature, and selected module entry file signature."
  - risk: "Do not change the public TypeScript re-export resolution contract."
    instead: "Preserve the existing return shape and invalidation behavior while reducing duplicate compiler calls."
files:
  read:
    - manifests/041-02-batch-typescript-compiler-resolution.manifest.yaml
    - maid_runner/core/_ts_export_scanner.py
  edit:
    - path: maid_runner/core/ts_module_paths.py
      artifacts:
        - kind: function
          name: resolve_ts_reexport
          args:
            - name: module
              type: str
            - name: name
              type: str
            - name: project_root
              type: Path
          returns: "Optional[tuple[str, str]]"
          source_scenario: "A real TypeScript barrel exists, the local scanner cannot prove the re-export, and repeated validation lookups need compiler fallback."
          actions:
            - type: api_call
              subject:
                export: resolve_ts_reexport
          expected:
            behavior: "The duplicate fallback lookup reuses the first compiler result within the validation cache scope and recomputes after relevant project config or module entry file signatures change."
    - path: tests/core/test_ts_module_paths.py
      artifacts:
        - kind: test_function
          name: test_resolve_ts_reexport_caches_compiler_fallback_for_existing_module_entry
          source_scenario: "A local index.ts exists but its re-export target requires compiler fallback."
          actions:
            - type: api_call
              subject:
                export: resolve_ts_reexport
          expected:
            behavior: "Two identical re-export lookups return the same result while invoking the compiler fallback only once."
        - kind: test_function
          name: test_resolve_ts_reexport_invalidates_compiler_fallback_when_entry_file_changes
          source_scenario: "A compiler-fallback re-export result is cached and the selected barrel entry file changes."
          actions:
            - type: api_call
              subject:
                export: resolve_ts_reexport
          expected:
            behavior: "The next lookup misses the cached fallback result, invokes the compiler again, and returns the updated result."
        - kind: test_function
          name: test_resolve_ts_reexport_invalidates_compiler_fallback_when_project_config_changes
          source_scenario: "A compiler-fallback re-export result is cached and the project TypeScript config changes."
          actions:
            - type: api_call
              subject:
                export: resolve_ts_reexport
          expected:
            behavior: "The next lookup misses the cached fallback result, invokes the compiler again, and returns the updated result."
validate:
  - uv run python -m pytest -q tests/core/test_ts_module_paths.py
  - uv run maid validate manifests/041-04-cache-ts-reexport-compiler-fallback.manifest.yaml --mode schema --quiet
