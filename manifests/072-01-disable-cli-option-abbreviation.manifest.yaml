      summary: "Promoting draft 066-02 edited the already-locked 066-01 manifest (a files-entry path reference moved from manifests/drafts/ to manifests/), tripping E702 for the whole repo handoff gate; the sanctioned repair is maid plan revise with an honest reason, and the promotion-aware lock migration gap from incident 20260611-133856 remains open tooling work."
      tags:
