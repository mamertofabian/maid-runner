      description: README command table and notes covering the opt-in --artifact-coverage and --knockout verify gates and the quality extra.
  - path: docs/maid_specs.md
    artifacts:
    - kind: attribute
      name: _constraint_evidence_spec_section
      of: documentation
      type: markdown section
      description: Specification of the execution-coverage and knockout gates, their Python-only scope, and E710-E712 semantics.
  - path: docs/troubleshooting.md
    artifacts:
    - kind: attribute
      name: _constraint_evidence_troubleshooting_entries
      of: documentation
      type: markdown section
      description: Per-code troubleshooting entries for E710, E711, and E712 including the git checkout recovery instruction.
  - path: .claude/skills/maid-implementation-review/SKILL.md
    artifacts:
    - kind: attribute
      name: _claude_review_constraint_evidence_guidance
      of: documentation
      type: markdown section
      description: Claude review skill guidance quoting maid verify --artifact-coverage --knockout for high-risk changes.
  - path: .codex/skills/maid-implementation-review/SKILL.md
    artifacts:
    - kind: attribute
      name: _codex_review_constraint_evidence_guidance
      of: documentation
      type: markdown section
      description: Codex review skill guidance quoting maid verify --artifact-coverage --knockout for high-risk changes.
