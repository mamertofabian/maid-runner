schema: "2"
goal: "Automate Claude Code MAID draft implementation passes for maid-runner"
type: feature
created: "2026-05-10"
description: |
  Add a Claude Code counterpart to the existing Codex MAID draft loop. The
  script should run fresh non-interactive Claude Code sessions with
  `claude -p --output-format stream-json`, point those sessions at a
  repo-local Claude skill shadow for draft implementation, render streamed
  progress, record logs under `.claude-automation/`, parse
  READY/BLOCKED/NO_DRAFTS status lines, and optionally commit READY packets.

  This keeps the Codex and Claude runners side by side. It intentionally does
  not replace `tools/codex_maid_loop.py`; it reuses the same safety model:
  clean-worktree preflight before each pass, exact-file commit packets, typed
  commit approval by default, and opt-in `--auto-commit` for unattended loops.
temptations:
  - risk: "Do not point Claude Code at the Codex-only skill instructions."
    instead: "Create a `.claude/skills/maid-runner-draft-implement/SKILL.md` shadow that uses Claude Code Agent-tool terminology."
  - risk: "Do not make auto-commit the default."
    instead: "Expose `--auto-commit` as an opt-in CLI flag; keep typed approval as the default path."
  - risk: "Do not run a new Claude Code implementation pass on top of uncommitted work."
    instead: "Check `git status --short` before each pass and stop with code 2 if the worktree is dirty."
  - risk: "Do not loosen READY packet staging for unattended runs."
    instead: "Reuse exact repo-relative file staging and reject directories, absolute paths, and parent traversal."
files:
  create:
    - path: tools/claude_maid_loop.py
      artifacts:
        - kind: class
          name: ClaudeRunResult
          description: "Captured result paths and metadata for one Claude Code pass"
        - kind: attribute
          name: args
          of: ClaudeRunResult
          type: list[str]
          description: "Claude Code command arguments used for the run"
        - kind: attribute
          name: returncode
          of: ClaudeRunResult
          type: int
          description: "Claude Code process exit code"
        - kind: attribute
          name: session_id
          of: ClaudeRunResult
          type: str | None
          description: "Claude Code session identifier when emitted by stream-json events"
        - kind: attribute
          name: final_message
          of: ClaudeRunResult
          type: str
          description: "Final text used for automation status and commit packet parsing"
        - kind: attribute
          name: stdout_jsonl_path
          of: ClaudeRunResult
          type: Path
          description: "Path to the saved stdout JSONL stream log"
        - kind: attribute
          name: stderr_path
          of: ClaudeRunResult
          type: Path
          description: "Path to the saved stderr log"
        - kind: attribute
          name: final_message_path
          of: ClaudeRunResult
          type: Path
          description: "Path to the saved final assistant/result message"
        - kind: class
          name: CommitPacket
          description: "Parsed READY commit message and exact file list"
        - kind: attribute
          name: message
          of: CommitPacket
          type: str
          description: "Commit message requested by the READY implementation pass"
        - kind: attribute
          name: files
          of: CommitPacket
          type: list[str]
          description: "Exact files to stage for the READY implementation commit"
        - kind: function
          name: find_implementable_drafts
          args:
            - name: draft_dir
              type: Path
          returns: list[Path]
          description: "Return non-epic draft MAID manifests that remain to be implemented"
        - kind: function
          name: build_implementation_command
          args:
            - name: claude
              type: str
            - name: model
              type: str
            - name: effort
              type: str
            - name: permission_mode
              type: str
          returns: list[str]
          description: "Build a fresh `claude -p --output-format stream-json` command for one implementation pass"
        - kind: function
          name: render_claude_stream_event
          args:
            - name: event
              type: dict[str, Any]
            - name: state
              type: dict[str, Any]
          returns: str
          description: "Render documented Claude Code stream-json events as concise terminal progress"
        - kind: function
          name: parse_automation_status
          args:
            - name: final_message
              type: str
          returns: str | None
          description: "Extract the final AUTOMATION_STATUS marker from Claude Code output"
        - kind: function
          name: parse_commit_packet
          args:
            - name: final_message
              type: str
          returns: CommitPacket | None
          description: "Extract a commit message and explicit file list from a READY final message"
        - kind: function
          name: git_status_short
          args: []
          returns: str
          description: "Return `git status --short` output for worktree preflight"
        - kind: function
          name: stage_commit_packet_files
          args:
            - name: files
              type: list[str]
          returns: int
          description: "Stage the exact existing or tracked-deleted files named by a READY commit packet"
        - kind: function
          name: ask_commit_approval
          args:
            - name: pass_number
              type: int
            - name: status
              type: str
          returns: bool
          description: "Require a per-pass typed approval before committing a READY packet when auto-commit is disabled"
        - kind: function
          name: commit_ready_changes
          args:
            - name: packet
              type: CommitPacket
          returns: int
          description: "Stage and commit a READY packet after approval or opt-in auto-commit"
        - kind: function
          name: run_claude_stream_command
          args:
            - name: args
              type: list[str]
            - name: stdout_jsonl_path
              type: Path
            - name: stderr_path
              type: Path
            - name: final_message_path
              type: Path
          returns: ClaudeRunResult
          description: "Run one Claude Code stream-json session while saving and rendering output"
        - kind: function
          name: run_loop
          args:
            - name: args
              type: argparse.Namespace
          returns: int
          description: "Run fresh Claude Code passes until drafts are done, blocked, or max passes is reached"
        - kind: function
          name: build_parser
          args: []
          returns: argparse.ArgumentParser
          description: "Build the command-line parser for the Claude Code MAID draft loop"
        - kind: function
          name: main
          args:
            - name: argv
              type: list[str] | None
          returns: int
          description: "CLI entrypoint for the Claude Code MAID draft loop"
    - path: .claude/skills/maid-runner-draft-implement/SKILL.md
      artifacts:
        - kind: attribute
          name: maid_runner_draft_implement_skill_guidance
          of: maid-runner Claude draft implement skill
          type: markdown
          description: "Repo-specific Claude Code skill guidance for draft refinement, promotion, implementation, validation, review, and automation status reporting"
    - path: tests/ci/test_claude_maid_loop.py
      artifacts:
        - kind: test_function
          name: test_find_implementable_drafts_excludes_epics
        - kind: test_function
          name: test_build_implementation_command_uses_claude_print_stream_and_repo_skill
        - kind: test_function
          name: test_render_claude_stream_event_handles_session_text_and_result
        - kind: test_function
          name: test_parse_automation_status_uses_last_valid_status
        - kind: test_function
          name: test_parse_commit_packet_stops_at_first_non_file_line
        - kind: test_function
          name: test_dirty_worktree_blocks_new_passes
        - kind: test_function
          name: test_ready_pass_prompts_for_commit_by_default
        - kind: test_function
          name: test_auto_commit_skips_interactive_prompt
        - kind: test_function
          name: test_stage_commit_packet_files_rejects_directories_and_unsafe_paths
        - kind: test_function
          name: test_loop_rechecks_future_drafts_after_each_ready_commit
        - kind: test_function
          name: test_parser_documents_auto_commit_and_permission_mode
        - kind: test_function
          name: test_main_accepts_auto_commit_flag
        - kind: test_function
          name: test_package_script_exposes_claude_loop
        - kind: test_function
          name: test_gitignore_excludes_claude_automation_logs
        - kind: test_function
          name: test_claude_draft_implement_skill_requires_claude_review_guidance
  edit:
    - path: package.json
      artifacts:
        - kind: attribute
          name: maid_claude_loop_script
          of: scripts
          type: string
          description: "npm convenience script for running the Claude Code MAID draft loop"
    - path: .gitignore
      artifacts:
        - kind: attribute
          name: claude_automation_ignore
          of: gitignore
          type: string
          description: "Local-only Claude Code automation logs and caches"
  read:
    - tools/codex_maid_loop.py
    - tests/ci/test_codex_maid_loop.py
    - .codex/skills/maid-runner-draft-implement/SKILL.md
    - .claude/skills/maid-implementer/SKILL.md
    - .claude/skills/maid-plan-review/SKILL.md
    - .claude/skills/maid-implementation-review/SKILL.md
    - .claude/agents/maid-implementation-reviewer.md
validate:
  - uv run python -m pytest -q tests/ci/test_claude_maid_loop.py
