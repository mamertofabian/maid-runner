schema: "2"
goal: "Close review findings in required-import resolution and draft workflow docs"
type: fix
created: "2026-05-12"
description: |
  Address follow-up PR review findings before merging the parser replacement
  draft branch. TypeScript required-import validation must preserve parser-backed
  fast paths for already satisfied imports and must treat package-style barrel
  re-export targets as satisfying required imports. Draft workflow docs and
  tests must use consistent planning-inventory terminology, and the parser
  replacement spike must describe the compiler-assisted behavior that now
  exists.
temptations:
  - risk: "Do not resolve every non-relative TypeScript import just because one required import exists."
    instead: "Invoke compiler-backed resolution only when a required import remains unresolved after parser-backed collection and path normalization."
  - risk: "Do not stop at the package entrypoint when a required import points behind a local barrel."
    instead: "Use existing TypeScript re-export resolution to add the concrete re-export source module for imported bindings."
  - risk: "Do not make draft manifests sound like active contracts."
    instead: "Use planning-inventory terminology consistently until a draft is promoted."
files:
  edit:
    - path: maid_runner/core/validate.py
      artifacts:
        - kind: function
          name: _check_required_imports
          args:
            - name: source
              type: str
            - name: file_path
              type: str
            - name: required_imports
              type: tuple[str, Ellipsis]
            - name: project_root
              type: Optional[Path]
          returns: list[ValidationError]
    - path: tests/core/test_validate.py
      artifacts:
        - kind: test_function
          name: test_ts_required_import_does_not_resolve_unrelated_bare_imports
        - kind: test_function
          name: test_ts_required_import_resolves_only_relevant_unresolved_bare_imports
        - kind: test_function
          name: test_ts_required_import_accepts_package_barrel_reexport_target
        - kind: test_function
          name: test_ts_required_import_rejects_unimported_package_barrel_reexport_target
        - kind: test_function
          name: test_ts_required_import_rejects_aliased_different_barrel_binding
    - path: tests/ci/test_codex_maid_loop.py
      artifacts:
        - kind: test_function
          name: test_parser_keeps_commit_approval_explicit
        - kind: test_function
          name: test_draft_manifest_workflow_docs_preserve_lifecycle_contract
    - path: manifests/drafts/README.md
      artifacts:
        - kind: attribute
          name: _draft_manifest_directory_pointer
          of: documentation
          type: markdown
          description: "Directory-local pointer that describes draft manifests as planning inventory before promotion."
    - path: README.md
      artifacts:
        - kind: attribute
          name: _draft_manifest_workflow_links
          of: documentation
          type: markdown
          description: "Development workflow text that describes draft manifests as planning inventory before promotion."
    - path: docs/spikes/spike-parser-library-replacement-options.md
      artifacts:
        - kind: attribute
          name: _parser_replacement_required_import_status
          of: documentation
          type: markdown
          description: "Spike status text describing current compiler-assisted required-import behavior and preserving fast-path guidance."
  read:
    - manifests/017-06-compiler-backed-required-import-resolution.manifest.yaml
    - manifests/document-draft-manifest-workflow.manifest.yaml
    - manifests/024-01-maid-loop-commit-packet-completeness.manifest.yaml
    - maid_runner/core/ts_module_paths.py
    - docs/draft-manifest-workflow.md
    - README.md
    - CONTRIBUTING.md
validate:
  - uv run python -m pytest -q tests/core/test_validate.py::TestImportVerification tests/ci/test_codex_maid_loop.py tests/ci/test_claude_maid_loop.py
  - uv run maid validate manifests/017-06-compiler-backed-required-import-resolution.manifest.yaml
  - uv run maid validate manifests/024-01-maid-loop-commit-packet-completeness.manifest.yaml
