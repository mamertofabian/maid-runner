schema: '2'
goal: Add a maid validators command that lists every validator with claimed extensions, source, and load status in text and JSON
type: feature
created: '2026-06-17T23:26:24Z'
metadata:
  epic: 063-00-validator-plugin-distribution
  tags:
  - validators
  - plugin-architecture
  - ecosystem
  priority: medium
description: |
  Let users audit exactly which code parses their files. With entry-point
  plugin discovery (063-01) in place, the set of active validators depends
  on the installed environment; `maid validators` makes that set
  inspectable, including plugins that failed to load, plugins that lost a
  conflict to a built-in, and plugins skipped by the kill switch.

  Pinned decisions (do not redesign):

  - The command lives in `maid_runner/cli/commands/validators.py` and is
    invoked as `maid validators`.
  - Output columns: name, claimed extensions, source (`builtin` or
    distribution name and version), status (`active`, `conflict`,
    `error`, `disabled`).
  - `--json` parity: the JSON form carries the same rows and fields as
    the text table.
  - Deterministic row ordering: built-ins first, then plugins by
    distribution name.
  - Load errors are shown: a plugin with status `error` or `conflict`
    displays its detail (the E902 load-failure message or the conflicting
    extensions from the E903 diagnostic) in text and JSON.
  - With `MAID_DISABLE_VALIDATOR_PLUGINS=1` set, skipped plugins are
    still listed with status `disabled`.

  Behavior specifics:

  - The command consumes `ValidatorRegistry.with_builtin_validators()`
    and its `validator_records()` method from 063-01; it performs no
    discovery logic of its own and never re-imports plugins.
  - The listing is an audit, not a gate: the command exits 0 when the
    listing is produced, even when rows have status `conflict`, `error`,
    or `disabled`. (Failing validation because of plugin state is the
    job of validate/verify runs that surface the E902/E903 diagnostics.)
  - JSON shape: a top-level `"validators"` key holding a list of row
    objects with `name`, `extensions`, `source`, `status`, and `detail`
    fields, in the same deterministic order as the text output.
  - Extensions are rendered sorted within each row so output is
    byte-stable.

  Test expectations (behavioral tests in
  tests/cli/test_validators_cmd.py, written during planning of this
  child; plugin scenarios reuse the same entry-point patching approach as
  tests/validators/test_plugin_discovery.py):

  - Parser registration: `maid validators` and `maid validators --json`
    are accepted by `build_parser` and dispatch through `main` to
    `cmd_validators`.
  - In a builtin-only environment, the listing shows the Python built-in
    (and TypeScript/Svelte when importable) with source `builtin` and
    status `active`, built-ins first.
  - A fake plugin environment produces rows with the correct source
    (distribution name and version) and statuses `active`, `conflict`,
    and `error`, with detail text for the conflict and error rows.
  - `--json` output matches the text rows field-for-field and preserves
    ordering.
  - With MAID_DISABLE_VALIDATOR_PLUGINS=1, plugin rows appear with
    status `disabled`.
  - The command exits 0 even when error and conflict rows are present.

  Planning note: the epic does not pin the exit-code policy; treating the
  listing as an always-exit-0 audit command (errors visible in rows, not
  in the exit code) is the conservative reading recorded here. The JSON
  top-level `"validators"` key name is also a conservative choice by this
  draft.

  Out of scope: discovery mechanics, precedence, diagnostics, and the
  kill switch implementation (063-01, a prerequisite); the conformance
  kit (063-03); authoring documentation (063-04).
temptations:
- risk: Do not re-implement or fork discovery logic inside the CLI command.
  instead: Render ValidatorRegistry.validator_records() directly so the audit always matches what validation actually uses.
- risk: Do not hide load errors or conflicts to make the listing look clean.
  instead: Show status and detail for every row, including error, conflict, and disabled plugins.
- risk: Do not let text and JSON output drift apart.
  instead: Build both forms from the same record rows with identical fields and ordering.
files:
  create:
  - path: maid_runner/cli/commands/validators.py
    artifacts:
    - kind: function
      name: cmd_validators
      args:
      - name: args
        type: argparse.Namespace
      returns: int
      description: List validator records as a text table or JSON with name, extensions, source, status, and detail; built-ins first, then plugins by distribution name; exits 0 when the listing is produced.
  - path: tests/cli/test_validators_cmd.py
    artifacts:
    - kind: test_function
      name: test_validators_parser_accepts_text_and_json_and_main_dispatches
      source_scenario: A user asks the MAID CLI to audit installed validators.
      actions:
      - type: api_call
        subject:
          export: build_parser
      - type: api_call
        subject:
          export: main
      expected:
        behavior: '`maid validators` and `maid validators --json` parse successfully, dispatch through main, print validator rows, and return 0.'
    - kind: test_function
      name: test_cmd_validators_lists_builtin_records_first
      source_scenario: No validator plugins are installed.
      actions:
      - type: api_call
        subject:
          export: cmd_validators
      expected:
        behavior: The text listing contains built-in validator rows first, with sorted extensions, source builtin, status active, and an empty detail field.
    - kind: test_function
      name: test_validators_json_matches_text_rows_for_plugin_statuses
      source_scenario: Installed validator plugins include an active plugin, a builtin conflict, and a load failure.
      actions:
      - type: api_call
        subject:
          export: main
      expected:
        behavior: Text and JSON output expose identical ordered rows, including source, status, and detail for active, conflict, and error plugin rows, and both forms exit 0.
    - kind: test_function
      name: test_validators_lists_disabled_plugins_without_loading_them
      source_scenario: MAID_DISABLE_VALIDATOR_PLUGINS=1 is set while plugin entry points are installed.
      actions:
      - type: api_call
        subject:
          export: main
      expected:
        behavior: The listing includes plugin rows with status disabled and does not import the disabled plugin.
  edit:
  - path: maid_runner/cli/commands/_main.py
    artifacts:
    - kind: function
      name: build_parser
      args: []
      returns: argparse.ArgumentParser
      description: The parser exposes a validators subcommand with a --json option.
    - kind: function
      name: main
      args:
      - name: argv
        type: list[str] | None
        default: None
      returns: int
      description: The CLI dispatches maid validators to maid_runner.cli.commands.validators.cmd_validators.
  - path: README.md
    artifacts:
    - kind: attribute
      name: _maid_validators_cli_reference
      of: documentation
      type: markdown table row
      description: Minimal CLI reference entry for the registered `maid validators` audit command so parser-command documentation parity remains green.
  read:
