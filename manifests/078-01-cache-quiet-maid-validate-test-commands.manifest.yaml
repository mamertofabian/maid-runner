      returns: TestRunResult | None
      source_scenario: '`maid test` reaches a quiet validate command in an active manifest validate list.'
      actions:
      - type: api_call
        subject:
          function: _run_cached_maid_validate_command
      expected:
        behavior: The command returns a cached `TestRunResult` rather than `None`, so the caller does not use subprocess fallback.
    - kind: function
      name: _run_cached_maid_validate_command_in_scope
      args:
      - name: command
        type: tuple[str, Ellipsis]
      - name: cwd
        type: Union[str, Path]
      - name: manifest_slug
        type: str
      - name: stream
        type: TestStream
      - name: cache
        type: dict[str, object]
      - name: resolve_command
        type: _CommandResolver
      - name: parsed
        type: dict[str, object]
      returns: TestRunResult
      source_scenario: Cached validation handles quiet single-manifest commands, quiet directory-wide commands, JSON+quiet commands, and quiet failures.
      actions:
      - type: api_call
        subject:
          function: _run_cached_maid_validate_command_in_scope
      expected:
        behavior: Successful quiet output is empty for non-JSON mode; JSON output remains JSON when `--json` is present; failures match the quiet formatter rather than the noisy formatter.
  - path: tests/core/validation/test_maid_validate_command_cache.py
    artifacts:
    - kind: test_function
      name: test_parse_maid_validate_command_accepts_quiet_flag
      source_scenario: A quiet validate command uses the same supported command shape that MAID manifests now commonly declare.
      actions:
      - type: api_call
        subject:
          function: _parse_maid_validate_command
      expected:
        behavior: 'The parsed command includes `quiet: True` and remains cache-compatible.'
    - kind: test_function
      name: test_run_cached_maid_validate_command_preserves_quiet_success_output
      source_scenario: A quiet cached single-manifest validation succeeds.
      actions:
      - type: api_call
        subject:
          function: _run_cached_maid_validate_command
      expected:
        behavior: The returned result succeeds with exit code 0 and empty stdout.
    - kind: test_function
      name: test_run_cached_maid_validate_command_preserves_quiet_failure_output
      source_scenario: A quiet cached single-manifest validation fails with a real validation error.
      actions:
      - type: api_call
        subject:
          function: _run_cached_maid_validate_command
      expected:
        behavior: The returned result fails with exit code 1, includes the quiet error-code/message diagnostic, and omits non-quiet summary text such as `FAIL <slug>` and `Mode:`.
    - kind: test_function
      name: test_run_cached_maid_validate_command_json_takes_precedence_over_quiet
      source_scenario: A cached single-manifest validation command includes both `--json` and `--quiet`.
      actions:
      - type: api_call
        subject:
          function: _run_cached_maid_validate_command
      expected:
        behavior: 'The returned result succeeds and stdout is valid JSON with `success: true`, proving JSON mode takes precedence over quiet formatting.'
    - kind: test_function
      name: test_run_cached_maid_validate_command_preserves_quiet_batch_success_output
      source_scenario: A quiet cached directory-wide validation succeeds.
      actions:
      - type: api_call
        subject:
          function: _run_cached_maid_validate_command
      expected:
        behavior: The returned result succeeds with exit code 0 and stdout matching the subprocess newline shape, proving quiet is passed into the batch formatter without changing `maid test --json` payloads.
    - kind: test_function
      name: test_run_tests_executes_quiet_maid_validate_commands_in_process
      source_scenario: An active manifest declares `uv run maid validate manifests/target.manifest.yaml --mode schema --quiet` as its validate command.
      actions:
      - type: api_call
        subject:
          function: run_tests
      expected:
        behavior: '`run_tests` returns a successful `TestRunResult` for the quiet validate command without invoking `run_command` subprocess fallback.'
    - kind: test_function
      name: test_run_tests_keeps_unsupported_validate_flags_on_subprocess_path
      source_scenario: An active manifest declares a `maid validate` command with an unsupported flag.
      actions:
      - type: api_call
        subject:
          function: run_tests
      expected:
        behavior: The unsupported command still reaches `run_command`, proving the cache parser remains fail-closed.
