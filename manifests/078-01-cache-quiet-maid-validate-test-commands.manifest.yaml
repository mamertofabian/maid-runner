      expected:
        behavior: 'The parser accepts `--quiet`, records `quiet: True`, preserves the existing mode, manifest_dir, json_mode, use_chain, and manifest_path fields, and still rejects unrelated unsupported flags.'
    - kind: function
      name: _run_cached_maid_validate_command
      args:
      - name: command
        type: tuple[str, Ellipsis]
      - name: cwd
        type: Union[str, Path]
      - name: manifest_slug
        type: str
      - name: stream
        type: TestStream
      - name: cache
