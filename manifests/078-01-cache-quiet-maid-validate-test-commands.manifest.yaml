schema: '2'
goal: Make quiet `maid validate` commands cache-eligible inside `maid test` so repeated manifest validation does not fall back to subprocess execution
type: fix
created: '2026-06-27T00:45:51Z'
metadata:
  tags:
  - performance
  - test-runner
  - validation-cache
  - quiet-output
  priority: high
description: |
  `uv run maid test --json` currently takes 4:06.26 in this repository. The
  largest avoidable cost is not the batched pytest suite but repeated
  manifest-specific MAID validation:

  - 140 `maid validate` shaped commands ran during the measured `maid test`.
  - 130 of them included `--quiet`.
  - `_parse_maid_validate_command` rejects `--quiet`, so those 130 commands
    bypass `_run_cached_maid_validate_command` and run as external
    `uv run maid validate` subprocesses.
  - The quiet validate commands accounted for 161.86s of the run.
  - The 10 non-quiet validate commands accounted for 4.32s.
  - A throwaway counterfactual over the same command tuples, with `--quiet`
    stripped and an outer manifest-chain cache scope, passed in 15.80s.

  This is intentionally a standalone implementation draft rather than a child
  of an epic. The measured regression has one high-confidence MAID-owned fix.
  The remaining 60.72s batched pytest command should be remeasured after this
  cache fix lands before planning any separate pytest parallelization or
  dependency change.

  Implement the narrow cache eligibility fix: parse `--quiet`, preserve the
  flag in the parsed command dictionary, and pass it into the same validation
  formatters the CLI uses. Keep unsupported flags unsupported.

  Expected behavior:

  - `maid test` executes `uv run maid validate <manifest> --mode behavioral
    --quiet` through `_run_cached_maid_validate_command` rather than
    `run_command` subprocess fallback.
  - Successful quiet cached single-manifest validation produces empty stdout,
    matching `maid validate <manifest> --quiet` behavior.
  - Successful quiet cached directory-wide validation preserves the subprocess
    stdout shape produced by `maid validate --quiet`.
  - Failed quiet cached validation still reports visible diagnostics, matching
    the quiet formatter.
  - JSON mode and quiet mode remain independent: `--json --quiet` should keep
    JSON output semantics because the CLI formatter gives JSON precedence.
  - Existing unsupported flags still return `None` from the parser and use the
    subprocess fallback.

  Out of scope:

  - Grouping all manifest-specific validate commands into one `validate_all`
    execution.
  - Adding pytest-xdist or changing pytest batching policy.
  - Parallelizing cached `maid validate` commands.
  - Supporting additional validate CLI flags beyond `--quiet`.
  - Changing single-manifest `maid test --manifest ...`; that path still uses
    `run_manifest_tests` and can be optimized separately if a fresh benchmark
    shows it matters.
temptations:
- risk: Do not silently skip quiet validate commands or treat them as already covered by a broad validation command.
  instead: Run each declared quiet validate command through the cached validation path and return a `TestRunResult` for it.
- risk: Do not make quiet output noisy on success just because the command is cached.
  instead: Pass the parsed quiet flag into `format_validation_result` and `format_batch_result`.
- risk: Do not let unsupported validate flags accidentally enter the cached path.
  instead: Keep the parser fail-closed for every flag other than the explicitly supported set.
- risk: Do not hide the performance regression behind wall-clock-only tests.
  instead: Add a call-count/subprocess-fallback test proving quiet validate commands are handled in-process.
- risk: Do not change `maid test --manifest` or fail-fast semantics incidentally.
  instead: Limit behavior changes to cache eligibility for validate-shaped commands already passed to `_run_implementation_commands`.
